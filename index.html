<title>코드런 · CodeRun</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --bg:#f6f5f2; --bg-soft:#eeece6; --card:#ffffff; --ink:#181b24; --ink-soft:#5c6070;
    --line:#e2ddd3; --line-strong:#cfc9bc;
    --brand:#5b6cff; --brand-ink:#3f4ee0;
    --good:#2fbf71; --good-soft:#e4f7ec; --bad:#ff5d5d; --bad-soft:#ffe9e9;
    --gold:#ffb020; --flame:#ff7a3d;
    --py:#3b7dd8; --sql:#1aa38a; --c:#6d7ba8; --cpp:#d6488f;
    --shadow:0 2px 0 var(--line-strong);
    --radius:18px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#12131a; --bg-soft:#1b1d27; --card:#20222e; --ink:#f2f1ee; --ink-soft:#a6a9ba;
      --line:#2b2e3c; --line-strong:#3a3e50;
      --good-soft:#12321f; --bad-soft:#3a1616;
      --shadow:0 2px 0 rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --bg:#f6f5f2; --bg-soft:#eeece6; --card:#ffffff; --ink:#181b24; --ink-soft:#5c6070;
    --line:#e2ddd3; --line-strong:#cfc9bc; --good-soft:#e4f7ec; --bad-soft:#ffe9e9;
    --shadow:0 2px 0 var(--line-strong);
  }
  :root[data-theme="dark"]{
    --bg:#12131a; --bg-soft:#1b1d27; --card:#20222e; --ink:#f2f1ee; --ink-soft:#a6a9ba;
    --line:#2b2e3c; --line-strong:#3a3e50; --good-soft:#12321f; --bad-soft:#3a1616;
    --shadow:0 2px 0 rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    min-height:100vh;
  }
  button{font-family:inherit; cursor:pointer}
  .app{max-width:560px; margin:0 auto; padding:0 16px 120px; position:relative}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20; background:var(--bg);
    display:flex; align-items:center; gap:10px; padding:14px 2px 12px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:9px; font-weight:800; font-size:19px; letter-spacing:-.02em; margin-right:auto}
  .brand .logo{width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--brand),#8a6bff);
    display:grid; place-items:center; color:#fff; font-family:var(--mono); font-weight:700; font-size:15px}
  .stat{display:flex; align-items:center; gap:5px; font-weight:800; font-size:15px; padding:5px 10px;
    border-radius:999px; background:var(--card); border:1px solid var(--line); box-shadow:var(--shadow)}
  .stat .ic{font-size:16px; line-height:1}
  .stat.flame{color:var(--flame)} .stat.xp{color:var(--gold)}
  .heart-ic{color:var(--bad)}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);
    box-shadow:var(--shadow); font-size:17px; display:grid; place-items:center; color:var(--ink)}

  /* ---------- language switch ---------- */
  .langbar{display:flex; gap:8px; overflow-x:auto; padding:14px 0 6px; scrollbar-width:none}
  .langbar::-webkit-scrollbar{display:none}
  .langchip{flex:0 0 auto; display:flex; align-items:center; gap:7px; padding:8px 14px; border-radius:999px;
    border:2px solid var(--line); background:var(--card); font-weight:800; font-size:14px; color:var(--ink-soft);
    transition:transform .1s}
  .langchip .em{font-size:16px}
  .langchip[aria-selected="true"]{color:#fff; border-color:transparent}
  .langchip:active{transform:scale(.96)}

  /* ---------- practice bar ---------- */
  .practice-bar{display:flex; gap:8px; padding:12px 0 2px}
  .pbtn{flex:1; padding:12px 14px; border-radius:13px; border:2px solid var(--line); background:var(--card);
    font-weight:800; font-size:14px; color:var(--ink); box-shadow:var(--shadow); transition:transform .08s}
  .pbtn:active{transform:scale(.98)}
  #random-btn{background:var(--brand); border-color:transparent; color:#fff; box-shadow:0 3px 0 var(--brand-ink)}
  .pbtn.ghost[aria-pressed="true"]{background:var(--good); border-color:transparent; color:#fff; box-shadow:0 3px 0 #229e5a}

  /* ---------- unit header ---------- */
  .unit-head{margin:22px 0 4px; padding:16px 18px; border-radius:var(--radius); color:#fff;
    box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center; gap:12px}
  .unit-head .k{font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; opacity:.85}
  .unit-head h2{margin:2px 0 0; font-size:19px; font-weight:800; letter-spacing:-.01em}
  .unit-head .guide{font-size:22px}

  /* ---------- path ---------- */
  .path{display:flex; flex-direction:column; align-items:center; gap:10px; padding:20px 0 8px; position:relative}
  .node-wrap{position:relative; display:flex; flex-direction:column; align-items:center; gap:6px}
  .node{
    width:74px; height:66px; border-radius:50%/58%; border:none; position:relative;
    background:var(--line-strong); box-shadow:0 6px 0 rgba(0,0,0,.14); color:#fff; font-size:26px;
    display:grid; place-items:center; transition:transform .12s, box-shadow .12s;
  }
  .node:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.14)}
  .node.locked{background:var(--bg-soft); color:var(--line-strong); box-shadow:0 5px 0 var(--line)}
  .node.done{}
  .node .crown{position:absolute; top:-12px; left:50%; transform:translateX(-50%); font-size:15px;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.2))}
  .node.current::after{content:"시작"; position:absolute; top:-34px; left:50%; transform:translateX(-50%);
    background:var(--card); color:var(--brand); font-weight:800; font-size:11px; padding:4px 10px; border-radius:9px;
    border:1px solid var(--line); box-shadow:var(--shadow); white-space:nowrap; animation:bob 1.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}
  .node-label{font-size:12px; font-weight:700; color:var(--ink-soft); max-width:120px; text-align:center}
  .n0{transform:translateX(0)} .n1{transform:translateX(64px)} .n2{transform:translateX(96px)}
  .n3{transform:translateX(64px)} .n4{transform:translateX(0)} .n5{transform:translateX(-64px)}
  .n6{transform:translateX(-96px)} .n7{transform:translateX(-64px)}
  @media (max-width:400px){
    .n1,.n3{transform:translateX(44px)} .n2{transform:translateX(66px)}
    .n5,.n7{transform:translateX(-44px)} .n6{transform:translateX(-66px)}
  }

  /* ---------- lesson view ---------- */
  .lesson{position:fixed; inset:0; background:var(--bg); z-index:50; display:none; flex-direction:column}
  .lesson.on{display:flex}
  .lesson-top{max-width:560px; width:100%; margin:0 auto; padding:16px 16px 8px; display:flex; align-items:center; gap:12px}
  .close-x{background:none; border:none; font-size:26px; color:var(--ink-soft); line-height:1; padding:0 4px}
  .pbar{flex:1; height:16px; border-radius:999px; background:var(--bg-soft); overflow:hidden; border:1px solid var(--line)}
  .pbar > i{display:block; height:100%; width:0; background:var(--good); border-radius:999px; transition:width .3s;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.08)}
  .hearts{display:flex; align-items:center; gap:3px; font-weight:800; color:var(--bad)}
  .lesson-body{flex:1; overflow-y:auto; width:100%; max-width:560px; margin:0 auto; padding:18px 16px 24px}
  .q-kind{font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft)}
  .q-title{font-size:23px; font-weight:800; letter-spacing:-.01em; margin:8px 0 18px; text-wrap:balance; line-height:1.3}
  pre.code{font-family:var(--mono); font-size:14.5px; background:#0f1117; color:#e6e9f2; border-radius:14px;
    padding:16px 16px; overflow-x:auto; line-height:1.6; margin:0 0 20px; border:1px solid #22252f}
  pre.code .cm{color:#7f8aa3} pre.code .kw{color:#ff9ecb} pre.code .st{color:#a8e6a1} pre.code .nu{color:#ffc773}
  .options{display:flex; flex-direction:column; gap:10px}
  .opt{display:flex; align-items:center; gap:12px; text-align:left; padding:15px 16px; border-radius:14px;
    border:2px solid var(--line); background:var(--card); box-shadow:var(--shadow); font-size:16px; font-weight:600; color:var(--ink);
    transition:transform .08s}
  .opt:active{transform:scale(.99)}
  .opt .key{width:26px;height:26px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;
    font-size:13px;font-weight:800;color:var(--ink-soft); flex:0 0 auto}
  .opt.sel{border-color:var(--brand); background:color-mix(in srgb,var(--brand) 10%,var(--card))}
  .opt.sel .key{border-color:var(--brand); color:var(--brand)}
  .opt.ok{border-color:var(--good); background:var(--good-soft)}
  .opt.no{border-color:var(--bad); background:var(--bad-soft)}
  .opt.mono{font-family:var(--mono); font-size:15px}
  .fill-in{width:100%; padding:15px 16px; border-radius:14px; border:2px solid var(--line); background:var(--card);
    font-family:var(--mono); font-size:16px; color:var(--ink); box-shadow:var(--shadow)}
  .fill-in:focus{outline:none; border-color:var(--brand)}

  /* ---------- footer check ---------- */
  .foot{position:fixed; left:0; right:0; bottom:0; border-top:2px solid var(--line); background:var(--bg);
    transition:background .2s, border-color .2s}
  .foot-in{max-width:560px; margin:0 auto; padding:16px; display:flex; align-items:center; gap:14px}
  .foot .msg{flex:1; display:flex; align-items:center; gap:10px; font-weight:800; font-size:15px}
  .foot .msg .em{font-size:26px}
  .foot .msg small{display:block; font-weight:600; font-size:13px; color:var(--ink-soft); margin-top:2px}
  .foot.good{background:var(--good-soft); border-color:var(--good)} .foot.good .msg{color:var(--good)}
  .foot.bad{background:var(--bad-soft); border-color:var(--bad)} .foot.bad .msg{color:var(--bad)}
  .btn{border:none; border-radius:14px; padding:15px 26px; font-weight:800; font-size:16px; color:#fff;
    background:var(--brand); box-shadow:0 4px 0 var(--brand-ink); transition:transform .08s, box-shadow .08s; letter-spacing:.01em}
  .btn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--brand-ink)}
  .btn:disabled{background:var(--line-strong); box-shadow:0 4px 0 var(--line); color:var(--bg); cursor:not-allowed}
  .btn.good{background:var(--good); box-shadow:0 4px 0 #229e5a}
  .btn.bad{background:var(--bad); box-shadow:0 4px 0 #d94747}
  .btn.wide{width:100%}

  /* ---------- complete ---------- */
  .done-view{position:fixed; inset:0; z-index:60; background:var(--bg); display:none; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px}
  .done-view.on{display:flex}
  .done-view .big{font-size:64px; animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1)}}
  .done-view h1{font-size:28px; font-weight:800; margin:10px 0 6px}
  .done-view p{color:var(--ink-soft); font-weight:600; margin:0 0 26px}
  .rewards{display:flex; gap:14px; margin-bottom:30px}
  .reward{background:var(--card); border:2px solid var(--line); border-radius:16px; padding:14px 22px; box-shadow:var(--shadow)}
  .reward .rv{font-size:22px; font-weight:800} .reward .rl{font-size:12px; font-weight:800; text-transform:uppercase;
    letter-spacing:.06em; color:var(--ink-soft); margin-top:2px}
  .reward.xp .rv{color:var(--gold)} .reward.flame .rv{color:var(--flame)}

  /* ---------- playground / lab ---------- */
  .lab-cta{width:100%; margin:4px 0 2px; padding:14px; border-radius:14px; border:none; color:#fff; font-weight:800;
    font-size:15px; background:linear-gradient(135deg,#5b6cff,#8a6bff); box-shadow:0 4px 0 var(--brand-ink); transition:transform .08s}
  .lab-cta:active{transform:translateY(2px); box-shadow:0 2px 0 var(--brand-ink)}
  .lab{position:fixed; inset:0; z-index:55; background:var(--bg); display:none; flex-direction:column}
  .lab.on{display:flex}
  .lab-top{display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line)}
  .lab-top b{font-size:16px}
  .lab-tabs{display:flex; gap:8px; margin-left:auto}
  .labtab{padding:8px 14px; border-radius:999px; border:2px solid var(--line); background:var(--card); font-weight:800;
    font-size:13px; color:var(--ink-soft)}
  .labtab[aria-selected="true"]{background:var(--brand); border-color:transparent; color:#fff}
  .lab-examples{display:flex; gap:8px; overflow-x:auto; padding:10px 14px; border-bottom:1px solid var(--line); scrollbar-width:none}
  .lab-examples::-webkit-scrollbar{display:none}
  .exchip{flex:0 0 auto; padding:7px 12px; border-radius:9px; border:1px solid var(--line); background:var(--card);
    font-weight:700; font-size:12.5px; color:var(--ink); white-space:nowrap}
  .exchip[aria-selected="true"]{background:var(--good); border-color:transparent; color:#fff}
  .lab-hint{padding:7px 14px; font-size:12px; color:var(--ink-soft); font-weight:700; text-align:center; background:var(--bg-soft)}
  .lab-split{flex:1; display:grid; grid-template-rows:1fr 1fr; min-height:0}
  #lab-code{border:none; resize:none; padding:14px; font-family:var(--mono); font-size:14px; line-height:1.6;
    background:#0f1117; color:#e6e9f2; outline:none; border-bottom:3px solid var(--brand); tab-size:2}
  .lab-pane{position:relative; background:#fff; min-height:0; overflow:hidden}
  .lab-pane b.tag{position:absolute; top:6px; right:8px; z-index:2; font-size:10px; font-weight:800; letter-spacing:.05em;
    color:#8a8f9c; background:rgba(255,255,255,.85); padding:2px 6px; border-radius:5px}
  #lab-view{border:none; width:100%; height:100%; background:#fff; display:block}
  @media (min-width:720px){ .lab-split{grid-template-rows:none; grid-template-columns:1fr 1fr}
    #lab-code{border-bottom:none; border-right:3px solid var(--brand)} }

  /* ---------- in-lesson live editor ---------- */
  .live-wrap{border-radius:14px; overflow:hidden; border:2px solid var(--line); margin:0 0 20px; box-shadow:var(--shadow)}
  .live-bar{display:flex; align-items:center; gap:6px; padding:7px 12px; background:#0b0d13; color:#7f8aa3;
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.04em}
  .live-bar .dot{width:9px; height:9px; border-radius:50%; background:#3a3e50}
  .live-bar .hint{margin-left:auto; color:#5b6cff}
  .live-code{display:block; width:100%; border:none; resize:vertical; padding:12px; font-family:var(--mono);
    font-size:13.5px; line-height:1.55; background:#0f1117; color:#e6e9f2; outline:none; min-height:88px; tab-size:2}
  .live-pane{position:relative; background:#fff; border-top:3px solid var(--brand)}
  .live-pane .tag{position:absolute; top:5px; right:8px; z-index:2; font-size:10px; font-weight:800; color:#8a8f9c;
    background:rgba(255,255,255,.85); padding:2px 6px; border-radius:5px; pointer-events:none}
  .live-view{width:100%; height:150px; border:none; display:block; background:#fff}

  .empty{color:var(--ink-soft); text-align:center; padding:30px; font-weight:600}
  .foot-hint{position:fixed;left:0;right:0;bottom:0;padding:14px 16px;text-align:center;color:var(--ink-soft);
    font-size:12.5px;font-weight:600; background:var(--bg); border-top:1px solid var(--line)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>

<!-- ================= HOME ================= -->
<div class="app" id="home">
  <div class="topbar">
    <div class="brand"><span class="logo">&lt;/&gt;</span> 코드런</div>
    <div class="stat flame"><span class="ic">🔥</span><span id="s-streak">0</span></div>
    <div class="stat xp"><span class="ic">⭐</span><span id="s-xp">0</span></div>
    <div class="stat"><span class="ic heart-ic">❤</span><span id="s-hearts">5</span></div>
    <button class="icon-btn" id="theme-btn" title="테마 전환" aria-label="테마 전환">◐</button>
  </div>

  <div class="langbar" id="langbar" role="tablist"></div>
  <div class="practice-bar">
    <button class="pbtn" id="random-btn">🎲 랜덤 문제 풀기</button>
    <button class="pbtn ghost" id="free-btn" aria-pressed="false">🔓 자유 모드</button>
  </div>
  <div id="course"></div>
  <div class="foot-hint" id="reset-hint">진행상황은 이 브라우저에 자동 저장돼요 · <a href="#" id="reset-link" style="color:var(--brand)">전체 초기화</a></div>
</div>

<!-- ================= LESSON ================= -->
<div class="lesson" id="lesson">
  <div class="lesson-top">
    <button class="close-x" id="quit" aria-label="나가기">✕</button>
    <div class="pbar"><i id="prog"></i></div>
    <div class="hearts"><span class="heart-ic">❤</span><span id="l-hearts">5</span></div>
  </div>
  <div class="lesson-body" id="qbody"></div>
  <div class="foot" id="foot">
    <div class="foot-in">
      <div class="msg" id="foot-msg"></div>
      <button class="btn" id="check" disabled>확인</button>
    </div>
  </div>
</div>

<!-- ================= COMPLETE ================= -->
<div class="done-view" id="done">
  <div class="big" id="done-emoji">🎉</div>
  <h1 id="done-title">레슨 완료!</h1>
  <p id="done-sub">잘했어요, 계속 이어가 봐요.</p>
  <div class="rewards">
    <div class="reward xp"><div class="rv" id="done-xp">+0</div><div class="rl">획득 XP</div></div>
    <div class="reward flame"><div class="rv" id="done-acc">0%</div><div class="rl">정답률</div></div>
  </div>
  <button class="btn wide" id="done-next" style="max-width:320px">계속하기</button>
</div>

<script>
"use strict";
/* ================= 콘텐츠 데이터 ================= */
const C = s => `<pre class="code">${s}</pre>`;
const COURSES = {
python:{name:"Python",em:"🐍",color:"#3b7dd8",g:"linear-gradient(135deg,#3b7dd8,#5b6cff)",units:[
 {title:"파이썬 첫걸음",guide:"🐍",lessons:[
  {title:"화면에 출력하기",xp:10,q:[
   {t:"choice",k:"개념",q:"파이썬에서 화면에 글자를 출력하는 함수는?",o:["echo()","print()","printf()","cout"],a:1,ex:"파이썬은 print() 로 출력합니다."},
   {t:"choice",k:"출력 결과",q:"이 코드의 실행 결과는?",code:'<span class="kw">print</span>(<span class="st">"Hello"</span>)',o:['"Hello"',"Hello","print Hello","오류"],a:1,ex:"따옴표는 문자열을 감쌀 뿐 화면엔 나오지 않아요."},
   {t:"input",k:"빈칸 채우기",q:"화면에 world 를 출력하도록 빈칸을 채우세요.",code:'_____(<span class="st">"world"</span>)',a:["print"],ex:"print(\"world\") 가 정답입니다."},
   {t:"choice",k:"문자열",q:"문자열(글자)을 나타낼 때 올바른 것은?",o:["Hello","(Hello)","\"Hello\"","[Hello]"],a:2,ex:"문자열은 따옴표로 감쌉니다."},
   {t:"input",k:"직접 입력",q:"숫자 7을 출력하는 코드를 적으세요. (괄호 포함)",a:["print(7)"],ex:"숫자는 따옴표 없이 print(7)."}
  ]},
  {title:"변수와 자료형",xp:10,q:[
   {t:"choice",k:"개념",q:"값을 담아 이름 붙여 저장하는 것을 무엇이라 하나요?",o:["함수","변수","반복","조건"],a:1,ex:"변수(variable)에 값을 저장합니다."},

/* ================= 상태 ================= */
const MAX_HEARTS=5;
const DEF={xp:0,streak:0,lastDay:null,hearts:MAX_HEARTS,heartsDay:null,done:{},theme:null,freeMode:true};
let S=load();
function load(){try{return Object.assign({},DEF,JSON.parse(localStorage.getItem("coderun")||"{}"))}catch(e){return Object.assign({},DEF)}}
function save(){localStorage.setItem("coderun",JSON.stringify(S))}
function today(){return new Date().toISOString().slice(0,10)}
function refillHearts(){ if(S.heartsDay!==today()){S.hearts=MAX_HEARTS;S.heartsDay=today();save();} }

let curLang="python", run=null;

/* ================= 렌더: 홈 ================= */
const $=id=>document.getElementById(id);
function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+"k":n}
function paintStats(){ $("s-streak").textContent=S.streak; $("s-xp").textContent=fmt(S.xp); $("s-hearts").textContent=S.hearts; }

function renderLangs(){
  const bar=$("langbar"); bar.innerHTML="";
  for(const key in COURSES){const c=COURSES[key];
    const b=document.createElement("button");
    b.className="langchip"; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", key===curLang);
    if(key===curLang) b.style.background=c.color;
    b.innerHTML=`<span class="em">${c.em}</span>${c.name}`;
    b.onclick=()=>{curLang=key; renderLangs(); renderCourse();};
    bar.appendChild(b);
  }
}
function lessonState(gi){ // returns 'done' | 'current' | 'locked'
  return null;
}
function renderCourse(){
  const c=COURSES[curLang]; const wrap=$("course"); wrap.innerHTML="";
  let globalIdx=0; let prevAllDone=true;
  c.units.forEach((u,ui)=>{
    const head=document.createElement("div");
    head.className="unit-head"; head.style.background=c.g;
    head.innerHTML=`<div><div class="k">유닛 ${ui+1}</div><h2>${u.title}</h2></div><div class="guide">${u.guide}</div>`;
    wrap.appendChild(head);
    const path=document.createElement("div"); path.className="path";
    u.lessons.forEach((les,li)=>{
      const id=`${curLang}-${ui}-${li}`;
      const done=!!S.done[id];
      const unlocked=S.freeMode||prevAllDone||done;
      const nodeWrap=document.createElement("div"); nodeWrap.className="node-wrap";
      const btn=document.createElement("button");
      const pos = globalIdx%8;
      let cls="node n"+pos;
      let inner="";
      if(done){ cls+=" done"; btn.style.background=c.g; inner=`<span class="crown">👑</span>✓`; }
      else if(unlocked){ cls+=" current"; btn.style.background=c.color; inner="★"; }
      else { cls+=" locked"; inner="🔒"; }
      btn.className=cls; btn.innerHTML=inner;
      btn.disabled=!unlocked && !done;
      btn.setAttribute("aria-label", les.title+(done?" 완료":unlocked?" 시작하기":" 잠김"));
      if(unlocked||done) btn.onclick=()=>startLesson(curLang,ui,li);
      const lbl=document.createElement("div"); lbl.className="node-label"; lbl.textContent=les.title;
      nodeWrap.appendChild(btn); nodeWrap.appendChild(lbl);
      path.appendChild(nodeWrap);
      if(!done) prevAllDone=false;
      globalIdx++;
    });
    wrap.appendChild(path);
  });
  paintStats();
}

/* ================= 레슨 진행 ================= */
function startLesson(lang,ui,li){
  refillHearts();
  if(!S.freeMode && S.hearts<=0){ alert("하트를 모두 썼어요! 내일 다시 채워지거나, 자유 모드를 켜면 하트 없이 연습할 수 있어요 💪"); return; }
  const les=COURSES[lang].units[ui].lessons[li];
  run={lang,ui,li,les,i:0,correct:0,total:les.q.length,hearts:S.hearts,id:`${lang}-${ui}-${li}`,color:COURSES[lang].color,free:S.freeMode};
  $("lesson").classList.add("on");
  document.body.style.overflow="hidden";
  showQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startRandom(lang){
  const c=COURSES[lang]; const pool=[];
  c.units.forEach(u=>u.lessons.forEach(l=>l.q.forEach(q=>pool.push(q))));
  const picked=shuffle(pool.slice()).slice(0,8);
  const les={title:c.name+" 랜덤 연습",xp:15,q:picked};
  run={lang,les,i:0,correct:0,total:picked.length,hearts:S.hearts,id:null,color:c.color,free:S.freeMode};
  $("lesson").classList.add("on");
  document.body.style.overflow="hidden";
  showQ();
}
function showQ(){
  const q=run.les.q[run.i];
  $("prog").style.width=(run.i/run.total*100)+"%";
  $("l-hearts").textContent=run.free?"∞":run.hearts;
  run.answered=false; run.picked=null;
  const foot=$("foot"); foot.className="foot"; $("foot-msg").innerHTML="";
  const chk=$("check"); chk.className="btn"; chk.textContent="확인"; chk.disabled=true;
  chk.onclick=onCheck;
  let html=`<div class="q-kind">${q.k||"문제"}</div><div class="q-title">${q.q}</div>`;
  if(q.code) html+=C(q.code);
  if(q.live) html+=`<div class="live-wrap"><div class="live-bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;${q.run==="js"?"script.js":"index.html"}<span class="hint">✏️ 코드를 고쳐보세요</span></div><textarea class="live-code" id="livecode" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea><div class="live-pane"><span class="tag">실행 결과 ▶</span><iframe class="live-view" id="liveview" sandbox="allow-scripts" title="실행 결과"></iframe></div></div>`;
  const body=$("qbody");
  if(q.t==="input"){
    html+=`<input class="fill-in" id="fill" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="정답 입력..." />`;
    body.innerHTML=html; body.scrollTop=0;
    const f=$("fill");
    f.oninput=()=>{ chk.disabled=f.value.trim()===""; };
    f.onkeydown=e=>{ if(e.key==="Enter"&&!chk.disabled){ if(!run.answered) onCheck(); else chk.onclick(); } };
    setTimeout(()=>f.focus(),50);
  } else {
    const mono = q.o.some(o=>/[(){}=<>;*]|print|SELECT|cout|int /.test(o));
    html+=`<div class="options" id="opts">`+q.o.map((o,idx)=>
      `<button class="opt${mono?' mono':''}" data-i="${idx}"><span class="key">${String.fromCharCode(65+idx)}</span><span>${o}</span></button>`
    ).join("")+`</div>`;
    body.innerHTML=html; body.scrollTop=0;
    body.querySelectorAll(".opt").forEach(el=>{
      el.onclick=()=>{ if(run.answered)return;
        body.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
        el.classList.add("sel"); run.picked=+el.dataset.i; chk.disabled=false;
      };
    });
  }
  if(q.live) setupLive(q);
}
function jsDoc(code){return '<!doctype html><meta charset=utf-8><body style="margin:0;padding:12px;font-family:ui-monospace,monospace;font-size:13px;background:#0f1117;color:#e6e9f2;white-space:pre-wrap;word-break:break-word"><scr'+'ipt>var O=document.body;function W(c,a){var d=document.createElement("div");if(c)d.style.color=c;d.textContent=[].map.call(a,function(x){return (typeof x==="object"&&x!==null)?JSON.stringify(x):String(x)}).join(" ");O.appendChild(d);}console.log=function(){W("",arguments)};console.error=function(){W("#ff6b6b",arguments)};console.warn=function(){W("#ffc773",arguments)};try{'+code+'\n}catch(e){W("#ff6b6b",[e])}</scr'+'ipt></body>';}
function renderLive(mode,code){const f=$("liveview");if(!f)return;f.srcdoc=(mode==="js")?jsDoc(code):code;}
function setupLive(q){const ta=$("livecode");if(!ta)return;ta.value=q.src||"";const go=()=>renderLive(q.run,ta.value);let tmr;ta.oninput=()=>{clearTimeout(tmr);tmr=setTimeout(go,250);};go();}
function norm(s){return s.toLowerCase().replace(/\s+/g,'').replace(/;$/,'')}
function onCheck(){
  const q=run.les.q[run.i]; let ok=false;
  if(q.t==="input"){
    const v=norm($("fill").value); ok=q.a.some(a=>norm(a)===v);
    $("fill").disabled=true;
  } else {
    ok=run.picked===q.a;
    const opts=$("opts").children;
    opts[q.a].classList.add("ok");
    if(!ok && run.picked!=null) opts[run.picked].classList.add("no");
    [...opts].forEach(o=>o.onclick=null);
  }
  run.answered=true;
  const foot=$("foot"), msg=$("foot-msg"), chk=$("check");
  if(ok){ run.correct++; foot.className="foot good";
    msg.innerHTML=`<span class="em">🎉</span><div>정답이에요!</div>`;
    chk.className="btn good";
  } else {
    if(!run.free) run.hearts--;
    foot.className="foot bad";
    const correctText = q.t==="input"? q.a[0] : q.o[q.a];
    msg.innerHTML=`<span class="em">💡</span><div>정답: <span style="font-family:var(--mono)">${correctText}</span><small>${q.ex||""}</small></div>`;
    chk.className="btn bad";
    $("l-hearts").textContent=run.free?"∞":run.hearts;
  }
  chk.textContent="계속"; chk.disabled=false;
  chk.onclick=()=>{
    if(!run.free && run.hearts<=0){ endLesson(false); return; }
    run.i++;
    if(run.i>=run.total) endLesson(true); else showQ();
  };
}
function endLesson(passed){
  $("lesson").classList.remove("on");
  const acc=Math.round(run.correct/run.total*100);
  S.hearts=run.hearts;
  if(passed){
    const gained=run.les.xp + (run.correct===run.total?5:0);
    if(run.id && !S.done[run.id]){ S.done[run.id]=true; }
    S.xp+=gained;
    // streak
    const t=today();
    if(S.lastDay!==t){
      const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
      S.streak = (S.lastDay===y)? S.streak+1 : 1;
      S.lastDay=t;
    }
    save();
    $("done-emoji").textContent=run.correct===run.total?"🏆":"🎉";
    $("done-title").textContent=run.correct===run.total?"완벽해요!":"레슨 완료!";
    $("done-sub").textContent=run.correct===run.total?"만점이에요! 보너스 XP 획득 🎁":"잘했어요, 계속 이어가 봐요.";
    $("done-xp").textContent="+"+gained;
    $("done-acc").textContent=acc+"%";
    $("done").classList.add("on");
    $("done-next").onclick=()=>{ $("done").classList.remove("on"); document.body.style.overflow=""; renderLangs(); renderCourse(); };
  } else {
    save();
    document.body.style.overflow="";
    alert("하트를 다 썼어요 😢 잠시 쉬었다가 다시 도전해요! (하트는 매일 새로 채워집니다)");
    renderCourse();
  }
}

/* ================= 컨트롤 ================= */
$("quit").onclick=()=>{ if(confirm("레슨을 나갈까요? 진행 중인 문제는 저장되지 않아요.")){ $("lesson").classList.remove("on"); document.body.style.overflow=""; S.hearts=run.hearts; save(); renderCourse(); } };
$("reset-link").onclick=e=>{ e.preventDefault(); if(confirm("모든 진행상황(XP·연속학습·완료 레슨)을 초기화할까요?")){ S=Object.assign({},DEF); save(); location.reload(); } };

/* 테마 */
function applyTheme(t){ if(t) document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); }
$("theme-btn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  const isDark = cur? cur==="dark" : dark;
  const next=isDark?"light":"dark";
  S.theme=next; save(); applyTheme(next);
};

/* 자유 모드 · 랜덤 */
$("random-btn").onclick=()=>startRandom(curLang);
function paintFree(){ const b=$("free-btn"); b.setAttribute("aria-pressed",S.freeMode?"true":"false");
  b.textContent=S.freeMode?"✅ 자유 모드 켜짐":"🔓 자유 모드"; }
$("free-btn").onclick=()=>{ S.freeMode=!S.freeMode; save(); paintFree(); renderCourse(); };

/* ================= 시작 ================= */
refillHearts(); applyTheme(S.theme); paintFree(); renderLangs(); renderCourse();
</script>
