  refillHearts();
  if(!S.freeMode && S.hearts<=0){ alert("하트를 모두 썼어요! 내일 다시 채워지거나, 자유 모드를 켜면 하트 없이 연습할 수 있어요 💪"); return; }
  const les=COURSES[lang].units[ui].lessons[li];
  run={lang,ui,li,les,i:0,correct:0,total:les.q.length,hearts:S.hearts,id:`${lang}-${ui}-${li}`,color:COURSES[lang].color,free:S.freeMode};
  try{history.pushState({cr:1},"")}catch(e){}
  $("lesson").classList.add("on");
  document.body.style.overflow="hidden";
  showQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startRandom(lang){
  const c=COURSES[lang]; const pool=[];
  c.units.forEach(u=>u.lessons.forEach(l=>l.q.forEach(q=>pool.push(q))));
  const picked=shuffle(pool.slice()).slice(0,20);
  const les={title:c.name+" 랜덤 연습",xp:15,q:picked};
  run={lang,les,i:0,correct:0,total:picked.length,hearts:S.hearts,id:null,color:c.color,free:S.freeMode};
  openRun();
}
function openRun(){
  try{history.pushState({cr:1},"")}catch(e){}
  $("lesson").classList.add("on");
  document.body.style.overflow="hidden";
  showQ();
}
/* ---- 오답노트 (실습실) ---- */
function wKey(q){ return (q.q||"")+"|"+(q.code||"")+"|"+(q.o?q.o.join("~"):""); }
function recordWrong(lang,q){
  if(!Array.isArray(S.wrongs)) S.wrongs=[];
  const k=wKey(q);
  if(S.wrongs.some(w=>wKey(w.q)===k)) return;
  S.wrongs.push({lang,q});
  if(S.wrongs.length>80) S.wrongs.shift();
  save();
}
function removeWrong(q){
  if(!Array.isArray(S.wrongs)) return;
  const k=wKey(q);
  const before=S.wrongs.length;
  S.wrongs=S.wrongs.filter(w=>wKey(w.q)!==k);
  if(S.wrongs.length!==before){ save(); paintReview(); }
}
function paintReview(){
  const b=$("review-btn"); if(!b) return;
  const n=Array.isArray(S.wrongs)?S.wrongs.length:0;
  b.innerHTML=`📓 오답노트${n?`<span class="badge">${n}</span>`:""}`;
}
function startReview(){
  if(!Array.isArray(S.wrongs)||!S.wrongs.length){
    alert("오답노트가 비어 있어요! 📓\n문제를 풀다 틀리면 여기에 모여, 골라서 다시 풀 수 있어요."); return; }
  const picked=shuffle(S.wrongs.slice()).slice(0,15).map(w=>w.q);
  const les={title:"오답노트 복습",xp:10,q:picked};
  run={lang:curLang,les,i:0,correct:0,total:picked.length,hearts:S.hearts,id:null,color:"#e0533d",free:true,review:true};
  openRun();
}
function showQ(){
  const q=run.les.q[run.i];
  $("prog").style.width=(run.i/run.total*100)+"%";
  $("l-hearts").textContent=run.free?"∞":run.hearts;
  run.answered=false; run.picked=null;
  const foot=$("foot"); foot.className="foot"; $("foot-msg").innerHTML="";
  const chk=$("check"); chk.className="btn"; chk.textContent="확인"; chk.disabled=true;
  chk.onclick=onCheck;
  let html=`<div class="q-kind">${q.k||"문제"}</div><div class="q-title">${q.q}</div>`;
  if(q.code) html+=C(q.code);
  if(q.live||q.t==="code") html+=`<div class="live-wrap"><div class="live-bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;${q.run==="js"?"script.js":"index.html"}<span class="hint">${q.t==="code"?"⌨️ 직접 코드를 완성하세요":"✏️ 코드를 고쳐보세요"}</span></div><textarea class="live-code" id="livecode" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea><div class="live-pane"><span class="tag">실행 결과 ▶</span><iframe class="live-view" id="liveview" sandbox="allow-scripts" title="실행 결과"></iframe></div></div>`;
  const body=$("qbody");
  if(q.t==="input"){
    html+=`<input class="fill-in" id="fill" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="정답 입력..." />`;
    const SY=["(",")","[","]","{","}","'","\"",":",",",".","_","=","-","<",">"];
    html+=`<div class="kbbar" id="kbbar">`+SY.map(s=>{const e=s==="&"?"&amp;":s==="<"?"&lt;":s===">"?"&gt;":s==="\""?"&quot;":s;return `<button type="button" class="ksym" data-s="${e}">${e}</button>`;}).join("")+`</div>`;
    body.innerHTML=html; body.scrollTop=0;
    const f=$("fill");
    f.oninput=()=>{ chk.disabled=f.value.trim()===""; };
    f.onkeydown=e=>{ if(e.key==="Enter"&&!chk.disabled){ if(!run.answered) onCheck(); else chk.onclick(); } };
    const bar=$("kbbar");
    if(bar) bar.querySelectorAll(".ksym").forEach(b=>b.onclick=()=>{
      if(run.answered) return;
      const s=b.dataset.s, st=f.selectionStart==null?f.value.length:f.selectionStart, en=f.selectionEnd==null?f.value.length:f.selectionEnd;
      f.value=f.value.slice(0,st)+s+f.value.slice(en);
      const p=st+s.length; f.focus(); try{f.setSelectionRange(p,p);}catch(_){}
      chk.disabled=f.value.trim()==="";
    });
    setTimeout(()=>f.focus(),50);
  } else if(q.t==="code"){
    body.innerHTML=html; body.scrollTop=0;
  } else {
    const mono = q.o.some(o=>/[(){}=<>;*]|print|SELECT|cout|int /.test(o));
    html+=`<div class="options" id="opts">`+q.o.map((o,idx)=>
      `<button class="opt${mono?' mono':''}" data-i="${idx}"><span class="key">${String.fromCharCode(65+idx)}</span><span>${o}</span></button>`
    ).join("")+`</div>`;
    body.innerHTML=html; body.scrollTop=0;
    body.querySelectorAll(".opt").forEach(el=>{
      el.onclick=()=>{ if(run.answered)return;
        body.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
        el.classList.add("sel"); run.picked=+el.dataset.i; chk.disabled=false;
      };
    });
  }
  if(q.live||q.t==="code"){ setupLive(q); }
  if(q.t==="code"){ chk.disabled=false; }
}
function jsDoc(code){return '<!doctype html><meta charset=utf-8><body style="margin:0;padding:12px;font-family:ui-monospace,monospace;font-size:13px;background:#0f1117;color:#e6e9f2;white-space:pre-wrap;word-break:break-word"><scr'+'ipt>var O=document.body,LOG="";function W(c,a){var t=[].map.call(a,function(x){return (typeof x==="object"&&x!==null)?JSON.stringify(x):String(x)}).join(" ");LOG+=t+"\\n";var d=document.createElement("div");if(c)d.style.color=c;d.textContent=t;O.appendChild(d);}console.log=function(){W("",arguments)};console.error=function(){W("#ff6b6b",arguments)};console.warn=function(){W("#ffc773",arguments)};try{'+code+'\n}catch(e){W("#ff6b6b",[e]);}try{parent.postMessage({__cr:"out",text:LOG},"*")}catch(e){}</scr'+'ipt></body>';}
function renderLive(mode,code){const f=$("liveview");if(!f)return;f.srcdoc=(mode==="js")?jsDoc(code):code;}
function setupLive(q){const ta=$("livecode");if(!ta)return;ta.value=q.src||"";const go=()=>renderLive(q.run,ta.value);let tmr;ta.oninput=()=>{clearTimeout(tmr);tmr=setTimeout(go,250);};go();}
function norm(s){return s.toLowerCase().replace(/\s+/g,'').replace(/;$/,'')}
function onCheck(){
  const q=run.les.q[run.i];
  if(q.t==="code"){
    const chk=$("check"); chk.disabled=true; chk.textContent="실행 중…";
    renderLive(q.run,$("livecode").value);
    setTimeout(()=>{
      const got=norm(liveOut), exp=norm(q.expect||"");
      const ok = exp.length>0 && got.indexOf(exp)>=0;
      applyResult(ok, "출력에 "+q.expect+" 가 나와야 해요", q);
    },300);
    return;
  }
  let ok=false, correctText="";
  if(q.t==="input"){
    const v=norm($("fill").value); ok=q.a.some(a=>norm(a)===v);
    $("fill").disabled=true; correctText=q.a[0];
  } else {
    ok=run.picked===q.a;
    const opts=$("opts").children;
    opts[q.a].classList.add("ok");
    if(!ok && run.picked!=null) opts[run.picked].classList.add("no");
    [...opts].forEach(o=>o.onclick=null);
    correctText=q.o[q.a];
  }
  applyResult(ok, correctText, q);
}
function applyResult(ok, correctText, q){
  run.answered=true;
  bumpDaily();
  const foot=$("foot"), msg=$("foot-msg"), chk=$("check");
  if(ok){ run.correct++; foot.className="foot good";
    msg.innerHTML=`<span class="em">🎉</span><div>정답이에요!</div>`;
    chk.className="btn good";
    if(run.review) removeWrong(q);
  } else {
    recordWrong(run.lang, q);
    if(!run.free) run.hearts--;
    foot.className="foot bad";
    msg.innerHTML=`<span class="em">💡</span><div>${correctText}<small>${q.ex||""}</small></div>`;
    chk.className="btn bad";
    $("l-hearts").textContent=run.free?"∞":run.hearts;
  }
  chk.textContent="계속"; chk.disabled=false;
  chk.onclick=()=>{
    if(!run.free && run.hearts<=0){ endLesson(false); return; }
    run.i++;
    if(run.i>=run.total) endLesson(true); else showQ();
  };
}
function endLesson(passed){
  $("lesson").classList.remove("on");
  const acc=Math.round(run.correct/run.total*100);
  S.hearts=run.hearts;
  if(passed){
    const gained=run.les.xp + (run.correct===run.total?5:0);
    if(run.id && !S.done[run.id]){ S.done[run.id]=true; }
    S.xp+=gained;
    // streak
    const t=today();
    if(S.lastDay!==t){
      const y=new Date(Date.now()-86400000).toISOString().slice(0,10);
      S.streak = (S.lastDay===y)? S.streak+1 : 1;
      S.lastDay=t;
    }
    save();
    $("done-emoji").textContent=run.correct===run.total?"🏆":"🎉";
    $("done-title").textContent=run.correct===run.total?"완벽해요!":"레슨 완료!";
    $("done-sub").textContent=run.correct===run.total?"만점이에요! 보너스 XP 획득 🎁":"잘했어요, 계속 이어가 봐요.";
    $("done-xp").textContent="+"+gained;
    $("done-acc").textContent=acc+"%";
    $("done").classList.add("on");
    $("done-next").onclick=()=>{ $("done").classList.remove("on"); document.body.style.overflow=""; renderLangs(); renderCourse(); };
  } else {
    save();
    document.body.style.overflow="";
    alert("하트를 다 썼어요 😢 잠시 쉬었다가 다시 도전해요! (하트는 매일 새로 채워집니다)");
    renderCourse();
  }
}

/* ================= 컨트롤 ================= */
$("quit").onclick=()=>{ if(confirm("레슨을 나갈까요? 진행 중인 문제는 저장되지 않아요.")){ $("lesson").classList.remove("on"); document.body.style.overflow=""; S.hearts=run.hearts; save(); renderCourse(); } };
$("reset-link").onclick=e=>{ e.preventDefault(); if(confirm("모든 진행상황(XP·연속학습·완료 레슨)을 초기화할까요?")){ S=Object.assign({},DEF); save(); location.reload(); } };

/* 테마 */
function applyTheme(t){ if(t) document.documentElement.setAttribute("data-theme",t); else document.documentElement.removeAttribute("data-theme"); }
$("theme-btn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
  const isDark = cur? cur==="dark" : dark;
  const next=isDark?"light":"dark";
  S.theme=next; save(); applyTheme(next);
};

/* 자유 모드 · 랜덤 */
$("random-btn").onclick=()=>startRandom(curLang);
$("review-btn").onclick=()=>startReview();
function paintFree(){ const b=$("free-btn"); b.setAttribute("aria-pressed",S.freeMode?"true":"false");
  b.textContent=S.freeMode?"✅ 자유 모드 켜짐":"🔓 자유 모드"; }
$("free-btn").onclick=()=>{ S.freeMode=!S.freeMode; save(); paintFree(); renderCourse(); };

/* ================= 시작 ================= */
/* ================= 성장 시스템 (로드맵·레벨·일일목표·프로필) ================= */
const COURSE_PATHS={
 ai:{name:"AI·데이터 개발자",em:"🤖",tracks:["python","sql","numpy","pandas","stat","ml","mleval","dl"]},
 fullstack:{name:"풀스택 개발자",em:"💻",tracks:["web","javascript","react","backend","sql","devops"]},
 data:{name:"데이터 분석가",em:"📊",tracks:["python","sql","stat","pandas","numpy","ml"]},
 free:{name:"자유 탐색",em:"🎯",tracks:[]}
};
const LV_LABEL=["","문법 이해","코드 읽기","응용·문제해결","내부 동작","실무·면접"];
function unitLevel(ui,total){ const per=Math.max(1,Math.ceil(total/5)); return Math.min(5, Math.floor(ui/per)+1); }
function trackProg(key){ const c=COURSES[key]; if(!c) return {d:0,t:0,pct:0}; let d=0,t=0; c.units.forEach((u,ui)=>u.lessons.forEach((l,li)=>{t++; if(S.done[key+"-"+ui+"-"+li])d++;})); return {d,t,pct:t?Math.round(d/t*100):0}; }
function catOf(key){ const c=CATS.find(c=>c.tracks.includes(key)); return c?c.id:"lang"; }
function gotoTrack(key){ if(!COURSES[key])return; curCat=catOf(key); curLang=key; renderCats(); renderLangs(); renderCourse(); try{window.scrollTo({top:0,behavior:"smooth"});}catch(e){window.scrollTo(0,0);} }
function todayCount(){ if(S.dayDate!==today()){S.dayCount=0;S.dayDate=today();} return S.dayCount; }
function bumpDaily(){ if(S.dayDate!==today()){S.dayCount=0;S.dayDate=today();} S.dayCount++; save(); }
function renderDaily(){ const el=$("daily"); if(!el)return; const done=todayCount(),t=S.dailyTarget||10; const pct=Math.min(100,Math.round(done/t*100)); const hit=done>=t;
  el.innerHTML=`<div class="dtop"><span>🔥 오늘 목표</span><span class="done">${hit?"완료! 🎉 계속 가요":done+" / "+t+" 문제"}</span></div><div class="dbar"><i style="width:${pct}%"></i></div>`; }
function renderRoadmap(){ const el=$("roadmap"); if(!el)return; const g=(S.goal&&COURSE_PATHS[S.goal])?S.goal:"free"; const path=COURSE_PATHS[g];
  if(g==="free"||!path.tracks.length){ el.innerHTML=`<div class="rtitle"><span>🎯 자유 탐색 중</span><button id="chg-goal">🚀 코스 선택</button></div>`; const cb=$("chg-goal"); if(cb)cb.onclick=openOnboard; return; }
  const nodes=path.tracks.filter(k=>COURSES[k]).map(k=>{ const c=COURSES[k],pg=trackProg(k); const active=k===curLang?" active":""; return `<button class="rnode${active}" data-k="${k}"><div class="rem">${c.em}</div><div class="rnm">${c.name}</div><div class="rpct">${pg.pct}%</div><div class="rp"><i style="width:${pg.pct}%"></i></div></button>`; }).join("");
  el.innerHTML=`<div class="rtitle"><span>${path.em} ${path.name} 코스</span><button id="chg-goal">변경</button></div><div class="rtrack">${nodes}</div>`;
  el.querySelectorAll(".rnode").forEach(b=>b.onclick=()=>gotoTrack(b.dataset.k)); const cb=$("chg-goal"); if(cb)cb.onclick=openOnboard; }
function openOnboard(){ const o=$("onboard"), card=o.querySelector(".ovcard");
  const opts=[["ai","🤖","AI·데이터 개발자","Python→SQL→NumPy→Pandas→통계→ML→딥러닝"],["fullstack","💻","풀스택 개발자","웹→JS→React→백엔드→DB→배포"],["data","📊","데이터 분석가","Python→SQL→통계→Pandas→ML"],["free","🎯","자유 탐색","코스 없이 원하는 트랙을 자유롭게"]];
  card.innerHTML=`<h2>목표가 뭐예요?</h2><p class="sub">고르면 그 목표에 맞는 학습 코스를 짜드려요. 언제든 바꿀 수 있어요.</p>`+opts.map(o=>`<button class="goalbtn" data-g="${o[0]}"><span class="ge">${o[1]}</span><span><span class="gt">${o[2]}</span><span class="gd">${o[3]}</span></span></button>`).join("");
  card.querySelectorAll(".goalbtn").forEach(b=>b.onclick=()=>{ S.goal=b.dataset.g; S.onboarded=true; save(); const p=COURSE_PATHS[S.goal]; o.classList.remove("on"); document.body.style.overflow=""; if(p&&p.tracks[0]&&COURSES[p.tracks[0]]) gotoTrack(p.tracks[0]); else renderRoadmap(); });
  o.classList.add("on"); document.body.style.overflow="hidden"; }
function openProfile(){ const o=$("profile"), body=$("profile-body");
  const g=(S.goal&&COURSE_PATHS[S.goal])?S.goal:"free"; const keys=(g!=="free"&&COURSE_PATHS[g].tracks.length)?COURSE_PATHS[g].tracks.filter(k=>COURSES[k]):["python","sql","javascript","pandas","ml"].filter(k=>COURSES[k]);
  const rows=keys.map(k=>{ const c=COURSES[k],pg=trackProg(k); return `<div class="skill"><div class="sh"><span>${c.em} ${c.name}</span><span>${pg.pct}% · ${pg.d}/${pg.t}</span></div><div class="sb"><i style="width:${pg.pct}%;background:${c.color}"></i></div></div>`; }).join("");
  body.innerHTML=`<h2>📈 내 성장</h2><p class="sub">완료 레슨 ${Object.keys(S.done).length}개 · ⭐ ${fmt(S.xp)} XP · 🔥 ${S.streak}일 · 📓 오답 ${(S.wrongs||[]).length}</p>${rows}<button class="ovclose" id="prof-close">닫기</button>`;
  $("prof-close").onclick=()=>{ o.classList.remove("on"); document.body.style.overflow=""; };
  o.classList.add("on"); document.body.style.overflow="hidden"; }
$("profile-btn").onclick=openProfile;

refillHearts(); applyTheme(S.theme); paintFree(); renderCats(); renderLangs(); renderCourse();
if(!S.onboarded) openOnboard();
</script>
