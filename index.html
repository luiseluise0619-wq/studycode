{"title":"테스트","guide":"✅","lessons":[{"title":"assert와 단위 테스트","xp":27,"q":[{"t":"choice","k":"assert 동작","q":"assert 문에 대한 설명으로 옳은 것은?","o":["항상 값을 출력한다","조건이 참이면 통과, 거짓이면 AssertionError를 일으킨다","조건이 거짓일 때만 통과한다","함수를 정의하는 문법이다"],"a":1,"ex":"assert 조건 은 조건이 참이면 아무 일 없이 통과하고, 거짓이면 AssertionError를 발생시킵니다."},{"t":"choice","k":"assert 실패","q":"아래 코드를 실행하면?","code":"assert 2 + 2 == 5, \"계산이 틀림\"","o":["아무 일 없이 통과","메시지 '계산이 틀림'과 함께 AssertionError 발생","5를 출력","경고만 출력하고 계속 진행"],"a":1,"ex":"2 + 2는 4라 조건이 거짓이므로, 지정한 메시지와 함께 AssertionError가 발생합니다."},{"t":"choice","k":"통과 assert","q":"아래 코드의 결과는?","code":"assert 1 + 1 == 2\nprint(\"OK\")","o":["AssertionError 발생","아무것도 출력 안 함","OK 출력","2 출력"],"a":2,"ex":"조건이 참이라 assert는 조용히 통과하고, 다음 줄에서 OK가 출력됩니다."},{"t":"choice","k":"단위 테스트 정의","q":"단위 테스트(unit test)의 목적으로 가장 알맞은 것은?","o":["전체 시스템을 한 번에 검증","함수나 클래스 같은 가장 작은 단위를 독립적으로 검증","배포 서버 성능 측정","UI 디자인 확인"],"a":1,"ex":"단위 테스트는 함수/메서드 같은 작은 단위를 고립시켜 개별 동작이 올바른지 검증합니다."},{"t":"input","k":"검증 키워드","q":"pytest에서 결과가 기대와 같은지 확인할 때 주로 사용하는 파이썬 문(statement)은?","a":["assert"],"ex":"pytest는 별도 메서드 없이 평범한 assert 문으로 값을 검증하고, 실패 시 상세한 비교 정보를 보여 줍니다."}]},{"title":"pytest 기초","xp":29,"q":[{"t":"input","k":"함수 접두사","q":"pytest가 자동으로 테스트로 인식하려면 함수 이름이 무엇으로 시작해야 하는가? (밑줄 포함)","a":["test_","test"],"ex":"pytest는 기본적으로 test_로 시작하는 함수를 테스트로 수집해 실행합니다."},{"t":"choice","k":"테스트 함수 예","q":"올바른 pytest 단위 테스트의 형태는?","o":["def check(): return add(2,3)","def test_add(): assert add(2, 3) == 5","def add_test(): print(add(2,3))","class add: pass"],"a":1,"ex":"test_로 시작하는 함수 안에서 assert로 기대값과 비교하는 것이 pytest 단위 테스트의 기본 형태입니다."},{"t":"choice","k":"예외 테스트","q":"어떤 코드가 ZeroDivisionError를 발생시키는지 테스트하려면?","o":["assert 1/0","with pytest.raises(ZeroDivisionError): 1 / 0","try: 1/0 만 작성","assert ZeroDivisionError"],"a":1,"ex":"pytest.raises를 context manager로 사용하면 블록 안 코드가 지정한 예외를 발생시키는지 검증할 수 있습니다."},{"t":"choice","k":"raises 통과","q":"아래 테스트는 통과하는가?","code":"import pytest\n\ndef test_div():\n    with pytest.raises(ZeroDivisionError):\n        1 / 0","o":["통과한다","실패한다 (예외가 안 남)","문법 오류","항상 스킵됨"],"a":0,"ex":"1 / 0은 실제로 ZeroDivisionError를 일으키므로 pytest.raises 기대와 일치해 테스트가 통과합니다."},{"t":"choice","k":"실패 정보","q":"pytest에서 assert가 실패하면 얻는 이점은?","o":["아무 정보도 주지 않음","실제값과 기대값 비교 등 상세한 내역을 보여 줌","자동으로 코드를 고쳐 줌","테스트를 통과로 바꿔 줌"],"a":1,"ex":"pytest는 assert 실패 시 좌변/우변의 실제 값을 분석해 자세한 실패 원인을 출력합니다."}]},{"title":"픽스처, mock, 테스트 종류","xp":28,"q":[{"t":"choice","k":"픽스처 개념","q":"pytest 픽스처(fixture)의 역할은?","o":["테스트를 삭제한다","테스트에 필요한 준비물(데이터, 객체, 연결 등)을 만들어 제공한다","테스트를 느리게 한다","코드를 자동 배포한다"],"a":1,"ex":"픽스처는 테스트가 실행되기 전에 필요한 환경이나 데이터를 준비해 테스트 함수에 전달하는 재사용 가능한 장치입니다."},{"t":"choice","k":"mock 개념","q":"테스트에서 mock(목)을 사용하는 이유로 알맞은 것은?","o":["실제 코드를 전부 삭제하려고","외부 의존성(네트워크, DB 등)을 가짜 객체로 대체해 격리된 테스트를 하려고","테스트를 건너뛰려고","성능을 두 배로 올리려고"],"a":1,"ex":"mock은 외부 API나 DB처럼 제어하기 어려운 의존성을 가짜로 대체해, 대상 코드만 예측 가능하게 격리 테스트하도록 돕습니다."},{"t":"choice","k":"단위 vs 통합","q":"단위 테스트와 통합 테스트의 차이로 옳은 것은?","o":["둘은 완전히 같다","단위는 작은 조각을 고립 검증, 통합은 여러 구성요소가 함께 동작하는지 검증","통합 테스트는 함수 하나만 본다","단위 테스트는 전체 시스템을 본다"],"a":1,"ex":"단위 테스트는 개별 단위를 고립해서, 통합 테스트는 여러 모듈/서비스가 연결되어 올바르게 상호작용하는지를 검증합니다."},{"t":"choice","k":"왜 테스트","q":"자동화된 테스트를 작성하는 주된 이유가 아닌 것은?","o":["회귀(regression) 버그를 조기에 발견","리팩터링 시 안전망 제공","코드 동작에 대한 문서 역할","코드 실행 속도를 무조건 빠르게 만듦"],"a":3,"ex":"테스트는 버그 조기 발견, 안전한 리팩터링, 동작 문서화 등에 도움을 주지만, 프로덕션 코드 실행 속도를 빠르게 해 주는 도구는 아닙니다."},{"t":"input","k":"예외 검증 API","q":"특정 예외 발생을 검증할 때 사용하는 pytest의 함수는? pytest.___","a":["raises"],"ex":"pytest.raises(예외종류)를 with 블록과 함께 써서 예외 발생 여부를 검증합니다."}]}]},
{"title":"표준 라이브러리 실무","guide":"📚","lessons":[{"title":"datetime 날짜와 시간","xp":28,"q":[{"t":"choice","k":"import","q":"date와 timedelta를 가져오는 올바른 import는?","o":["from datetime import date, timedelta","import date, timedelta","from time import date, timedelta","from datetime.date import timedelta"],"a":0,"ex":"date와 timedelta 클래스는 datetime 모듈 안에 있어 from datetime import date, timedelta 로 가져옵니다."},{"t":"input","k":".days","q":"아래 코드의 출력값은?","code":"from datetime import date\nd1 = date(2024, 3, 1)\nd2 = date(2024, 1, 1)\nprint((d1 - d2).days)","a":["60"],"ex":"2024는 윤년이라 1월 31일 + 2월 29일 = 60일. 두 date의 뺄셈은 timedelta이고 .days로 일수를 얻습니다."},{"t":"input","k":"timedelta","q":"아래 코드의 출력값은?","code":"from datetime import timedelta\nt = timedelta(weeks=2)\nprint(t.days)","a":["14"],"ex":"timedelta(weeks=2)는 2주 = 14일. .days는 14를 반환합니다."},{"t":"choice","k":"strftime","q":"date(2024, 12, 25).strftime('%Y-%m-%d')의 결과는?","o":["'2024-12-25'","'24-12-25'","'2024/12/25'","'Dec 25 2024'"],"a":0,"ex":"strftime은 날짜를 문자열로 포맷합니다. %Y=4자리 연도, %m=월, %d=일, 구분자는 지정한 '-' 입니다."},{"t":"input","k":"날짜 더하기","q":"아래 코드의 출력값은? (YYYY-MM-DD 형식)","code":"from datetime import date, timedelta\nd = date(2023, 1, 10) + timedelta(days=30)\nprint(d)","a":["2023-02-09"],"ex":"1월 10일에서 30일 뒤. 1월 남은 21일 + 2월 9일 = 30일이므로 2023-02-09 입니다."}]},{"title":"json 직렬화","xp":27,"q":[{"t":"choice","k":"dumps","q":"json.dumps()의 역할은?","o":["파이썬 객체를 JSON 문자열로 변환","JSON 문자열을 dict로 변환","파일을 여는 함수","dict를 정렬하는 함수"],"a":0,"ex":"dumps는 dump-string, 즉 파이썬 객체(dict, list 등)를 JSON 문자열로 직렬화합니다. 반대는 loads 입니다."},{"t":"input","k":"loads 타입","q":"json.loads('{\"x\": 10}') 이 반환하는 객체의 타입 이름은?","a":["dict","딕셔너리"],"ex":"loads는 JSON 문자열을 파이썬 객체로 역직렬화합니다. JSON 오브젝트 {}는 파이썬 dict가 됩니다."},{"t":"input","k":"dumps 출력","q":"아래 코드의 출력값은?","code":"import json\nprint(json.dumps({'k': 'v'}))","a":["{\"k\": \"v\"}"],"ex":"dumps는 문자열 값을 큰따옴표로 감쌉니다. JSON 표준은 큰따옴표만 허용하므로 결과는 {\"k\": \"v\"} 입니다."},{"t":"choice","k":"loads vs dumps","q":"JSON 문자열을 파이썬 dict로 바꾸려면?"," {"title":"실무 도구와 예외 심화","guide":"🛠️","lessons":[{"title":"try except else finally","xp":29,"q":[{"t":"choice","k":"실행 순서","q":"예외가 발생하지 않을 때 실행되는 블록 순서는?","o":["try → else → finally","try → except → finally","try → finally → else","else → try → finally"],"a":0,"ex":"예외가 없으면 try 본문 후 else가 실행되고, finally는 항상 마지막에 실행됩니다."},{"t":"input","k":"finally 순서","q":"아래 코드의 마지막 출력 단어는?","code":"try:\n    print('try')\n    raise ValueError()\nexcept ValueError:\n    print('except')\nfinally:\n    print('finally')","a":["finally"],"ex":"예외가 나면 try 일부 → except → finally 순서로 실행됩니다. finally는 예외 여부와 무관하게 마지막에 항상 실행됩니다."},{"t":"choice","k":"else 조건","q":"try/except의 else 블록은 언제 실행되는가?","o":["try에서 예외가 발생하지 않았을 때","try에서 예외가 발생했을 때","항상 실행","except 실행 후 항상"],"a":0,"ex":"else는 try 본문이 예외 없이 끝났을 때만 실행됩니다. 예외가 나면 건너뜁니다."},{"t":"choice","k":"finally 특성","q":"finally 블록에 대한 설명으로 옳은 것은?","o":["예외 발생 여부와 관계없이 항상 실행된다","예외가 없을 때만 실행된다","except가 있을 때만 실행된다","return이 있으면 건너뛴다"],"a":0,"ex":"finally는 정상 종료, 예외, return 어떤 경우에도 반드시 실행되어 자원 정리에 쓰입니다."},{"t":"choice","k":"except 매칭","q":"여러 except 절이 있을 때 매칭 방식은?","o":["위에서부터 처음 일치하는 하나만 실행","일치하는 모든 절 실행","마지막 절만 실행","무작위로 하나 실행"],"a":0,"ex":"except 절은 위에서부터 순서대로 검사되어 처음 일치하는 하나만 실행됩니다. 그래서 좁은 예외를 위에 둡니다."}]},{"title":"예외 계층과 raise","xp":28,"q":[{"t":"choice","k":"커스텀 예외","q":"커스텀 예외 클래스는 보통 무엇을 상속하는가?","o":["Exception","object","BaseException 직접","str"],"a":0,"ex":"사용자 정의 예외는 관례적으로 Exception을 상속합니다. BaseException 직접 상속은 시스템 예외까지 잡아 권장되지 않습니다."},{"t":"choice","k":"raise from","q":"raise NewError() from err 구문의 목적은?","o":["원래 예외(err)를 원인으로 연결해 추적을 남긴다","예외를 무시한다","err를 삭제한다","두 예외를 합친다"],"a":0,"ex":"raise ... from ... 은 예외 체이닝으로, __cause__에 원인을 기록해 디버깅 시 원래 원인을 볼 수 있게 합니다."},{"t":"choice","k":"예외 계층","q":"except Exception 이 잡지 않는 것은?","o":["SystemExit","ValueError","KeyError","TypeError"],"a":0,"ex":"SystemExit, KeyboardInterrupt는 BaseException 직속이라 Exception으로 잡히지 않습니다. 나머지는 Exception 하위입니다."},{"t":"input","k":"raise","q":"의도적으로 예외를 발생시키는 파이썬 키워드는?","a":["raise"],"ex":"raise 키워드로 예외를 명시적으로 발생시킵니다. 예: raise ValueError('메시지')."},{"t":"choice","k":"상속 매칭","q":"class MyError(Exception) 일 때 except Exception 은 MyError를 잡는가?","o":["잡는다 (하위 클래스이므로)","못 잡는다","MyError를 먼저 정의해야만 잡는다","런타임 오류가 난다"],"a":0,"ex":"except는 지정한 클래스와 그 하위 클래스를 모두 잡습니다. MyError는 Exception의 하위이므로 잡힙니다."}]},{"title":"with 컨텍스트와 실행 환경","xp":28,"q":[{"t":"choice","k":"with","q":"with open(...) as f: 구문의 장점은?","o":["블록을 벗어날 때 파일을 자동으로 닫는다","파일을 더 빨리 읽는다","파일을 자동 생성한다","예외를 모두 무시한다"],"a":0,"ex":"with는 컨텍스트 매니저로, 블록 종료 시(예외 포함) 자동으로 close 등 정리 작업을 수행합니다."},{"t":"choice","k":"contextlib","q":"함수에 데코레이터로 컨텍스트 매니저를 만들 때 쓰는 것은?","o":["contextlib.contextmanager","functools.wraps","itertools.chain","typing.Optional"],"a":0,"ex":"@contextlib.contextmanager를 제너레이터 함수에 붙이면 yield를 기준으로 진입/정리를 나눠 컨텍스트 매니저를 만들 수 있습니다."},{"t":"choice","k":"__main__","q":"if __name__ == '__main__': 의 용도는?","o":["스크립트를 직접 실행할 때만 코드를 돌린다","항상 실행한다","import를 막는다","클래스를 정의한다"],"a":0,"ex":"모듈이 직접 실행되면 __name__이 '__main__'이 되고, import될 때는 모듈명이 되어 이 블록이 실행되지 않습니다."},{"t":"input","k":"import 시 __name__","q":"모듈 mymod.py를 다른 파일에서 import하면 그 안의 __name__ 값은?","a":["mymod","'mymod'"],"ex":"import되면 __name__은 모듈 이름('mymod')이 되고, 직접 실행할 때만 '__main__'이 됩니다."},{"t":"choice","k":"가상환경","q":"프로젝트별로 패키지를 격리하는 파이썬 도구는?","o":["가상환경(venv)","git","docker만 가능","pip 없이 불가"],"a":0,"ex":"venv 등 가상환경은 프로젝트마다 독립된 패키지 공간을 제공하고, 그 안에서 pip install로 의존성을 설치합니다."}]}]}

{"title":"스코프와 클로저","guide":"🔒","lessons":[{"title":"var/let/const와 호이스팅","xp":24,"q":[{"t":"choice","k":"재선언","q":"같은 스코프에서 같은 이름으로 재선언이 허용되는 키워드는?","o":["let","const","var","셋 다 불가능"],"a":2,"ex":"var는 같은 스코프에서 재선언이 가능하지만, let과 const는 재선언 시 SyntaxError가 발생합니다."},{"t":"input","k":"호이스팅","q":"출력은?","code":"console.log(a);\nvar a = 10;","a":["undefined"],"ex":"var 선언은 호이스팅되어 위로 끌어올려지지만 초기화(=10)는 제자리에 남습니다. 선언은 됐지만 값이 없어 undefined가 출력됩니다."},{"t":"choice","k":"TDZ","q":"이 코드의 결과는?","code":"console.log(b);\nlet b = 10;","o":["undefined","10","ReferenceError","null"],"a":2,"ex":"let/const도 호이스팅되지만 선언 전 구간(TDZ, 일시적 사각지대)에서 접근하면 ReferenceError가 발생합니다."},{"t":"choice","k":"const","q":"const로 선언한 변수에 다른 값을 재할당하면?","o":["정상 동작한다","TypeError가 발생한다","undefined가 된다","조용히 무시된다"],"a":1,"ex":"const는 재할당이 불가능하여 시도 시 TypeError가 발생합니다. 단, 객체의 내부 프로퍼티 변경은 가능합니다."},{"t":"input","k":"블록스코프","q":"출력은?","code":"{\n  let c = 1;\n}\nconsole.log(typeof c);","a":["undefined"],"ex":"let은 블록 스코프라 블록 밖에서 c는 선언되지 않은 상태입니다. 선언되지 않은 변수에 typeof를 쓰면 에러 없이 'undefined' 문자열을 반환합니다."}]},{"title":"함수 스코프 vs 블록 스코프","xp":25,"q":[{"t":"choice","k":"var스코프","q":"var가 따르는 스코프 단위는?","o":["블록 스코프","함수 스코프","전역 스코프만","모듈 스코프"],"a":1,"ex":"var는 함수 스코프를 따릅니다. if나 for 같은 블록을 무시하고 자신이 속한 함수 전체에서 유효합니다."},{"t":"input","k":"var누출","q":"출력은?","code":"for (var i = 0; i &lt; 3; i++) {}\nconsole.log(i);","a":["3"],"ex":"var는 블록 스코프가 아니므로 반복문이 끝난 뒤에도 i가 남습니다. 조건 i&lt;3이 거짓이 되는 순간의 값 3이 출력됩니다."},{"t":"input","k":"let블록","q":"출력은?","code":"for (let j = 0; j &lt; 3; j++) {}\nconsole.log(typeof j);","a":["undefined"],"ex":"let으로 선언한 j는 for 블록 안에서만 존재합니다. 반복문 밖에서는 선언되지 않아 typeof 결과는 'undefined'입니다."},{"t":"choice","k":"if누출","q":"출력은?","code":"if (true) {\n  var x = 1;\n}\nconsole.log(x);","o":["1","undefined","ReferenceError","0"],"a":0,"ex":"var는 블록을 무시하므로 if 블록 안에서 선언해도 밖에서 접근 가능합니다. 값 1이 출력됩니다."},{"t":"choice","k":"블록단위","q":"let과 const가 유효한 범위의 단위는?","o":["함수 전체","중괄호 블록","파일 전체","가장 가까운 반복문"],"a":1,"ex":"let/const는 중괄호로 감싸인 블록 스코프를 따릅니다. 블록이 끝나면 접근할 수 없습니다."}]},{"title":"클로저와 렉시컬 스코프","xp":27,"q":[{"t":"choice","k":"var함정","q":"출력 순서는?","code":"for (var i = 0; i &lt; 3; i++) {\n  setTimeout(() =&gt; console.log(i), 0);\n}","o":["0 1 2","3 3 3","0 0 0","1 2 3"],"a":1,"ex":"var i는 함수 스코프라 세 콜백이 같은 i를 공유합니다. setTimeout은 반복문이 끝난 뒤 실행되므로 i 값 3이 세 번 출력됩니다."},{"t":"choice","k":"let해결","q":"출력 순서는?","code":"for (let i = 0; i &lt; 3; i++) {\n  setTimeout(() =&gt; console.log(i), 0);\n}","o":["0 1 2","3 3 3","0 0 0","ReferenceError"],"a":0,"ex":"let은 반복마다 새로운 i를 블록 스코프로 만듭니다. 각 콜백이 자기 시점의 i를 기억하는 클로저가 되어 0 1 2가 출력됩니다."},{"t":"choice","k":"클로저정의","q":"클로저(closure)를 가장 잘 설명한 것은?","o":["함수를 즉시 실행하는 문법","함수가 선언된 위치의 스코프(변수)를 기억하는 것","객체를 복사하는 기능","비동기 처리를 위한 큐"],"a":1,"ex":"클로저는 함수가 선언된 렉시컬 환경의 변수를 계속 참조·기억하는 특성입니다. 외부 함수가 끝나도 그 변수에 접근할 수 있습니다."},{"t":"input","k":"카운터","q":"출력은?","code":"function makeCounter() {\n  let count = 0;\n  return () =&gt; ++count;\n}\nconst c = makeCounter();\nc();\nc();\nconsole.log(c());","a":["3"],"ex":"반환된 함수가 count를 기억하는 클로저입니다. c()가 세 번 호출되며 count가 1, 2, 3으로 증가하고 마지막 결과 3이 출력됩니다."},{"t":"choice","k":"렉시컬","q":"렉시컬 스코프(lexical scope)의 의미로 옳은 것은?","o":["함수가 호출된 위치로 스코프가 결정된다","함수가 정의된(작성된) 위치로 스코프가 결정된다","실행 시점에 스코프가 무작위로 정해진다","전역에서만 변수를 찾는다"],"a":1,"ex":"JavaScript는 렉시컬 스코프를 사용합니다. 스코프는 함수를 어디서 호출했는지가 아니라 코드상 어디에 작성했는지로 결정됩니다."}]}]},
{"title":"this와 프로토타입","guide":"🧬","lessons":[{"title":"this 바인딩","xp":26,"q":[{"t":"input","k":"메서드this","q":"출력은?","code":"const obj = {\n  name: 'JS',\n  getName() {\n    return this.name;\n  }\n};\nconsole.log(obj.getName());","a":["JS"],"ex":"메서드를 obj.getName() 형태로 호출하면 this는 점 앞의 객체 obj를 가리킵니다. 따라서 this.name은 'JS'입니다."},{"t":"choice","k":"화살표this","q":"화살표 함수의 this에 대한 설명으로 옳은 것은?","o":["호출한 객체를 가리킨다","자신만의 this가 없고 바깥 스코프의 this를 그대로 쓴다","항상 전역 객체를 가리킨다","항상 undefined이다"],"a":1,"ex":"화살표 함수는 자신의 this를 가지지 않습니다. 정의될 때 감싸고 있던 바깥(렉시컬) 스코프의 this를 그대로 사용합니다."},{"t":"input","k":"화살표상속","q":"출력은?","code":"const obj = {\n  count: 0,\n  inc() {\n    const add = () =&gt; this.count++;\n    add();\n    return this.count;\n  }\n};\nconsole.log(obj.inc());","a":["1"],"ex":"inc()는 메서드 호출이라 this가 obj입니다. 내부 화살표 함수 add는 this를 가지지 않아 inc의 this(obj)를 그대로 씁니다. count가 1로 증가해 1이 출력됩니다."},{"t":"choice","k":"call기능","q":"call, apply, bind의 공통 목적은?","o":["함수의 this를 원하는 값으로 지정한다","함수를 비동기로 만든다","객체를 깊은 복사한다","변수를 호이스팅한다"],"a":0,"ex":"call/apply/bind는 함수를 호출할 때 this가 무엇을 가리킬지 명시적으로 지정하는 메서드입니다."},{"t":"input","k":"callthis","q":"출력은?","code":"function greet() {\n  return 'Hi ' + this.name;\n}\nconst p = { name: 'Kim' };\nconsole.log(greet.call(p));","a":["Hi Kim"],"ex":"call(p)은 greet를 호출하면서 this를 p로 지정합니다. 따라서 this.name은 'Kim'이 되어 'Hi Kim'이 출력됩니다."}]},{"title":"call / apply / bind","xp":26,"q":[{"t":"choice","k":"call vs apply","q":"call과 apply의 차이는?","o":["call은 this를 못 바꾼다","apply는 인자를 배열로 전달한다","apply는 비동기다","차이가 전혀 없다"],"a":1,"ex":"call은 인자를 하나씩 나열해 전달하고, apply는 인자들을 하나의 배열로 전달합니다. this 지정 기능은 동일합니다."},{"t":"input","k":"bind부분","q":"출력은?","code":"function f(a, b) {\n  return a + b + this.x;\n}\nconst g = f.bind({ x: 10 }, 1);\nconsole.log(g(2));","a":["13"],"ex":"bind는 this를 {x:10}으로 고정하고 첫 인자 a=1을 미리 채운 새 함수를 만듭니다. g(2)는 b=2가 되어 1 + 2 + 10 = 13입니다."},{"t":"input","k":"apply배열","q":"출력은?","code":"function sum(a, b, c) {\n  return a + b + c;\n}\nconsole.log(sum.apply(null, [1, 2, 3]));","a":["6"],"ex":"apply는 두 번째 인자인 배열 [1,2,3]을 각각 a, b, c로 펼쳐 전달합니다. 따라서 1 + 2 + 3 = 6입니다."},{"t":"choice","k":"bind특징","q":"bind에 대한 설명으로 옳은 것은?","o":["즉시 함수를 실행한다","this가 고정된 새 함수를 반환한다","원본 함수를 삭제한다","배열만 인자로 받는다"],"a":1,"ex":"bind는 함수를 실행하지 않고, this(및 일부 인자)가 미리 묶인 새로운 함수를 반환합니다. 나중에 호출해 사용합니다."},{"t":"input","k":"maxapply","q":"출력은?","code":"console.log(Math.max.apply(null, [3, 7, 2]));","a":["7"],"ex":"Math.max는 개별 인자를 받는데, apply로 배열 [3,7,2]를 펼쳐 전달하면 Math.max(3,7,2)와 같아져 최댓값 7이 나옵니다."}]},{"title":"프로토타입과 new","xp":28,"q":[{"t":"choice","k":"proto차이","q":"prototype과 __proto__의 관계로 옳은 것은?","o":["둘은 완전히 같은 것이다","prototype은 생성자 함수의 속성, __proto__는 인스턴스가 자기 원형을 가리키는 링크다","__proto__는 함수에만 있다","prototype은 인스턴스에만 있다"],"a":1,"ex":"prototype은 생성자 함수가 가진 객체이고, __proto__는 인스턴스가 자신의 원형(생성자의 prototype)을 참조하는 내부 링크입니다."},{"t":"input","k":"prototype메서드","q":"출력은?","code":"function Dog(name) {\n  this.name = name;\n}\nDog.prototype.bark = function () {\n  return this.name + ' 멍';\n};\nconst d = new Dog('바둑');\nconsole.log(d.bark());","a":["바둑 멍"],"ex":"bark는 Dog.prototype에 정의되어 모든 인스턴스가 공유합니다. d.bark()에서 this는 d이므로 this.name은 '바둑', 결과는 '바둑 멍'입니다."},{"t":"choice","k":"new동작","q":"new 연산자가 하는 일이 아닌 것은?","o":["빈 객체를 만든다","this를 새 객체에 바인딩한다","새 객체의 프로토타입을 생성자.prototype으로 연결한다","함수를 비동기로 실행한다"],"a":3,"ex":"new는 빈 객체 생성, 프로토타입 연결, this 바인딩, (반환값이 없으면) 그 객체 반환을 수행합니다. 비동기 실행과는 무관합니다."},{"t":"input","k":"own속성","q":"출력은?","code":"function A() {}\nA.prototype.x = 1;\nconst a = new A();\nconsole.log(a.hasOwnProperty('x'));","a":["false"],"ex":"x는 인스턴스 a 자신이 아니라 프로토타입에 있는 속성입니다. hasOwnProperty는 자기 자신의 속성만 검사하므로 false입니다."},{"t":"choice","k":"체인끝","q":"프로토타입 체인을 따라 끝까지 올라가면 마지막에 도달하는 값은?","o":["null","undefined","Object 자기 자신","0"],"a":0,"ex":"프로토타입 체인의 최상단은 Object.prototype이며, 그 __proto__는 null입니다. 여기서 속성 탐색이 종료됩니다."}]}]},
{"title":"비동기와 Promise","guide":"⏳","lessons":[{"title":"Promise 기초","xp":24,"q":[{"t":"choice","k":"상태","q":"Promise가 가질 수 있는 3가지 상태는?","o":["start, run, end","pending, fulfilled, rejected","open, close, wait","sync, async, done"],"a":1,"ex":"Promise는 대기(pending), 이행(fulfilled), 거부(rejected) 세 상태를 가집니다. 한 번 이행/거부되면 상태가 바뀌지 않습니다."},{"t":"input","k":"then체이닝","q":"출력은?","code":"Promise.resolve(1)\n  .then(x =&gt; x + 1)\n  .then(x =&gt; console.log(x));","a":["2"],"ex":"resolve(1)의 값 1이 첫 then에서 +1 되어 2가 되고, 그 값이 다음 then으로 전달되어 2가 출력됩니다."},{"t":"choice","k":"catch","q":"Promise가 reject되었을 때 이를 처리하는 메서드는?","o":[".then()",".catch()",".finally()",".resolve()"],"a":1,"ex":"거부(reject)된 Promise의 에러는 .catch()에서 처리합니다. then의 두 번째 인자로도 처리할 수 있습니다."},{"t":"input","k":"then값","q":"출력은?","code":"Promise.resolve(5)\n  .then(x =&gt; x * 2)\n  .then(x =&gt; console.log(x));","a":["10"],"ex":"resolve(5)의 5가 첫 then에서 2배가 되어 10이 되고, 그 10이 다음 then으로 전달되어 출력됩니다."},{"t":"choice","k":"then반환","q":".then()이 반환하는 것은?","o":["원래 값 그대로","새로운 Promise","undefined 고정","콜백 함수"],"a":1,"ex":"then은 항상 새로운 Promise를 반환합니다. 그래서 then을 연속으로 이어붙이는 체이닝이 가능합니다."}]},{"title":"이벤트 루프와 실행 순서","xp":29,"q":[{"t":"choice","k":"실행순서","q":"출력 순서는?","code":"console.log('A');\nsetTimeout(() =&gt; console.log('B'), 0);\nPromise.resolve().then(() =&gt; console.log('C'));\nconsole.log('D');","o":["A B C D","A D C B","A D B C","A C D B"],"a":1,"ex":"동기 코드 A, D가 먼저 실행됩니다. 그다음 마이크로태스크인 Promise의 C, 마지막으로 매크로태스크인 setTimeout의 B가 실행되어 A D C B입니다."},{"t":"choice","k":"우선순위","q":"마이크로태스크와 매크로태스크의 실행 우선순위는?","o":["매크로태스크가 먼저","마이크로태스크가 먼저","동시에 실행","무작위"],"a":1,"ex":"이벤트 루프는 매 동기 코드 실행 후 마이크로태스크 큐(Promise 등)를 모두 비운 뒤에야 매크로태스크(setTimeout 등)를 실행합니다."},{"t":"choice","k":"마이크로","q":"출력 순서는?","code":"console.log(1);\nPromise.resolve().then(() =&gt; console.log(2));\nconsole.log(3);","o":["1 2 3","1 3 2","2 1 3","3 1 2"],"a":1,"ex":"동기 코드 1과 3이 먼저 출력됩니다. then의 콜백은 마이크로태스크라 동기 코드가 끝난 뒤 실행되어 2가 마지막입니다. 결과는 1 3 2."},{"t":"choice","k":"timeout0","q":"setTimeout(fn, 0)의 의미로 옳은 것은?","o":["fn이 즉시 동기적으로 실행된다","fn이 매크로태스크 큐에 들어가 현재 동기 코드 이후 실행된다","fn이 절대 실행되지 않는다","fn이 마이크로태스크보다 먼저 실행된다"],"a":1,"ex":"지연 0ms라도 콜백은 즉시 실행되지 않고 매크로태스크 큐에 등록됩니다. 현재 동기 코드와 마이크로태스크가 모두 끝난 뒤 실행됩니다."},{"t":"choice","k":"promise먼저","q":"출력 순서는?","code":"setTimeout(() =&gt; console.log('timeout'), 0);\nPromise.resolve().then(() =&gt; console.log('promise'));","o":["timeout promise","promise timeout","동시에 출력","아무것도 안 나옴"],"a":1,"ex":"Promise의 then은 마이크로태스크, setTimeout은 매크로태스크입니다. 마이크로태스크가 먼저 처리되므로 promise가 먼저, timeout이 나중에 출력됩니다."}]},{"title":"async/await와 Promise.all","xp":27,"q":[{"t":"choice","k":"async반환","q":"async 함수가 반환하는 값의 타입은?","o":["항상 undefined","항상 Promise","일반 객체","숫자"],"a":1,"ex":"async 함수는 무엇을 return하든 그 값을 감싼 Promise를 반환합니다. 그래서 결과를 then이나 await로 받을 수 있습니다."},{"t":"input","k":"asyncthen","q":"출력은?","code":"async function f() {\n  return 1;\n}\nf().then(v =&gt; console.log(v));","a":["1"],"ex":"async 함수 f는 1을 감싼 Promise를 반환합니다. then으로 그 값을 꺼내면 1이 출력됩니다."},{"t":"input","k":"await","q":"출력은?","code":"async function g() {\n  const x = await Promise.resolve(10);\n  console.log(x + 5);\n}\ng();","a":["15"],"ex":"await는 Promise가 이행될 때까지 기다렸다가 그 값을 꺼냅니다. x는 10이 되고 10 + 5 = 15가 출력됩니다."},{"t":"input","k":"promiseall","q":"출력은? (배열 형태로)","code":"Promise.all([Promise.resolve(1), Promise.resolve(2)])\n  .then(arr =&gt; console.log(arr));","a":["[1,2]","[ 1, 2 ]","1,2"],"ex":"Promise.all은 모든 Promise가 이행되면 결과를 순서대로 담은 배열을 넘겨줍니다. 따라서 [1, 2]가 출력됩니다."},{"t":"choice","k":"all거부","q":"Promise.all에 넘긴 Promise 중 하나라도 reject되면?","o":["나머지 결과만 반환한다","전체가 즉시 reject된다","null을 반환한다","그 항목을 무시한다"],"a":1,"ex":"Promise.all은 하나라도 거부되면 즉시 전체가 거부(reject)되며, 첫 번째 거부 이유를 그대로 전달합니다. 모두 성공해야 이행됩니다."}]}]}
]},

{"title":"JOIN 심화","guide":"🔗","lessons":[{"title":"INNER JOIN과 LEFT JOIN","xp":20,"q":[{"t":"choice","k":"개념","q":"INNER JOIN은 두 테이블에서 어떤 행을 반환하나요?","o":["양쪽 테이블에 모두 매칭되는 행만","왼쪽 테이블의 모든 행","오른쪽 테이블의 모든 행","매칭되지 않는 행만"],"a":0,"ex":"INNER JOIN은 조인 조건이 일치하는 행만 반환합니다."},{"t":"choice","k":"JOIN","q":"LEFT JOIN은 무엇을 보장하나요?","o":["왼쪽 테이블의 모든 행을 포함하고 매칭 없으면 NULL","오른쪽 테이블의 모든 행","매칭된 행만","중복 행만"],"a":0,"ex":"LEFT JOIN은 왼쪽(FROM) 테이블의 모든 행을 유지하고, 오른쪽에 매칭이 없으면 NULL로 채웁니다."},{"t":"input","k":"빈칸","q":"두 테이블에서 조건이 일치하는 행만 가져오는 조인은 ____ JOIN이다.","a":["INNER"],"ex":"INNER JOIN은 교집합에 해당하는 행만 반환합니다."},{"t":"choice","k":"쿼리","q":"이 쿼리에서 주문이 없는 고객은 어떻게 표시되나요?","o":["amount가 NULL로 표시되며 고객은 결과에 포함","고객이 결과에서 제외","오류 발생","amount가 0으로 표시"],"a":0,"code":"SELECT c.name, o.amount\nFROM customers c\nLEFT JOIN orders o ON c.id = o.customer_id","ex":"LEFT JOIN이므로 주문 없는 고객도 포함되고 orders 컬럼은 NULL이 됩니다."},{"t":"choice","k":"개념","q":"LEFT JOIN과 RIGHT JOIN의 관계로 옳은 것은?","o":["테이블 순서를 바꾸면 서로 같은 결과를 낼 수 있다","완전히 다른 연산이라 대체 불가","RIGHT JOIN이 항상 더 많은 행 반환","둘 다 교집합만 반환"],"a":0,"ex":"A LEFT JOIN B 는 B RIGHT JOIN A 와 동일한 결과를 냅니다."}]},{"title":"RIGHT JOIN과 여러 테이블","xp":20,"q":[{"t":"choice","k":"JOIN","q":"RIGHT JOIN은 어떤 테이블의 모든 행을 유지하나요?","o":["오른쪽(JOIN 뒤) 테이블","왼쪽 테이블","양쪽 모두","어느 쪽도 아님"],"a":0,"ex":"RIGHT JOIN은 오른쪽 테이블의 모든 행을 유지하고 왼쪽에 매칭이 없으면 NULL로 채웁니다."},{"t":"input","k":"빈칸","q":"테이블 3개를 조인하려면 보통 JOIN 절이 몇 번 필요한가요? (숫자)","a":["2"],"ex":"테이블 N개를 연결하려면 보통 N-1개의 JOIN 절이 필요합니다."},{"t":"choice","k":"개념","q":"여러 테이블을 조인할 때 각 JOIN마다 필요한 절은?","o":["ON (조인 조건)","GROUP BY","HAVING","LIMIT"],"a":0,"ex":"각 JOIN에는 두 테이블을 연결하는 조건을 지정하는 ON 절이 필요합니다."},{"t":"choice","k":"쿼리","q":"이 쿼리는 몇 개의 테이블을 조인하나요?","o":["3개","2개","4개","1개"],"a":0,"code":"SELECT *\nFROM a\nJOIN b ON a.id = b.a_id\nJOIN c ON b.id = c.b_id","ex":"a, b, c 세 테이블을 두 번의 JOIN으로 연결합니다."},{"t":"choice","k":"개념","q":"양쪽 테이블의 매칭되지 않는 행까지 모두 포함하는 조인은? (표준 SQL)","o":["FULL OUTER JOIN","INNER JOIN","CROSS JOIN","SELF JOIN"],"a":0,"ex":"FULL OUTER JOIN은 양쪽의 모든 {"title":"CASE와 조건식","guide":"🔀","lessons":[{"title":"CASE 기본","xp":20,"q":[{"t":"choice","k":"CASE","q":"CASE 구문을 끝내는 키워드는?","o":["END","STOP","FINISH","CLOSE"],"a":0,"ex":"CASE 식은 반드시 END로 닫아야 합니다."},{"t":"choice","k":"CASE","q":"score 값이 85일 때 아래 CASE의 결과는?","code":"CASE WHEN score &gt;= 90 THEN 'A'\n     WHEN score &gt;= 80 THEN 'B'\n     ELSE 'C' END","o":["B","A","C","NULL"],"a":0,"ex":"위에서부터 조건을 확인합니다. 85는 90 미만이라 첫 조건은 거짓, 80 이상이라 두 번째가 참이므로 'B'."},{"t":"choice","k":"CASE","q":"어떤 WHEN 조건도 만족하지 않고 ELSE도 없으면 CASE의 결과는?","o":["NULL","0","오류","빈 문자열"],"a":0,"ex":"ELSE가 없고 참인 조건이 없으면 CASE는 NULL을 반환합니다."},{"t":"input","k":"빈칸","q":"조건을 지정하는 키워드를 채우세요: CASE ___ score &gt; 60 THEN '합격' END","a":["WHEN"],"ex":"CASE 다음에 WHEN 조건 THEN 결과 형태로 작성합니다."},{"t":"choice","k":"CASE","q":"CASE WHEN 1=1 THEN '참' ELSE '거짓' END 의 결과는?","o":["참","거짓","NULL","오류"],"a":0,"ex":"1=1은 항상 참이므로 THEN의 '참'이 반환됩니다."}]},{"title":"CASE 활용","xp":24,"q":[{"t":"choice","k":"CASE","q":"grade 값이 3일 때 아래 단순 CASE의 결과는?","code":"CASE grade WHEN 1 THEN '금'\n           WHEN 2 THEN '은'\n           WHEN 3 THEN '동' END","o":["동","은","금","NULL"],"a":0,"ex":"단순 CASE는 grade 값과 각 값을 비교합니다. 3과 일치하는 '동'이 반환됩니다."},{"t":"choice","k":"CASE","q":"단순 CASE 식(CASE 표현식 WHEN 값...)에 대한 설명으로 옳은 것은?","o":["특정 값과 같은지(=) 비교할 때 사용한다","부등호(&lt;, &gt;) 범위 비교에 적합하다","END를 생략할 수 있다","ELSE가 반드시 필요하다"],"a":0,"ex":"단순 CASE는 등호 일치 비교에 쓰이고, 범위 비교는 검색 CASE(CASE WHEN 조건)를 씁니다."},{"t":"choice","k":"CASE","q":"score가 60일 때 결과는?","code":"CASE WHEN score &gt;= 60 THEN '합격'\n     ELSE '불합격' END","o":["합격","불합격","NULL","오류"],"a":0,"ex":"&gt;= 는 같은 값도 포함합니다. 60 &gt;= 60은 참이므로 '합격'."},{"t":"input","k":"빈칸","q":"CASE 결과에 별칭을 주려면 END 뒤에 어떤 키워드를 쓰나요? (키워드만)","a":["AS"],"ex":"CASE ... END AS 별칭 형태로 컬럼에 이름을 붙입니다."},{"t":"choice","k":"CASE","q":"CASE 식을 사용할 수 있는 위치는?","o":["SELECT 절만","WHERE 절만","ORDER BY 절만","위 모두 가능"],"a":3,"ex":"CASE는 SELECT, WHERE, ORDER BY 등 다양한 위치에서 사용할 수 있습니다."}]},{"title":"IF 함수","xp":22,"q":[{"t":"choice","k":"IF","q":"IF(5 &gt; 3, 'Y', 'N') 의 결과는?","o":["Y","N","NULL","오류"],"a":0,"ex":"IF(조건, 참일때, 거짓일때) 구조입니다. 5 &gt; 3이 참이므로 'Y'."},{"t":"choice","k":"IF","q":"MySQL의 IF 함수 인자 순서로 옳은 것은?","o":["IF(조건, 참일때 값, 거짓일때 값)","IF(참일때 값, 조건, 거짓일때 값)","IF(거짓일때 값, 참일때 값, 조건)","IF(조건, 거짓일때 값, 참일때 값)"],"a":0,"ex":"첫 번째가 조건, 두 번째가 참일 때 값, 세 번째가 거짓일 때 값입니다."},{"t":"input","k":"빈칸","q":"IF(10 &gt; 20, 100, 200) 의 결과 숫자를 쓰세요.","a":["200"],"ex":"10 &gt; 20은 거짓이므로 세 번째 값 200이 반환됩니다."},{"t":"choice","k":"IF","q":"IF 함수와 같은 역할을 하는 표준 SQL 조건식은?","o":["CASE","WHERE","JOIN","GROUP BY"],"a":0,"ex":"IF는 MySQL 함수이며, 표준 SQL에서는 CASE로 같은 조건 분기를 표현합니다."},{"t":"choice","k":"IF","q":"IF(1=1, 'a', 'b') 의 결과는?","o":["a","b","NULL","오류"],"a":0,"ex":"1=1은 참이므로 두 번째 인자 'a'가 반환됩니다."}]}]},
{"title":"NULL 처리","guide":"⭕","lessons":[{"title":"COALESCE","xp":22,"q":[{"t":"choice","k":"NULL","q":"COALESCE(NULL, NULL, 'A', 'B') 의 결과는?","o":["A","B","NULL","AB"],"a":0,"ex":"COALESCE는 인자들 중 처음으로 NULL이 아닌 값을 반환합니다. 여기서는 'A'."},{"t":"choice","k":"NULL","q":"COALESCE(NULL, 5) 의 결과는?","o":["5","NULL","0","오류"],"a":0,"ex":"첫 인자가 NULL이므로 다음 값 5가 반환됩니다."},{"t":"input","k":"빈칸","q":"COALESCE(NULL, NULL, 10) 의 결과 숫자를 쓰세요.","a":["10"],"ex":"처음 두 값이 NULL이므로 NULL이 아닌 10이 반환됩니다."},{"t":"choice","k":"NULL","q":"COALESCE 함수의 특징으로 옳은 것은?","o":["인자를 여러 개 받을 수 있다","인자를 2개만 받는다","NULL만 반환한다","숫자만 처리한다"],"a":0,"ex":"COALESCE는 인자 개수 제한이 없어 여러 값을 순서대로 검사합니다."},{"t":"choice","k":"NULL","q":"COALESCE(salary, 0) 의 의미로 옳은 것은?","o":["salary가 NULL이면 0으로 대체한다","salary를 항상 0으로 만든다","salary가 0이면 NULL로 바꾼다","salary를 삭제한다"],"a":0,"ex":"salary가 NULL일 때만 0을 반환하고, 값이 있으면 그 값을 그대로 씁니다."}]},{"title":"IFNULL / NVL","xp":22,"q":[{"t":"choice","k":"NULL","q":"IFNULL(NULL, 'X') 의 결과는?","o":["X","NULL","0","오류"],"a":0,"ex":"IFNULL(값, 대체값)은 첫 값이 NULL이면 대체값을 반환합니다. 결과는 'X'."},{"t":"choice","k":"NULL","q":"IFNULL(10, 20) 의 결과는?","o":["10","20","NULL","30"],"a":0,"ex":"첫 값 10이 NULL이 아니므로 그대로 10이 반환됩니다."},{"t":"input","k":"빈칸","q":"Oracle에서 IFNULL과 같은 역할을 하는 함수 이름은? (함수 이름만)","a":["NVL"],"ex":"Oracle에서는 NVL(값, 대체값)을 사용합니다. MySQL의 IFNULL과 같은 역할입니다."},{"t":"choice","k":"NULL","q":"NVL(NULL, 100) 의 결과는?","o":["100","NULL","0","오류"],"a":0,"ex":"첫 값이 NULL이므로 대체값 100이 반환됩니다."},{"t":"choice","k":"NULL","q":"IFNULL과 COALESCE의 차이로 옳은 것은?","o":["IFNULL은 인자가 2개, COALESCE는 여러 개","IFNULL이 인자를 더 많이 받는다","둘 다 인자를 1개만 받는다","COALESCE는 NULL만 반환한다"],"a":0,"ex":"IFNULL은 두 인자만 받고, COALESCE는 여러 인자를 순서대로 검사할 수 있습니다."}]},{"title":"NULL과 집계","xp":24,"q":[{"t":"choice","k":"집계","q":"COUNT(*) 와 COUNT(column) 의 차이로 옳은 것은?","o":["COUNT(column)은 NULL을 제외하고 센다","COUNT(*)이 NULL을 제외한다","둘은 항상 같은 값이다","COUNT(column)은 NULL만 센다"],"a":0,"ex":"COUNT(*)은 모든 행을, COUNT(column)은 해당 컬럼이 NULL이 아닌 행만 셉니다."},{"t":"choice","k":"집계","q":"col 값이 [10, NULL, 20, 30] 일 때 AVG(col) 의 결과는?","o":["20","15","60","NULL"],"a":0,"ex":"AVG는 NULL을 제외하고 계산합니다. (10+20+30)/3 = 20."},{"t":"input","k":"빈칸","q":"col 값이 [5, NULL, 15] 일 때 SUM(col) 의 결과 숫자를 쓰세요.","a":["20"],"ex":"SUM은 NULL을 무시하고 더합니다. 5 + 15 = 20."},{"t":"choice","k":"NULL","q":"값이 NULL인지 확인하는 올바른 조건은?","o":["col IS NULL","col = NULL","col == NULL","col NULL()"],"a":0,"ex":"NULL 비교는 = 이 아니라 IS NULL을 사용합니다. = NULL은 항상 참이 되지 않습니다."},{"t":"choice","k":"집계","q":"col 값이 [1, 2, NULL, 4, NULL] 일 때 COUNT(col) 의 결과는?","o":["3","5","2","4"],"a":0,"ex":"COUNT(col)은 NULL을 제외한 값의 개수를 셉니다. NULL 2개를 빼면 3."}]}]}

{"title":"윈도우 함수와 CTE","guide":"🪟","lessons":[{"title":"ROW_NUMBER · RANK · DENSE_RANK","xp":30,"q":[{"t":"choice","k":"RANK 값","q":"점수 90, 90, 80을 내림차순 정렬해 RANK()를 매길 때, 세 번째 행(80점)의 RANK 값은?","code":"SELECT score,\n       RANK() OVER (ORDER BY score DESC) AS rnk\nFROM scores;","o":["2","3","1","4"],"a":1,"ex":"RANK는 동점자에게 같은 순위를 주고 그 다음 순위는 동점자 수만큼 건너뛴다. 90,90은 모두 1위이고 다음은 2가 아니라 3이 된다."},{"t":"choice","k":"DENSE_RANK 값","q":"같은 데이터(90, 90, 80 내림차순)에서 DENSE_RANK()를 쓰면 세 번째 행(80점)의 값은?","code":"SELECT score,\n       DENSE_RANK() OVER (ORDER BY score DESC) AS drnk\nFROM scores;","o":["3","2","1","4"],"a":1,"ex":"DENSE_RANK는 동점을 같은 순위로 처리하되 gap을 만들지 않는다. 90,90=1, 80=2가 된다. RANK가 3을 주는 것과 대비된다."},{"t":"choice","k":"ROW_NUMBER 성질","q":"ROW_NUMBER()에 대한 설명으로 옳은 것은?","o":["동점 값에는 같은 번호를 부여한다","각 행에 고유한 연속 번호를 부여하며, 동점일 경우 행 간 순서는 비결정적일 수 있다","RANK처럼 동점 뒤에 gap을 만든다","DENSE_RANK와 항상 동일한 결과를 낸다"],"a":1,"ex":"ROW_NUMBER는 동점 여부와 무관하게 1,2,3...의 고유 번호를 부여한다. ORDER BY 키가 유일하지 않으면 동점 행들의 상대 순서는 보장되지 않는다."},{"t":"input","k":"gap 만드는 함수","q":"동점자에게 같은 순위를 주고 그 뒤에 gap을 만들어 1, 1, 3 형태의 순위를 생성하는 윈도우 함수 이름은? (함수명만)","a":["RANK","RANK()"],"ex":"RANK()는 동점 뒤 순위를 건너뛴다(1,1,3). DENSE_RANK()는 건너뛰지 않는다(1,1,2)."},{"t":"choice","k":"부서별 1명 추출","q":"급여 동점이 존재해도 각 부서에서 '정확히 한 명'만 뽑고 싶다. 가장 적절한 함수는?","code":"SELECT * FROM (\n  SELECT emp_id, dept_id, salary,\n         ??? OVER (PARTITION BY dept_id ORDER BY salary DESC) AS rn\n  FROM emp\n) t\nWHERE rn = 1;","o":["RANK() — 동점이면 여러 행이 rn=1이 될 수 있다","ROW_NUMBER() — 동점이어도 rn=1이 정확히 한 행뿐이다","DENSE_RANK() — 동점이면 여러 행이 rn=1이 된다","COUNT(*)"],"a":1,"ex":"RANK/DENSE_RANK는 급여가 같으면 여러 행에 1을 부여해 rn=1이 여러 개가 된다. ROW_NUMBER만이 부서당 정확히 한 행을 보장한다."}]},{"title":"OVER(PARTITION BY … ORDER BY …)","xp":32,"q":[{"t":"choice","k":"ORDER BY 없는 SUM","q":"다음 쿼리에서 각 행의 결과 값은?","code":"SELECT user_id, amount,\n       SUM(amount) OVER (PARTITION BY user_id) AS s\nFROM payments;","o":["해당 행까지의 누적합","같은 user_id 그룹 전체의 총합이 그룹 내 모든 행에 동일하게 표시된다","항상 NULL","문법 에러"],"a":1,"ex":"OVER에 ORDER BY가 없으면 프레임은 파티션 전체가 되어 그룹 총합이 모든 행에 반복 표시된다(누적합이 아님)."},{"t":"choice","k":"ORDER BY 있는 SUM","q":"위 쿼리에 ORDER BY를 추가하면 s의 의미는?","code":"SELECT user_id, amount,\n       SUM(amount) OVER (PARTITION BY user_id\n                         ORDER BY order_date) AS s\nFROM payments;","o":["그룹 전체 총합","주문일 순서대로의 누적합(running total)","각 행의 amount 그대로","그룹 평균"],"a":1,"ex":"ORDER BY가 있으면 기본 프레임이 'UNBOUNDED PRECEDING ~ CURRENT ROW'가 되어 누적합이 계산된다."},{"t":"choice","k":"RANGE 기본 프레임","q":"ORDER BY만 지정하고 프레임 절을 생략하면 기본은 RANGE ... CURRENT ROW다. 이때 ORDER BY 값이 동일한 행(peers)들의 누적값은?","o":["각 행이 서로 다른 누적값을 갖는다","같은 ORDER BY 값을 가진 peer 행들은 모두 같은 누적값을 갖는다","무시되어 NULL이 된다","문법 에러가 난다"],"a":1,"ex":"기본 프레임은 ROWS가 아니라 RANGE다. RANGE는 현재 행과 정렬 값이 같은 peer를 프레임에 함께 포함하므로 동일 값 행들의 누적 결과가 같아진다. 행 단위로 구분하려면 ROWS를 명시해야 한다."},{"t":"input","k":"이전 행 참조","q":"정렬된 파티션에서 '이전 행'의 값을 가져오는 윈도우 함수 이름은? (함수명만)","a":["LAG","LAG()"],"ex":"이전 행은 LAG, 다음 행은 LEAD로 참조한다."},{"t":"choice","k":"LAG 첫 행","q":"LAG(salary, 1) OVER (ORDER BY hire_date)에서 정렬상 가장 첫 행의 결과 값은?","o":["0","NULL","자기 자신의 salary","에러"],"a":1,"ex":"첫 행은 참조할 이전 행이 없으므로 기본값 NULL이 반환된다. 세 번째 인자로 기본값을 지정할 수 있다."}]},{"title":"CTE (WITH 절)","xp":30,"q":[{"t":"choice","k":"CTE 정의","q":"CTE(Common Table Expression)에 대한 설명으로 가장 정확한 것은?","o":["디스크에 영구 저장되는 물리 테이블이다","WITH으로 정의되며 해당 쿼리 실행 동안만 존재하는 임시 명명 결과 집합이다","인덱스의 한 종류다","트리거의 별칭이다"],"a":1,"ex":"CTE는 WITH 절로 이름 붙인 임시 결과 집합으로, 해당 쿼리 범위 내에서만 유효하다."},{"t":"choice","k":"재귀 CTE 구조","q":"재귀 CTE(WITH RECURSIVE)의 필수 구조는?","o":["앵커(anchor) 멤버와 재귀(recursive) 멤버를 UNION ALL로 결합한다","반드시 GROUP BY를 포함해야 한다","서브쿼리 사용이 금지된다","ORDER BY가 반드시 있어야 한다"],"a":0,"ex":"재귀 CTE는 시작점을 정의하는 앵커 멤버와, 자기 자신을 참조하는 재귀 멤버를 UNION(ALL)로 결합해 반복 확장한다."},{"t":"input","k":"CTE 키워드","q":"CTE를 정의할 때 쿼리 앞에 쓰는 키워드는? (한 단어)","a":["WITH"],"ex":"CTE는 WITH cte_name AS ( ... ) 형태로 정의한다."},{"t":"choice","k":"다중 참조","q":"하나의 CTE를 같은 쿼리 안에서 여러 번 참조할 수 있는가?","o":["아니오, 오직 한 번만 참조 가능하다","예, 정의된 CTE는 같은 쿼리 내에서 여러 번 참조할 수 있다","SELECT 절에서만 참조 가능하다","참조하려면 반드시 물리 테이블로 저장해야 한다"],"a":1,"ex":"CTE는 정의 이후 메인 쿼리(및 이후 CTE)에서 여러 번 참조할 수 있어 자기 조인 등에 유용하다."},{"t":"choice","k":"CTE 특징","q":"CTE의 장점에 대한 설명으로 옳은 것은?","o":["항상 서브쿼리보다 실행 성능이 빠르다","복잡한 쿼리를 논리적 단계로 나눠 가독성을 높이고 재귀를 지원한다","JOIN을 완전히 대체하는 문법이다","집계 함수를 사용할 수 없다"],"a":1,"ex":"CTE의 핵심 가치는 가독성/구조화와 재귀 지원이다. 성능은 옵티마이저가 인라인/구체화를 어떻게 처리하느냐에 달려 있어 '항상 빠르다'는 틀렸다."}]}]},
{"title":"서브쿼리와 NULL의 함정","guide":"🕳️","lessons":[{"title":"NOT IN + NULL 함정과 EXISTS","xp":33,"q":[{"t":"choice","k":"NOT IN + NULL","q":"dept 테이블의 dept_id 컬럼에 NULL이 하나라도 포함되어 있을 때, 다음 쿼리의 결과는?","code":"SELECT *\nFROM emp\nWHERE dept_id NOT IN (SELECT dept_id FROM dept);","o":["emp의 모든 행","dept에 없는 dept_id를 가진 emp 행","빈 결과(0행)","런타임 에러"],"a":2,"ex":"서브쿼리 결과에 NULL이 있으면 NOT IN은 사실상 어떤 행도 TRUE가 되지 못해 0행을 반환한다. 대표적인 함정이다."},{"t":"choice","k":"원인 분석","q":"NOT IN 목록에 NULL이 있으면 결과가 비는 근본 이유는?","o":["NULL이 0으로 변환되기 때문","x &lt;&gt; NULL 비교가 UNKNOWN을 반환해 AND 전체가 결코 TRUE가 되지 못하기 때문","NOT IN이 NULL을 자동으로 제거하기 때문","IN이 NULL을 무시하기 때문"],"a":1,"ex":"x NOT IN (a, b, NULL)은 (x&lt;&gt;a AND x&lt;&gt;b AND x&lt;&gt;NULL)로 전개되고, x&lt;&gt;NULL은 UNKNOWN이라 AND 결과가 TRUE가 될 수 없다."},{"t":"choice","k":"안전한 수정","q":"NOT IN + NULL 함정을 안전하게 피하는 방법은?","o":["NOT EXISTS를 쓰거나, 서브쿼리에서 IS NOT NULL로 NULL을 제외한다","NOT IN을 IN으로 바꾼다","SELECT에 DISTINCT를 추가한다","ORDER BY를 추가한다"],"a":0,"ex":"NOT EXISTS는 이 함정에 영향받지 않으며, 부득이 NOT IN을 써야 하면 서브쿼리에서 NULL을 걸러내야 한다."},{"t":"choice","k":"NOT EXISTS 의미","q":"NOT EXISTS와 NOT IN의 NULL 처리 차이로 옳은 것은?","o":["NOT EXISTS도 NOT IN과 똑같이 NULL에 취약하다","NOT EXISTS는 상관 조건이 매칭되는 행의 유무만 보므로 NOT IN의 NULL 함정을 겪지 않는다","EXISTS는 항상 IN보다 느리다","IN은 서브쿼리 결과 크기와 무관하게 동작한다"],"a":1,"ex":"NOT EXISTS는 '매칭 행이 존재하지 않는가'만 판단하므로 NULL의 3치 논리 함정에 빠지지 않는다."},{"t":"input","k":"대체 구문","q":"NULL이 포함될 수 있는 'NOT IN (서브쿼리)'를 가장 안전하게 대체하는 구문은? (2단어)","a":["NOT EXISTS"],"ex":"NOT EXISTS로 대체하면 NULL 함정과 무관하게 의도한 '차집합' 결과를 얻는다."}]},{"title":"상관 서브쿼리","xp":32,"q":[{"t":"choice","k":"상관 서브쿼리 정의","q":"상관(correlated) 서브쿼리의 정의로 옳은 것은?","o":["외부 쿼리와 무관하게 딱 한 번만 실행된다","외부 쿼리의 컬럼을 참조하며 개념적으로 외부 행마다 평가된다","항상 JOIN보다 빠르다","집계 함수를 쓸 수 없다"],"a":1,"ex":"상관 서브쿼리는 외부 쿼리의 컬럼을 참조하므로 외부 각 행마다 평가되는 것으로 개념화된다."},{"t":"choice","k":"부서 평균 비교","q":"다음 상관 서브쿼리는 무엇을 반환하는가?","code":"SELECT e.name\nFROM emp e\nWHERE e.salary &gt; (SELECT AVG(e2.salary)\n                  FROM emp e2\n                  WHERE e2.dept_id = e.dept_id);","o":["전체 평균보다 급여가 높은 직원","자기 부서 평균보다 급여가 높은 직원","각 부서에서 급여가 가장 높은 직원","문법 에러"],"a":1,"ex":"내부 서브쿼리가 e.dept_id를 참조해 '해당 직원과 같은 부서'의 평균을 계산하므로, 자기 부서 평균 초과 직원이 나온다."},{"t":"choice","k":"EXISTS 의미","q":"다음 쿼리의 결과는?","code":"SELECT d.name\nFROM dept d\nWHERE EXISTS (SELECT 1 FROM emp e\n              WHERE e.dept_id = d.dept_id);","o":["직원이 한 명도 없는 부서","최소 한 명의 직원이 있는 부서","모든 부서","각 부서의 직원 수"],"a":1,"ex":"EXISTS는 상관 조건을 만족하는 행이 하나라도 있으면 TRUE다. 즉 직원이 있는 부서를 반환한다."},{"t":"choice","k":"빈 부서 찾기","q":"직원이 한 명도 없는 부서를 찾으려면 어떤 구문이 가장 적절한가?","o":["EXISTS","NOT EXISTS","IN","HAVING"],"a":1,"ex":"매칭되는 직원이 '존재하지 않는' 부서를 찾으므로 NOT EXISTS가 적절하다."},{"t":"input","k":"참조 방향","q":"상관 서브쿼리에서 내부 쿼리는 바깥쪽(___) 쿼리의 컬럼을 참조한다. 빈칸에 들어갈 말은?","a":["outer","외부","바깥"],"ex":"내부(inner) 서브쿼리가 외부(outer) 쿼리의 컬럼을 참조하기 때문에 'correlated(상관)'라 불린다."}]},{"title":"NULL 비교와 ORDER BY","xp":31,"q":[{"t":"choice","k":"NULL = NULL","q":"SQL의 3치 논리에서 NULL = NULL의 평가 결과는?","o":["TRUE","FALSE","UNKNOWN (NULL)","에러"],"a":2,"ex":"NULL은 '알 수 없는 값'이므로 NULL = NULL은 TRUE가 아니라 UNKNOWN이다. 그래서 = 로는 NULL을 비교할 수 없다."},{"t":"choice","k":"NULL 판별","q":"어떤 컬럼이 NULL인지 판별하는 올바른 방법은?","o":["col = NULL","col IS NULL","col == NULL","col EQUALS NULL"],"a":1,"ex":"= NULL은 항상 UNKNOWN이라 행을 걸러낼 수 없다. 반드시 IS NULL / IS NOT NULL을 사용한다."},{"t":"choice","k":"부등호와 NULL","q":"WHERE col &lt;&gt; 'A' 조건은 col이 NULL인 행을 결과에 포함하는가?","o":["예, NULL 행도 포함된다","아니오, NULL 행은 제외된다","런타임 에러가 난다","NULL을 'A'로 간주한다"],"a":1,"ex":"NULL &lt;&gt; 'A'는 UNKNOWN이므로 WHERE 조건을 통과하지 못한다. NULL 행까지 원하면 OR col IS NULL을 추가해야 한다."},{"t":"input","k":"NULL 정렬 위치","q":"ORDER BY에서 NULL을 명시적으로 맨 마지막에 정렬시키는 절은? (2단어)","a":["NULLS LAST"],"ex":"표준 SQL은 NULLS FIRST / NULLS LAST로 NULL의 정렬 위치를 명시할 수 있다. 미지정 시 위치는 구현에 따라 다르다."},{"t":"choice","k":"COUNT과 NULL","q":"COUNT(col)과 COUNT(*)의 NULL 처리 차이로 옳은 것은?","o":["둘 다 NULL 포함 전체 행 수를 센다","COUNT(col)은 NULL을 제외하고 세며, COUNT(*)는 모든 행을 센다","COUNT(col)이 항상 COUNT(*)보다 크다","둘은 항상 동일한 값을 낸다"],"a":1,"ex":"COUNT(col)은 해당 컬럼이 NULL이 아닌 행만 세고, COUNT(*)는 NULL 여부와 무관하게 모든 행을 센다."}]}]},
{"title":"JOIN과 집계의 함정","guide":"🔗","lessons":[{"title":"WHERE vs HAVING · GROUP BY 규칙","xp":32,"q":[{"t":"choice","k":"WHERE에 집계","q":"WHERE 절에 집계 함수를 직접 쓸 수 있는가?","o":["예, WHERE COUNT(*) &gt; 5 처럼 쓸 수 있다","아니오, 집계 결과에 대한 조건은 HAVING을 사용해야 한다","예, GROUP BY 없이도 가능하다","WHERE와 HAVING은 완전히 동일하다"],"a":1,"ex":"WHERE는 그룹화/집계 이전 단계에서 평가되므로 집계 함수를 쓸 수 없다. 집계 결과 조건은 HAVING을 쓴다."},{"t":"choice","k":"실행 순서","q":"WHERE와 HAVING의 차이로 가장 정확한 것은?","o":["WHERE는 그룹화 후, HAVING은 그룹화 전에 필터한다","WHERE는 그룹화·집계 전에 개별 행을 필터하고, HAVING은 집계 후 그룹을 필터한다","둘 다 집계 후에 동작한다","둘 다 집계 전에 동작한다"],"a":1,"ex":"논리적 처리 순서상 WHERE(행 필터) → GROUP BY → 집계 → HAVING(그룹 필터) 순이다."},{"t":"choice","k":"HAVING 결과","q":"다음 쿼리의 결과는?","code":"SELECT dept_id, COUNT(*) AS cnt\nFROM emp\nGROUP BY dept_id\nHAVING COUNT(*) &gt; 3;","o":["직원이 3명 이하인 부서","직원 수가 3명 초과인 부서","모든 부서","문법 에러"],"a":1,"ex":"GROUP BY로 부서별 집계 후 HAVING이 COUNT(*) &gt; 3 그룹만 남긴다. 즉 4명 이상인 부서다."},{"t":"choice","k":"GROUP BY 규칙","q":"표준 SQL 기준으로 다음 쿼리는 유효한가?","code":"SELECT dept_id, name, COUNT(*)\nFROM emp\nGROUP BY dept_id;","o":["유효하다","유효하지 않다: name이 집계되지도, GROUP BY에 포함되지도 않았다","name이 자동으로 집계된다","COUNT(*)가 name을 대신 처리한다"],"a":1,"ex":"표준 SQL에서 SELECT의 비집계 컬럼은 모두 GROUP BY에 있어야 한다. name이 빠져 있어 유효하지 않다(일부 DB의 느슨한 모드는 예외)."},{"t":"input","k":"집계 조건 절","q":"집계 결과값을 기준으로 그룹을 필터링할 때 사용하는 절은? (한 단어)","a":["HAVING"],"ex":"집계 후 그룹 필터는 HAVING, 집계 전 행 필터는 WHERE다."}]},{"title":"JOIN 중복 · LEFT JOIN 함정 · self-join","xp":34,"q":[{"t":"choice","k":"fan-out 중복","q":"orders와 order_items(1:다)를 조인한 다음 쿼리의 문제점은?","code":"SELECT o.order_id, SUM(o.amount) AS total\nFROM orders o\nJOIN order_items i ON i.order_id = o.order_id\nGROUP BY o.order_id;","o":["문제 없다","주문이 항목 수만큼 복제되어(fan-out) o.amount가 중복 합산된다","SUM이 중복을 알아서 제거한다","GROUP BY가 잘못되었다"],"a":1,"ex":"1:다 조인은 왼쪽 행을 오른쪽 행 수만큼 복제한다. o.amount가 항목 수만큼 부풀려 합산되는 fan-out 오류다."},{"t":"choice","k":"LEFT JOIN 무력화","q":"다음 쿼리에서 WHERE 절이 초래하는 효과는?","code":"SELECT c.id, o.id\nFROM customers c\nLEFT JOIN orders o ON o.cust_id = c.id\nWHERE o.status = 'paid';","o":["LEFT JOIN이 유지되어 주문 없는 고객도 결과에 나온다","오른쪽 테이블 컬럼에 WHERE 조건을 걸어 사실상 INNER JOIN이 된다","런타임 에러가 난다","모든 고객이 무조건 나온다"],"a":1,"ex":"주문이 없는 고객은 o.status가 NULL인데 NULL='paid'는 UNKNOWN이라 WHERE에서 걸러진다. 결국 매칭된 행만 남아 INNER JOIN과 같아진다."},{"t":"choice","k":"LEFT JOIN 보존","q":"위 상황에서 진짜 LEFT JOIN(주문 없는 고객 보존)을 유지하려면 status 조건을 어디로 옮겨야 하는가?","o":["ON 절로 옮긴다","HAVING 절로 옮긴다","GROUP BY로 옮긴다","그대로 WHERE에 둔다"],"a":0,"ex":"조건을 ON 절로 옮기면 조인 단계에서만 적용되어 매칭 안 된 왼쪽 행은 NULL로 보존된다. WHERE에 두면 그 보존 행이 제거된다."},{"t":"choice","k":"self-join 선택","q":"manager_id가 같은 테이블의 emp_id를 참조할 때, 다음 self-join에서 INNER가 아닌 LEFT JOIN을 쓰는 이유는?","code":"SELECT e.name, m.name AS manager\nFROM emp e\nLEFT JOIN emp m ON e.manager_id = m.emp_id;","o":["성능이 더 빨라서","관리자가 없는 직원(예: manager_id가 NULL인 CEO)도 결과에 포함하기 위해","INNER JOIN은 self-join이 불가능해서","중복을 제거하기 위해"],"a":1,"ex":"manager_id가 NULL인 최상위 직원은 매칭 관리자가 없다. INNER면 그런 직원이 사라지므로 LEFT JOIN으로 보존한다."},{"t":"input","k":"자기 조인 명칭","q":"하나의 테이블을 자기 자신과 조인하는 것을 무슨 조인이라 하는가? (한 단어)","a":["self","셀프","자체"],"ex":"동일 테이블에 별칭 두 개를 부여해 조인하는 것을 self-join(자기 조인)이라 한다."}]},{"title":"COUNT(DISTINCT) · 조건부 집계","xp":33,"q":[{"t":"choice","k":"COUNT DISTINCT","q":"COUNT(DISTINCT customer_id)가 세는 값은?","o":["전체 행 수","중복을 제거한 비-NULL customer_id의 개수","NULL까지 포함한 고유 값 개수","customer_id의 최댓값"],"a":1,"ex":"COUNT(DISTINCT col)은 NULL을 제외하고 서로 다른 값의 개수를 센다."},{"t":"choice","k":"조건부 집계","q":"다음 쿼리에서 paid_cnt가 나타내는 값은?","code":"SELECT cust_id,\n       SUM(CASE WHEN status = 'paid' THEN 1 ELSE 0 END) AS paid_cnt\nFROM orders\nGROUP BY cust_id;","o":["고객별 전체 주문 수","고객별 status가 'paid'인 주문 수","고객별 총 결제 금액","고객 수"],"a":1,"ex":"SUM(CASE WHEN 조건 THEN 1 ELSE 0 END)은 조건을 만족하는 행 수를 센다. 여기서는 고객별 'paid' 주문 수다."},{"t":"choice","k":"COUNT 등가 함정","q":"SUM(CASE WHEN status='paid' THEN 1 ELSE 0 END)와 결과가 동일한 것은?","o":["COUNT(CASE WHEN status='paid' THEN 1 ELSE 0 END)","COUNT(CASE WHEN status='paid' THEN 1 END)","COUNT(*)","COUNT(status)"],"a":1,"ex":"COUNT는 NULL이 아닌 값을 센다. ELSE를 생략하면 미해당 행은 NULL이 되어 세지 않는다. 반대로 ELSE 0을 두면 0도 비-NULL이라 전체 행이 세져 함정이 된다."},{"t":"choice","k":"기법 명칭","q":"SUM(CASE WHEN status='paid' THEN amount ELSE 0 END)처럼 조건에 따라 값을 합산해 피벗 형태를 만드는 기법을 무엇이라 하는가?","o":["조건부 집계(conditional aggregation)","재귀 CTE","윈도우 함수","self-join"],"a":0,"ex":"CASE 식을 집계 함수 안에 넣어 조건별 값을 한 행에 펼치는 것을 조건부 집계(또는 CASE 피벗)라 한다."},{"t":"input","k":"고유 값 세기","q":"한 컬럼의 서로 다른 값만 세려면 COUNT(____ col) 형태로 쓴다. 빈칸의 키워드는? (한 단어)","a":["DISTINCT"],"ex":"COUNT(DISTINCT col)로 중복을 제거한 고유 값 개수를 센다."}]}]}

0,"ex":"MySQL DATEDIFF(a, b)는 a - b를 일수로 반환합니다. 21 - 1 = 20일."},{"t":"input","k":"INTERVAL","q":"오늘로부터 7일 후: DATE_ADD(CURDATE(), INTERVAL 7 ___). 빈칸의 단위 키워드는?","a":["DAY","DAYS"],"ex":"INTERVAL 7 DAY는 7일을 의미합니다. MONTH, YEAR, HOUR 등도 사용 가능합니다."},{"t":"choice","k":"월말 더하기","q":"DATE_ADD('2026-01-31', INTERVAL 1 MONTH)의 결과는?","o":["2026-02-28","2026-03-03","2026-02-31","오류"],"a":0,"ex":"1월 31일에 한 달을 더하면 2월에 31일이 없으므로 그 달의 마지막 날인 2026-02-28로 보정됩니다."},{"t":"choice","k":"DATE_SUB","q":"날짜에서 일정 기간을 빼는 함수는?","o":["DATE_SUB()","DATE_MINUS()","DATE_DIFF()","MINUS()"],"a":0,"ex":"DATE_SUB(d, INTERVAL 3 DAY)는 3일을 뺍니다. DATE_ADD에 음수 INTERVAL을 써도 됩니다."},{"t":"choice","k":"TIMESTAMPDIFF","q":"두 날짜 사이의 개월 수를 구하는 함수는?","o":["TIMESTAMPDIFF(MONTH, a, b)","DATEDIFF(a, b)","MONTHS(a, b)","MONTH(a - b)"],"a":0,"ex":"TIMESTAMPDIFF(unit, a, b)는 단위를 지정해 차이를 구합니다. DATEDIFF는 일수만 반환합니다."}]}]},
{"title":"트랜잭션과 무결성","guide":"🔒","lessons":[{"title":"트랜잭션 기본","xp":20,"q":[{"t":"choice","k":"시작","q":"새 트랜잭션을 시작하는 표준 명령은?","o":["START TRANSACTION","START TABLE","OPEN TRANSACTION","TRANSACTION BEGIN"],"a":0,"ex":"START TRANSACTION(또는 BEGIN)으로 트랜잭션을 시작합니다."},{"t":"choice","k":"COMMIT","q":"트랜잭션의 변경을 영구히 저장하는 명령은?","o":["COMMIT","SAVE","ROLLBACK","END"],"a":0,"ex":"COMMIT은 트랜잭션 내 모든 변경을 확정해 영구 반영합니다."},{"t":"choice","k":"ROLLBACK","q":"트랜잭션의 변경을 모두 되돌리는 명령은?","o":["ROLLBACK","UNDO","CANCEL","REVERT"],"a":0,"ex":"ROLLBACK은 아직 커밋되지 않은 변경을 취소하고 이전 상태로 되돌립니다."},{"t":"input","k":"SAVEPOINT","q":"트랜잭션 중간에 부분 롤백 지점을 만드는 명령 키워드는?","a":["SAVEPOINT"],"ex":"SAVEPOINT name으로 지점을 만들고 ROLLBACK TO name으로 그 지점까지만 되돌립니다."},{"t":"choice","k":"롤백 결과","q":"COMMIT 전에 ROLLBACK을 실행하면 어떻게 되나?","o":["트랜잭션의 모든 변경이 취소된다","일부만 저장된다","자동으로 커밋된다","오류가 발생한다"],"a":0,"ex":"커밋 전 ROLLBACK은 해당 트랜잭션의 모든 변경을 취소합니다."}]},{"title":"ACID 원칙","xp":24,"q":[{"t":"choice","k":"A","q":"ACID의 A(Atomicity)가 보장하는 것은?","o":["작업이 모두 실행되거나 모두 취소된다","항상 최신 값을 읽는다","작업 순서가 유지된다","병렬 실행을 보장한다"],"a":0,"ex":"원자성은 트랜잭션이 전부 성공하거나 전부 실패(취소)함을 보장합니다. 계좌이체 중 일부만 반영되는 일을 막습니다."},{"t":"choice","k":"C","q":"ACID의 C가 의미하는 것은?","o":["일관성(Consistency)","동시성","캐시","복제"],"a":0,"ex":"일관성은 트랜잭션 전후로 데이터가 모든 무결성 제약을 만족하는 유효한 상태를 유지함을 뜻합니다."},{"t":"choice","k":"I","q":"동시 실행되는 트랜잭션이 서로 간섭하지 않도록 보장하는 성질은?","o":["격리성(Isolation)","지속성","원자성","일관성"],"a":0,"ex":"격리성은 동시에 실행되는 트랜잭션이 각각 독립적으로 수행되는 것처럼 보이게 합니다."},{"t":"choice","k":"D","q":"커밋된 데이터가 시스템 장애 후에도 유지되는 성질은?","o":["지속성(Durability)","격리성","원자성","일관성"],"a":0,"ex":"지속성은 한 번 커밋된 변경은 장애가 나도 사라지지 않음을 보장합니다."},{"t":"choice","k":"Dirty Read","q":"아직 커밋되지 않은 다른 트랜잭션의 변경을 읽는 현상은?","o":["Dirty Read","Phantom Row","Deadlock","Rollback"],"a":0,"ex":"Dirty Read는 커밋되지 않은 데이터를 읽는 문제로, READ COMMITTED 이상의 격리 수준에서 방지됩니다."}]},{"title":"제약조건과 AUTOCOMMIT","xp":22,"q":[{"t":"choice","k":"AUTOCOMMIT","q":"AUTOCOMMIT=1(기본값)일 때 각 SQL 문장은?","o":["실행 즉시 자동으로 커밋된다","자동으로 롤백된다","무시된다","커밋 대기 상태가 된다"],"a":0,"ex":"AUTOCOMMIT이 켜져 있으면 각 문장이 독립 트랜잭션으로 즉시 커밋됩니다. 여러 문장을 묶으려면 명시적으로 START TRANSACTION을 씁니다."},{"t":"choice","k":"PK 위반","q":"기본키(PK) 값이 중복되는 INSERT를 실행하면?","o":["제약 위반 오류가 발생한다","자동으로 덮어쓴다","NULL로 저장된다","조용히 무시된다"],"a":0,"ex":"기본키는 중복을 허용하지 않으므로 중복 삽입 시 오류가 발생하고 해당 문장은 실패합니다."},{"t":"choice","k":"FK 위반","q":"FOREIGN KEY가 참조하는 부모 행을 삭제하려 하면(기본 RESTRICT)?","o":["삭제가 거부된다","자식 행이 자동 삭제된다","자식 값이 NULL이 된다","무시되고 삭제된다"],"a":0,"ex":"기본 동작(RESTRICT/NO ACTION)에서는 참조하는 자식 행이 있으면 부모 행 삭제가 거부됩니다."},{"t":"input","k":"NOT NULL","q":"컬럼에 NULL 저장을 허용하지 않는 제약조건 이름은?","a":["NOT NULL"],"ex":"NOT NULL 제약은 해당 컬럼에 값이 반드시 있어야 함을 강제합니다."},{"t":"choice","k":"CASCADE","q":"부모 행 삭제 시 자식 행도 함께 삭제되게 하는 옵션은?","o":["ON DELETE CASCADE","ON DELETE RESTRICT","ON DELETE SET DEFAULT","ON UPDATE CASCADE"],"a":0,"ex":"ON DELETE CASCADE는 부모 행이 삭제될 때 이를 참조하는 자식 행도 자동으로 삭제합니다."}]}]},
{"title":"형변환","guide":"🔄","lessons":[{"title":"CAST 기본","xp":20,"q":[{"t":"choice","k":"문법","q":"CAST의 올바른 문법은?","o":["CAST(expr AS type)","CAST(expr, type)","CAST(type, expr)","CONVERT(expr AS type)"],"a":0,"ex":"표준 SQL의 형변환 문법은 CAST(표현식 AS 대상타입)입니다."},{"t":"input","k":"함수명","q":"표준 SQL에서 값을 다른 타입으로 변환하는 함수 이름은?","a":["CAST"],"ex":"CAST는 표준 SQL에 정의된 형변환 함수로 대부분의 DBMS가 지원합니다."},{"t":"choice","k":"문자→숫자","q":"MySQL에서 CAST('123' AS SIGNED)의 결과는?","o":["정수 123","문자열 '123'","오류","NULL"],"a":0,"ex":"문자열 '123'을 정수 123으로 변환합니다. MySQL은 정수 변환에 SIGNED/UNSIGNED 키워드를 씁니다."},{"t":"choice","k":"숫자→문자","q":"CAST(123 AS CHAR)의 결과는?","o":["문자열 '123'","정수 123","오류","NULL"],"a":0,"ex":"정수 123을 문자열 '123'으로 변환합니다."},{"t":"choice","k":"정수 타입","q":"MySQL의 CAST에서 정수로 변환할 때 쓰는 타입 키워드는?","o":["SIGNED","INT","NUMBER","INTEGER4"],"a":0,"ex":"MySQL의 CAST 대상 타입으로는 SIGNED/UNSIGNED를 씁니다. INT는 전통적으로 CAST 대상 타입으로 허용되지 않습니다."}]},{"title":"CONVERT와 데이터 타입","xp":22,"q":[{"t":"choice","k":"MySQL CONVERT","q":"MySQL의 CONVERT()로 타입 변환을 하는 올바른 문법은?","o":["CONVERT(expr, type)","CONVERT(type, expr)","CONVERT(expr AS type)","CONVERT(expr TO type)"],"a":0,"ex":"MySQL은 CONVERT(expr, type) 형식입니다. SQL Server는 CONVERT(type, expr, style)로 인자 순서가 다릅니다."},{"t":"choice","k":"문자셋","q":"MySQL에서 문자셋을 바꿀 때 CONVERT에 쓰는 절은?","o":["USING","CHARSET","AS","WITH"],"a":0,"ex":"CONVERT(str USING utf8mb4)처럼 USING 절로 문자셋을 변환합니다."},{"t":"choice","k":"DECIMAL","q":"소수점 자릿수를 지정해 변환하려면 어떤 타입을 쓰나?","o":["DECIMAL(10,2)","FLOAT","SIGNED","CHAR"],"a":0,"ex":"CAST(x AS DECIMAL(10,2))는 전체 10자리, 소수부 2자리로 변환해 정밀도를 지정합니다."},{"t":"input","k":"날짜 변환","q":"CAST('2026-07-21' AS ___)로 날짜 타입으로 바꿀 때 빈칸의 타입은?","a":["DATE"],"ex":"CAST('2026-07-21' AS DATE)는 문자열을 DATE 타입으로 변환합니다."},{"t":"choice","k":"SQL Server","q":"SQL Server의 CONVERT(data_type, expression, style)에서 첫 번째 인자는?","o":["데이터 타입","표현식","스타일 코드","컬럼명"],"a":0,"ex":"SQL Server의 CONVERT는 대상 타입을 먼저, 표현식을 두 번째, 선택적 스타일을 세 번째에 둡니다. MySQL과 순서가 반대입니다."}]},{"title":"암묵적 형변환","xp":24,"q":[{"t":"choice","k":"문자+숫자","q":"MySQL에서 '10' + 5의 결과는?","o":["15","'105'","오류","NULL"],"a":0,"ex":"MySQL에서 +는 산술 연산자이므로 '10'이 숫자 10으로 암묵 변환되어 15가 됩니다. (문자열 연결에는 CONCAT을 씁니다.)"},{"t":"choice","k":"변환 이유","q":"'10' + 5가 15가 되는 이유는?","o":["문자열이 숫자로 자동(암묵) 변환되기 때문","숫자가 문자열로 변환되기 때문","오류를 무시하기 때문","단순히 이어붙이기 때문"],"a":0,"ex":"산술 문맥에서 문자열 '10'이 숫자 10으로 암묵적 형변환된 뒤 덧셈이 수행됩니다."},{"t":"choice","k":"CONCAT","q":"MySQL에서 CONCAT('10', 5)의 결과는?","o":["'105'","15","오류","'10 5'"],"a":0,"ex":"CONCAT은 인자를 문자열로 변환해 이어붙이므로 '105'가 됩니다."},{"t":"choice","k":"비교 변환","q":"정수 컬럼을 문자열 '5'와 비교(col = '5')하면?","o":["'5'가 숫자로 변환되어 비교된다","항상 false가 된다","오류가 난다","문자 순서로 비교된다"],"a":0,"ex":"숫자와 문자열을 비교하면 문자열이 숫자로 변환되어 비교됩니다."},{"t":"choice","k":"주의점","q":"암묵적 형변환에 의존할 때 생길 수 있는 문제는?","o":["인덱스 미사용·예상치 못한 결과","쿼리 속도 향상","항상 안전한 최적화","자동 인덱스 생성"],"a":0,"ex":"컬럼에 암묵 변환이 걸리면 인덱스를 못 쓰거나 DBMS마다 결과가 달라질 수 있어, 명시적 CAST가 권장됩니다."}]}]}

{"title":"고급 윈도우 함수","guide":"🪟","lessons":[{"title":"LEAD와 LAG","xp":28,"q":[{"t":"choice","k":"LAG 첫 행","q":"ORDER BY로 정렬된 파티션에서 LAG(amount, 1)을 사용할 때, 파티션의 '첫 번째' 행이 반환하는 값은?","o":["첫 행의 amount","0","NULL","마지막 행의 amount"],"a":2,"ex":"LAG는 현재 행보다 offset만큼 '앞선' 행을 참조합니다. 첫 행에는 이전 행이 없으므로 기본값을 지정하지 않으면 NULL을 반환합니다. LEAD는 반대로 마지막 행이 NULL이 됩니다."},{"t":"input","k":"LAG 값 계산","q":"아래 데이터를 mon 순으로 정렬했을 때 mon='Mar' 행에서 LAG(rev, 1)이 반환하는 값은?","code":"-- rows (mon, rev)\n-- Jan, 100\n-- Feb, 150\n-- Mar, 120\n-- Apr, 200\nLAG(rev, 1) OVER (ORDER BY mon)","a":["150"],"ex":"LAG(rev,1)은 바로 이전 행(Feb)의 rev 값을 가져옵니다. Mar의 이전 행은 Feb이고 그 rev는 150입니다. Mar 자신의 120이 아님에 주의하세요."},{"t":"input","k":"전월 대비 증감","q":"위와 동일한 데이터에서 rev - LAG(rev, 1) OVER (ORDER BY mon)로 계산한 Mar 행의 결과값은? (부호 포함)","a":["-30"],"ex":"Mar의 rev(120)에서 이전 행 Feb의 rev(150)를 빼면 120 - 150 = -30 입니다. 전월 대비 감소를 나타내는 전형적인 delta 계산 패턴입니다."},{"t":"choice","k":"LAG 기본값","q":"LAG(price, 2, 0)에서 세 번째 인자 0의 의미로 옳은 것은?","o":["offset을 2에서 0으로 재정의한다","참조할 행이 없을 때(첫 두 행) NULL 대신 반환할 기본값","결과를 0으로 반올림한다","파티션 경계를 0으로 설정한다"],"a":1,"ex":"LAG(expr, offset, default)의 세 번째 인자는 참조 대상 행이 존재하지 않을 때 반환할 기본값입니다. offset=2이므로 첫 두 행이 대상이 없어 NULL 대신 0을 반환합니다."},{"t":"choice","k":"LEAD offset 2","q":"총 5개 행이 ORDER BY로 정렬되어 있을 때 LEAD(x, 2)가 NULL을 반환하는 행은 몇 개인가?","o":["0개","1개","2개","3개"],"a":2,"ex":"LEAD(x, 2)는 2행 뒤를 참조합니다. 마지막 두 행(4번째, 5번째)은 각각 6번째, 7번째 행이 없으므로 NULL이 됩니다. 따라서 2개 행이 NULL입니다."}]},{"title":"NTILE와 FIRST/LAST_VALUE","xp":30,"q":[{"t":"choice","k":"NTILE 분배","q":"10개 행에 NTILE(4)를 적용하면 각 버킷의 행 개수는 어떻게 분배되는가?","o":["2,2,2,4","3,3,2,2","2,2,3,3","4,2,2,2"],"a":1,"ex":"NTILE(n)은 행을 균등 분할하되 나누어떨어지지 않으면 '앞쪽' 버킷에 여분을 배정합니다. 10/4 = 2 나머지 2이므로 앞의 두 버킷이 3개, 뒤의 두 버킷이 2개가 되어 3,3,2,2 입니다."},{"t":"input","k":"NTILE 버킷 번호","q":"10개 행을 NTILE(4)로 나눌 때(3,3,2,2 분배), 정렬 순서상 7번째 행이 속하는 버킷 번호는?","a":["3"],"ex":"버킷1은 1~3행, 버킷2는 4~6행, 버킷3은 7~8행, 버킷4는 9~10행입니다. 따라서 7번째 행은 버킷 3에 속합니다."},{"t":"choice","k":"LAST_VALUE 함정","q":"SELECT LAST_VALUE(sal) OVER (ORDER BY hire) FROM emp; 가 각 행마다 '현재 행까지 중 마지막' 값만 반환하는 이유는?","o":["LAST_VALUE는 원래 현재 행만 본다","ORDER BY가 있으면 기본 프레임이 RANGE UNBOUNDED PRECEDING AND CURRENT ROW라서","sal에 인덱스가 없어서","LAST_VALUE는 NULL을 무시해서"],"a":1,"ex":"ORDER BY가 있으면 기본 프레임은 RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW입니다. 즉 프레임이 현재 행에서 끝나므로 LAST_VALUE는 매번 현재 행 값을 돌려줍니다. 전체 마지막 값이 아닙니다."},{"t":"choice","k":"LAST_VALUE 교정","q":"파티션 '전체'의 마지막 값을 얻으려면 LAST_VALUE에 어떤 프레임을 명시해야 하는가?","o":["ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW","ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING","ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING","RANGE BETWEEN 1 PRECEDING AND 1 FOLLOWING"],"a":2,"ex":"프레임을 ROWS BETWEEN UNBOUNDED PRECEDING AND UNBOUNDED FOLLOWING로 확장해야 파티션의 처음부터 끝까지 전체를 보므로 진짜 마지막 값을 얻습니다. FIRST_VALUE는 기본 프레임으로도 문제없습니다."},{"t":"input","k":"FIRST_VALUE 결과","q":"hire 오름차순 파티션에서 FIRST_VALUE(name) OVER (PARTITION BY dept ORDER BY hire)는 각 부서의 어떤 사원 이름을 반환하는가? '가장 먼저' 또는 '가장 나중' 중 하나로 답하시오.","a":["가장 먼저","가장먼저"],"ex":"FIRST_VALUE는 프레임의 첫 행 값을 반환하며, 기본 프레임의 시작은 UNBOUNDED PRECEDING입니다. hire 오름차순이므로 각 부서에서 가장 먼저 입사한(가장 오래된) 사원의 이름을 돌려줍니다."}]},{"title":"프레임과 누적합","xp":30,"q":[{"t":"input","k":"누적합 계산","q":"amount를 day 순으로 정렬하고 SUM(amount) OVER (ORDER BY day ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)로 누적합을 구할 때, 3번째 행(70)의 누적합 값은?","code":"-- rows in day order (amount)\n-- 50\n-- 30\n-- 70\n-- 20\nSUM(amount) OVER (\n  ORDER BY day\n  ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)","a":["150"],"ex":"누적합은 첫 행부터 현재 행까지 더합니다. 50 + 30 + 70 = 150. (4번째 행은 170이 됩니다.)"},{"t":"choice","k":"프레임 의미","q":"ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW 프레임의 의미로 옳은 것은?","o":["파티션 전체 행","현재 행 하나만","파티션 시작부터 현재 행까지(포함)","현재 행부터 파티션 끝까지"],"a":2,"ex":"UNBOUNDED PRECEDING은 파티션의 첫 행, CURRENT ROW는 현재 행입니다. 따라서 프레임은 시작부터 현재 행까지를 포함하며 이것이 누적합(running total)의 기본 형태입니다."},{"t":"choice","k":"ROWS vs RANGE","q":"ORDER BY 컬럼에 동일한 값(peer)이 여러 개 있을 때 ROWS와 RANGE 프레임의 차이는?","o":["둘 다 동일하게 동작한다","ROWS는 물리적 행 개수 기준, RANGE는 동일 정렬값 peer를 모두 함께 포함한다","RANGE는 물리적 행, ROWS는 논리적 값 기준이다","RANGE는 인덱스가 있어야만 동작한다"],"a":1,"ex":"ROWS는 물리적 행 위치로 프레임 경계를 정합니다. RANGE는 정렬값 기준이라 CURRENT ROW라도 같은 정렬값을 가진 모든 peer 행을 프레임에 함께 포함합니다. 동점이 있으면 결과가 달라집니다."},{"t":"input","k":"RANGE 동점 합","q":"val 순으로 정렬된 (10, 10, 20) 세 행에서 SUM(val) OVER (ORDER BY val RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)를 계산할 때 '첫 번째' 행(val=10)의 결과값은?","a":["20"],"ex":"RANGE는 같은 정렬값 peer를 모두 포함합니다. 첫 행의 val=10과 두 번째 행의 val=10은 peer이므로 프레임에 둘 다 들어가 10 + 10 = 20입니다. ROWS였다면 10이었을 것입니다."},{"t":"choice","k":"PARTITION과 프레임","q":"PARTITION BY dept와 프레임의 상호작용에 대해 옳은 것은?","o":["프레임은 테이블 전체에 걸쳐 확장될 수 있다","프레임(UNBOUNDED PRECEDING 포함)은 현재 파티션 경계를 넘지 못한다","PARTITION BY가 있으면 프레임을 쓸 수 없다","프레임은 파티션을 무시하고 항상 전역이다"],"a":1,"ex":"프레임은 항상 현재 행이 속한 파티션 내부에서만 계산됩니다. UNBOUNDED PRECEDING은 '파티션의' 첫 행을, UNBOUNDED FOLLOWING은 '파티션의' 마지막 행을 의미하며 다른 파티션으로 넘어가지 않습니다."}]}]},
{"title":"재귀 CTE","guide":"🔁","lessons":[{"title":"재귀 CTE 구조","xp":27,"q":[{"t":"input","k":"필수 키워드","q":"재귀 CTE를 정의할 때 WITH 다음에 반드시 붙여야 하는 키워드는? (영어 대문자)","a":["RECURSIVE"],"ex":"표준 SQL과 PostgreSQL, MySQL 8+에서는 WITH RECURSIVE로 선언해야 재귀가 허용됩니다. (참고: SQL Server는 RECURSIVE 키워드 없이 재귀 CTE를 지원합니다.)"},{"t":"choice","k":"두 멤버 구조","q":"재귀 CTE는 두 부분을 UNION ALL로 결합합니다. 올바른 구성은?","o":["앵커 멤버 + 재귀 멤버","SELECT + INSERT","인덱스 멤버 + 스캔 멤버","앵커 멤버 두 개"],"a":0,"ex":"재귀 CTE는 초기 결과를 만드는 앵커 멤버(anchor)와, CTE 자기 자신을 참조하며 반복 실행되는 재귀 멤버(recursive member)를 UNION ALL로 결합한 구조입니다."},{"t":"choice","k":"자기참조 위치","q":"재귀 CTE에서 CTE 이름 자기 자신을 FROM 절에서 참조하는 부분은?","o":["앵커 멤버","재귀 멤버","최종 외부 SELECT","WHERE 절"],"a":1,"ex":"재귀 멤버만이 정의 중인 CTE 자신을 FROM에 참조합니다. 앵커 멤버는 자기 자신을 참조하지 않고 시작 집합만 생성합니다."},{"t":"choice","k":"UNION 차이","q":"재귀 CTE에서 UNION ALL 대신 UNION을 쓰면 생기는 효과는?","o":["문법 오류가 난다","반복마다 중복 행을 제거하므로 순환 데이터의 무한루프를 막는 데 도움될 수 있다","성능이 항상 더 빨라진다","재귀 깊이가 2배가 된다"],"a":1,"ex":"UNION은 중복을 제거하므로, 이미 나온 행이 다시 생성되면 걸러져 순환 그래프에서 자연 종료에 도움이 될 수 있습니다. 다만 중복 제거 비용이 있고, 값이 조금씩 달라지는 경우엔 무한루프를 막지 못합니다."},{"t":"choice","k":"실행 순서","q":"재귀 CTE의 실행 방식으로 옳은 것은?","o":["앵커를 한 번 실행 후, 직전 반복의 결과를 입력으로 재귀 멤버를 행이 나오지 않을 때까지 반복 실행","재귀 멤버를 먼저 실행하고 앵커로 종료","앵커와 재귀 멤버를 동시에 병렬 실행","재귀 멤버를 정확히 한 번만 실행"],"a":0,"ex":"앵커 멤버가 초기 작업 집합을 만들고, 재귀 멤버는 직전 반복이 만든 행만을 입력으로 받아 반복 실행됩니다. 새 행이 하나도 생성되지 않으면 종료됩니다."}]},{"title":"숫자 생성과 계층 탐색","xp":28,"q":[{"t":"input","k":"행 개수","q":"아래 재귀 CTE가 생성하는 행의 총 개수는?","code":"WITH RECURSIVE nums(n) AS (\n  SELECT 1\n  UNION ALL\n  SELECT n + 1 FROM nums WHERE n &lt; 5\n)\nSELECT * FROM nums;","a":["5"],"ex":"앵커가 1을 만들고, 재귀가 n&lt;5인 동안 n+1을 추가합니다: 1,2,3,4,5. n=5는 조건 n&lt;5를 만족하지 못해 멈춥니다. 총 5개 행(1부터 5까지)이 생성됩니다."},{"t":"input","k":"합계 결과","q":"위 nums CTE에 대해 SELECT SUM(n) FROM nums; 의 결과값은?","a":["15"],"ex":"생성된 값은 1,2,3,4,5이며 합은 1+2+3+4+5 = 15입니다."},{"t":"choice","k":"계층 탐색","q":"employee(id, mgr_id) 테이블에서 특정 사원의 모든 하위(부하) 직원을 찾으려 할 때, 재귀 멤버의 JOIN 조건으로 옳은 것은?","o":["e.id = cte.mgr_id","e.mgr_id = cte.id","e.id = cte.id","e.mgr_id = cte.mgr_id"],"a":1,"ex":"하향(부하 방향) 탐색은 '현재까지 찾은 사원(cte.id)을 상사로 두는 직원(e.mgr_id)'을 이어붙입니다. 즉 e.mgr_id = cte.id 조건으로 한 단계 아래로 내려갑니다."},{"t":"choice","k":"깊이 추적","q":"계층 탐색에서 각 행의 레벨(깊이)을 함께 얻으려면 어떻게 하는가?","o":["앵커에서 lvl=1로 시작하고 재귀 멤버에서 cte.lvl + 1을 select한다","COUNT(*)를 외부에서 계산한다","ORDER BY id를 붙인다","레벨은 자동으로 제공되며 별도 계산 불가"],"a":0,"ex":"앵커에서 시작 레벨(예: 1)을 상수로 넣고, 재귀 멤버에서 이전 행의 레벨 + 1을 select하면 각 단계마다 깊이가 1씩 증가합니다. 이는 계층 트리의 depth 컬럼을 만드는 표준 기법입니다."},{"t":"choice","k":"경로 누적","q":"재귀 CTE로 루트부터 현재 노드까지의 경로 문자열을 만들 때 재귀 멤버에서 하는 일은?","o":["매번 경로를 NULL로 초기화한다","부모의 경로에 현재 노드를 이어붙여(문자열 연결) 누적한다","경로는 앵커에서만 만들 수 있다","GROUP BY로 경로를 집계한다"],"a":1,"ex":"앵커에서 루트 경로를 만들고, 재귀 멤버에서 CONCAT(부모.path, '/', 자식.name)처럼 부모의 누적 경로에 현재 노드를 이어붙이면 루트-to-노드 경로가 단계마다 확장됩니다."}]},{"title":"종료 조건과 무한루프","xp":28,"q":[{"t":"choice","k":"무한루프 원인","q":"다음 재귀 CTE가 무한루프(또는 깊이 초과 에러)에 빠지는 주된 이유는?","code":"WITH RECURSIVE t(n) AS (\n  SELECT 1\n  UNION ALL\n  SELECT n + 1 FROM t\n)\nSELECT * FROM t;","o":["UNION ALL을 UNION으로 써야 해서","재귀 멤버에 종료 조건(WHERE n &lt; 한계)이 없어서 새 행이 계속 생성됨","앵커가 잘못되어서","n+1이 정수 오버플로를 일으켜서"],"a":1,"ex":"재귀 멤버에 종료를 유도하는 WHERE 조건(예: WHERE n &lt; 100)이 없어 매 반복마다 새 행이 계속 생성됩니다. 결국 무한 생성되거나 DBMS의 재귀 깊이 한계에 도달해 에러가 납니다."},{"t":"choice","k":"순환 데이터","q":"그래프에 순환(A→B→A)이 있는 데이터를 계층 탐색할 때 무한루프를 막는 방법으로 적절하지 '않은' 것은?","o":["방문 경로를 배열/문자열로 누적해 이미 방문한 노드면 제외","재귀 깊이(레벨) 상한을 WHERE로 설정","UNION(중복 제거)을 활용","ORDER BY를 추가해서 정렬"],"a":3,"ex":"ORDER BY는 최종 결과 정렬일 뿐 순환을 끊지 못합니다. 순환 방지는 방문 노드 추적, 깊이 상한, 또는 중복 제거(UNION) 등으로 해결합니다. PostgreSQL은 CYCLE 절도 제공합니다."},{"t":"choice","k":"깊이 한계","q":"MySQL 8+에서 재귀 반복 횟수의 기본 상한을 제어하는 설정은?","o":["max_recursion","cte_max_recursion_depth","recursion_limit","OPTION (MAXRECURSION)"],"a":1,"ex":"MySQL 8+는 시스템 변수 cte_max_recursion_depth(기본 1000)로 재귀 깊이를 제한합니다. SQL Server는 OPTION (MAXRECURSION n), PostgreSQL은 기본 깊이 제한이 없어 종료 조건 설계가 특히 중요합니다."},{"t":"choice","k":"종료 시점","q":"재귀 CTE는 언제 정상적으로 반복을 멈추는가?","o":["앵커가 10번 실행되면","재귀 멤버가 새로운 행을 하나도 생성하지 못하면","결과가 1000행이 되면 자동으로","외부 SELECT에 LIMIT이 있으면 항상"],"a":1,"ex":"재귀는 직전 반복이 만든 작업 집합을 입력으로 삼는데, 어느 반복에서 재귀 멤버가 새 행을 전혀 만들지 못하면 그 시점에서 자연스럽게 종료됩니다."},{"t":"input","k":"생성 최댓값","q":"WITH RECURSIVE t(n) AS (SELECT 1 UNION ALL SELECT n+1 FROM t WHERE n &lt; 100)에서 t가 생성하는 n의 '최댓값'은?","a":["100"],"ex":"n=99일 때 조건(99&lt;100)이 참이라 100을 생성합니다. n=100은 조건(100&lt;100)이 거짓이라 더 생성하지 않습니다. 따라서 값은 1부터 100까지이며 최댓값은 100입니다."}]}]},
{"title":"인덱스와 실행계획","guide":"🔍","lessons":[{"title":"B-tree와 인덱스 활용 조건","xp":29,"q":[{"t":"choice","k":"B-tree 특성","q":"B-tree 인덱스의 특성으로 옳은 것은?","o":["키를 정렬된 상태로 유지하여 등호/범위 검색을 O(log n)에 수행","해시값으로 저장해 범위 검색에 최적","항상 테이블 전체를 순차 스캔한다","정렬을 지원하지 않는다"],"a":0,"ex":"B-tree는 키를 정렬된 균형 트리로 유지하므로 등호(=), 범위(&lt;, &gt;, BETWEEN), 정렬(ORDER BY), 접두 검색에 효율적이며 탐색 비용이 O(log n)입니다. 반면 해시 인덱스는 등호에만 강하고 범위 검색엔 부적합합니다."},{"t":"choice","k":"함수 적용","q":"col에 일반 인덱스가 있을 때, 다음 중 그 인덱스를 '타지 못하는' 조건은?","o":["WHERE col = 100","WHERE col BETWEEN 10 AND 20","WHERE YEAR(col) = 2024","WHERE col &gt; 50"],"a":2,"ex":"인덱스 컬럼에 함수(YEAR(col))를 감싸면 인덱스에 저장된 원본 값 순서를 활용할 수 없어 인덱스를 못 탑니다. col &gt;= '2024-01-01' AND col &lt; '2025-01-01' 처럼 sargable하게 바꾸거나 함수 기반 인덱스를 만들어야 합니다."},{"t":"choice","k":"선행 와일드카드","q":"name에 B-tree 인덱스가 있을 때 인덱스 range scan을 '활용하지 못하는' LIKE 패턴은?","o":["LIKE 'kim%'","LIKE 'a%'","LIKE '%son'","LIKE 'park%'"],"a":2,"ex":"B-tree는 왼쪽부터 정렬된 접두사를 기준으로 탐색합니다. LIKE '%son'처럼 선행 와일드카드가 있으면 시작 접두사를 알 수 없어 range scan을 못 하고 전체 스캔에 가까워집니다. 접미 검색이 잦으면 역순 컬럼 인덱스 등을 고려합니다."},{"t":"choice","k":"접두 LIKE","q":"LIKE 'seoul%' (뒤쪽 와일드카드)가 인덱스를 탈 수 있는 이유는?","o":["와일드카드는 항상 인덱스를 못 탄다","고정된 선행 접두사 'seoul'로 정렬된 인덱스 범위를 좁힐 수 있어서","LIKE는 = 로 자동 변환되어서","옵티마이저가 패턴을 무시해서"],"a":1,"ex":"'seoul%'는 'seoul'로 시작하는 고정 접두사가 있어, 정렬된 B-tree에서 'seoul'로 시작하는 연속 범위로 좁혀 range scan이 가능합니다. 선행 접두사가 확정될 때만 인덱스 활용이 됩니다."},{"t":"input","k":"sargable 변환","q":"WHERE YEAR(order_date) = 2024 를 인덱스가 동작하도록 바꿀 때, 범위 조건의 '하한 경계' 날짜 리터럴은? (YYYY-MM-DD 형식)","a":["2024-01-01","'2024-01-01'"],"ex":"order_date &gt;= '2024-01-01' AND order_date &lt; '2025-01-01' 로 바꾸면 컬럼에 함수를 씌우지 않아 인덱스 range scan이 가능합니다. 하한 경계는 2024-01-01 입니다."}]},{"title":"복합 인덱스와 커버링","xp":30,"q":[{"t":"choice","k":"leftmost","q":"복합 인덱스 (a, b, c)가 있을 때, 인덱스를 효율적으로 사용할 수 '없는' WHERE 조건은?","o":["WHERE a = 1","WHERE a = 1 AND b = 2","WHERE b = 2 AND c = 3","WHERE a = 1 AND b = 2 AND c = 3"],"a":2,"ex":"복합 인덱스는 leftmost prefix 규칙을 따릅니다. 선행 컬럼 a 없이 b, c만으로는 인덱스 시작점을 정할 수 없어 효율적으로 탈 수 없습니다. a가 조건에 포함되어야 인덱스를 활용합니다."},{"t":"choice","k":"범위 후 컬럼","q":"복합 인덱스 (a, b)에서 WHERE a &gt; 10 AND b = 5 일 때 b가 인덱스로 잘 활용되지 못하는 이유는?","o":["b가 문자열이라서","선행 컬럼 a에 범위(&gt;) 조건이 걸리면 그 이후 컬럼 b는 인덱스 정렬을 이어서 활용하기 어려워서","b = 5는 항상 인덱스를 못 타서","인덱스에 컬럼이 2개뿐이라서"],"a":1,"ex":"복합 인덱스에서 선행 컬럼에 범위 조건이 오면, 그 뒤 컬럼들은 인덱스상 정렬이 연속적이지 않아 등호 조건이라도 효율적으로 좁히기 어렵습니다. 그래서 등호 조건 컬럼을 앞쪽에, 범위 컬럼을 뒤쪽에 두는 것이 유리합니다."},{"t":"choice","k":"커버링 정의","q":"커버링 인덱스(covering index)의 정의로 옳은 것은?","o":["모든 컬럼에 각각 만든 인덱스","쿼리가 필요로 하는 모든 컬럼을 인덱스 자체가 포함해 테이블 데이터 접근 없이 처리 가능한 인덱스","PRIMARY KEY 인덱스만을 가리키는 용어","NULL을 허용하지 않는 인덱스"],"a":1,"ex":"커버링 인덱스는 쿼리의 SELECT/WHERE/ORDER BY에 필요한 모든 컬럼을 인덱스가 담고 있어, 실제 테이블 행(heap/clustered)까지 조회하지 않고 인덱스만으로 결과를 낼 수 있는 경우를 말합니다."},{"t":"choice","k":"커버링 이점","q":"커버링 인덱스가 성능상 유리한 핵심 이유는?","o":["인덱스가 자동으로 정렬되어서","테이블 랜덤 접근(row/bookmark lookup)을 제거해 I/O를 줄이므로","쓰기 성능이 빨라져서","NULL 처리가 빨라져서"],"a":1,"ex":"일반적으로 인덱스에서 원하는 행을 찾은 뒤 나머지 컬럼을 위해 테이블 본체를 다시 조회(row/bookmark lookup)합니다. 커버링 인덱스는 이 추가 접근을 없애 랜덤 I/O를 크게 줄입니다. MySQL EXPLAIN의 Extra에 'Using index'로 나타납니다."},{"t":"choice","k":"정렬 활용","q":"복합 인덱스 (dept, salary)가 있을 때, 추가 정렬 작업(filesort) 없이 인덱스 순서를 그대로 활용할 수 있는 쿼리는?","o":["WHERE dept = 'IT' ORDER BY salary","ORDER BY salary","WHERE salary = 100 ORDER BY dept","ORDER BY dept, hire_date"],"a":0,"ex":"인덱스 (dept, salary)는 dept로 묶인 뒤 각 dept 내에서 salary로 정렬돼 있습니다. dept를 등호로 고정하면 그 그룹 안이 salary 정렬 상태이므로 ORDER BY salary를 filesort 없이 인덱스 순서로 처리할 수 있습니다."}]},{"title":"EXPLAIN과 트레이드오프","xp":29,"q":[{"t":"choice","k":"풀스캔 신호","q":"MySQL EXPLAIN 결과에서 인덱스를 타지 못하고 풀 테이블 스캔이 일어남을 나타내는 type 값은?","o":["const","ref","range","ALL"],"a":3,"ex":"type=ALL은 풀 테이블 스캔을 의미하며 대개 튜닝 대상입니다. 좋은 순서는 대략 const &gt; eq_ref &gt; ref &gt; range &gt; index &gt; ALL 이며, 뒤로 갈수록 스캔량이 많아집니다."},{"t":"choice","k":"쓰기 비용","q":"인덱스를 많이 추가할 때의 주요 트레이드오프는?","o":["읽기가 느려진다","INSERT/UPDATE/DELETE 시 인덱스도 갱신해야 해 쓰기 비용과 저장 공간이 증가","인덱스는 비용이 전혀 없다","SELECT가 항상 느려진다"],"a":1,"ex":"인덱스는 읽기를 빠르게 하지만, 데이터 변경 시마다 관련 인덱스를 모두 갱신해야 하므로 쓰기 성능이 저하되고 디스크 공간을 추가로 사용합니다. 그래서 꼭 필요한 인덱스만 유지하는 균형이 중요합니다."},{"t":"choice","k":"PK vs UNIQUE","q":"PRIMARY KEY와 UNIQUE 제약의 차이로 옳은 것은?","o":["둘 다 NULL을 허용한다","PRIMARY KEY는 NULL 불가·테이블당 1개, UNIQUE는 (표준상) NULL 허용·여러 개 가능","UNIQUE는 NULL 불가, PRIMARY는 NULL 허용","둘은 완전히 동일하다"],"a":1,"ex":"PRIMARY KEY는 NOT NULL이며 테이블당 하나만 존재합니다. UNIQUE는 여러 개 만들 수 있고 표준 SQL에서 NULL을 허용합니다(여러 NULL 허용 여부는 DBMS마다 다름). 둘 다 고유성을 위한 인덱스를 자동 생성합니다."},{"t":"choice","k":"클러스터링","q":"InnoDB(MySQL)에서 PRIMARY KEY가 특별한 이유는?","o":["단순히 첫 번째 인덱스라서","테이블 행 데이터가 PRIMARY KEY 순서로 저장되는 클러스터형 인덱스이기 때문","PRIMARY KEY는 인덱스를 만들지 않아서","항상 자동 증가여야 해서"],"a":1,"ex":"InnoDB에서 테이블은 PRIMARY KEY를 기준으로 물리적으로 정렬 저장되는 클러스터형 인덱스입니다. 그래서 보조 인덱스(secondary index)는 리프에 PK 값을 저장하고, 이를 통해 행을 찾는 구조가 됩니다. PK 선택이 성능에 큰 영향을 줍니다."},{"t":"input","k":"Extra 표시","q":"MySQL EXPLAIN의 Extra 컬럼에서, 쿼리가 인덱스만으로 처리되어 테이블 접근이 없었음을(커버링 인덱스) 뜻하는 표현은?","a":["Using index","using index"],"ex":"Extra에 'Using index'가 표시되면 인덱스만으로 필요한 데이터를 모두 얻어 테이블 본체를 읽지 않은 커버링 인덱스 상황입니다. (참고: 'Using index condition'은 인덱스 컨디션 푸시다운으로 의미가 다릅니다.)"}]}]},
{"title":"뷰·프로시저·트리거","guide":"⚙️","lessons":[{"title":"뷰(VIEW)의 본질","xp":28,"q":[{"t":"choice","k":"뷰 저장 대상","q":"CREATE VIEW로 뷰를 만들면 데이터베이스에 실제로 저장되는 것은?","o":["뷰 결과 행들의 복사본","SELECT 쿼리 정의(정의문)","베이스 테이블의 인덱스","뷰 전용 물리 테이블"],"a":1,"ex":"일반 뷰는 가상 테이블로, 데이터가 아니라 쿼리 정의만 저장된다. 조회 시점에 정의가 실행되어 결과를 만든다. 결과를 물리적으로 저장하는 것은 materialized view다."},{"t":"choice","k":"뷰 장점","q":"뷰가 제공하는 대표적 이점이 아닌 것은?","o":["복잡한 조인을 추상화해 단순화","특정 컬럼만 노출해 보안 강화","기반 테이블보다 항상 빠른 성능 보장","논리적 독립성 제공"],"a":2,"ex":"뷰는 추상화, 보안(컬럼/행 제한), 논리적 독립성을 준다. 그러나 매 조회 시 정의 쿼리를 실행하므로 성능이 항상 빨라지는 것은 아니며 오히려 느려질 수도 있다."},{"t":"choice","k":"updatable 조건","q":"updatable view가 되기 위한 조건으로 옳은 것은?","o":["DISTINCT를 반드시 포함해야 한다","GROUP BY와 집계 함수를 사용해야 한다","단일 테이블 기반이며 집계·DISTINCT·GROUP BY가 없어야 한다","항상 두 개 이상 테이블을 조인해야 한다"],"a":2,"ex":"뷰를 통해 INSERT/UPDATE/DELETE 하려면 각 결과 행이 베이스 테이블의 한 행에 명확히 대응돼야 한다. 집계, DISTINCT, GROUP BY, 다수 조인, 윈도우 함수 등이 있으면 대응이 깨져 갱신 불가다."},{"t":"input","k":"뷰 삭제문","q":"employees_view라는 뷰를 제거하는 표준 SQL DDL 문장을 작성하시오 (세미콜론 제외).","a":["DROP VIEW employees_view","drop view employees_view"],"ex":"뷰 제거는 DROP VIEW 뷰이름. DROP TABLE은 베이스 테이블용이며 뷰에 쓰면 안 된다."},{"t":"choice","k":"WITH CHECK","q":"CREATE VIEW ... WITH CHECK OPTION의 효과는?","o":["뷰를 읽기 전용으로 강제","뷰를 통한 갱신이 뷰의 WHERE 조건을 위반하지 못하게 검사","뷰 정의를 매번 재컴파일","뷰 결과를 캐시로 저장"],"a":1,"ex":"WITH CHECK OPTION은 뷰를 통해 삽입/수정된 행이 뷰의 조건절을 만족하는지 검사해, 조건을 벗어나 뷰에서 사라지는 행이 생기는 것을 막는다."}]},{"title":"저장 프로시저와 함수","xp":27,"q":[{"t":"choice","k":"프로시저 호출","q":"MySQL에서 저장 프로시저를 실행하는 문장은?","o":["EXEC procedure_name","RUN procedure_name","CALL procedure_name()","SELECT procedure_name()"],"a":2,"ex":"표준 및 MySQL에서 저장 프로시저는 CALL 문으로 호출한다. SELECT로 호출하는 것은 (스칼라) 함수다."},{"t":"choice","k":"함수 vs 프로시저","q":"저장 함수(function)와 저장 프로시저(procedure)의 핵심 차이로 옳은 것은?","o":["함수는 반드시 값을 반환하고 SQL 식 안에서 호출 가능하다","프로시저는 값을 반환할 수 없다","함수는 여러 결과셋을 반환하는 것이 일반적이다","프로시저는 SELECT 절에서 바로 사용할 수 있다"],"a":0,"ex":"함수는 RETURN으로 단일 값을 반환하며 SELECT 등 SQL 식 내부에서 호출된다. 프로시저는 CALL로 호출되며 OUT 파라미터나 결과셋을 낼 수 있고 SQL 식에 직접 넣을 수 없다."},{"t":"choice","k":"OUT 파라미터","q":"프로시저 파라미터 모드에 대한 설명으로 옳은 것은?","o":["IN은 호출자가 값을 돌려받는 용도다","OUT은 프로시저가 결과를 호출자에게 전달하는 용도다","INOUT은 읽기만 가능하다","OUT 파라미터는 초기값을 반드시 넘겨야 한다"],"a":1,"ex":"IN은 입력, OUT은 출력(프로시저 내부에서 값을 설정해 호출자에게 반환), INOUT은 입출력 겸용이다."},{"t":"input","k":"블록 구분자","q":"MySQL에서 BEGIN...END 프로시저 본문의 세미콜론과 충돌을 피하려고 임시로 문장 종료 기호를 바꿀 때 쓰는 키워드는?","a":["DELIMITER","delimiter"],"ex":"DELIMITER $ 처럼 종료 기호를 바꿔 본문 내부의 ; 를 문장 끝으로 오인하지 않게 한 뒤, 정의가 끝나면 다시 DELIMITER ; 로 되돌린다."},{"t":"choice","k":"결정성","q":"저장 함수를 DETERMINISTIC으로 선언한다는 의미는?","o":["같은 입력에 항상 같은 결과를 반환한다","트랜잭션을 자동 커밋한다","실행마다 난수를 반환한다","반드시 테이블을 수정한다"],"a":0,"ex":"DETERMINISTIC은 동일 입력에 동일 출력을 보장한다는 선언으로, 옵티마이저 최적화와 복제 안전성에 활용된다. NOW()나 RAND()를 쓰면 NOT DETERMINISTIC이다."}]},{"title":"트리거(TRIGGER)","xp":29,"q":[{"t":"choice","k":"NEW/OLD","q":"AFTER UPDATE 트리거에서 변경 전 값과 변경 후 값을 각각 참조하는 방법은?","o":["OLD.col = 변경 후, NEW.col = 변경 전","NEW.col = 변경 후, OLD.col = 변경 전","둘 다 NEW.col 사용","PREV.col과 CUR.col"],"a":1,"ex":"행 트리거에서 OLD는 갱신/삭제 전 행, NEW는 삽입/갱신 후 행을 가리킨다. INSERT엔 NEW만, DELETE엔 OLD만 유효하다."},{"t":"choice","k":"BEFORE 용도","q":"BEFORE INSERT 트리거가 특히 유용한 경우는?","o":["삽입될 값을 검증·보정하여 NEW 값을 수정할 때","이미 커밋된 트랜잭션을 롤백할 때","다른 세션의 락을 해제할 때","뷰를 재정의할 때"],"a":0,"ex":"BEFORE 트리거는 실제 쓰기 전에 실행되어 NEW 값을 수정하거나 유효성 검사를 할 수 있다. AFTER는 이미 쓰인 후라 보통 감사 로그·연쇄 작업에 쓴다."},{"t":"choice","k":"트리거 정의","q":"다음 트리거의 동작으로 옳은 것은?","o":["orders에 INSERT 후 audit_log에 기록한다","orders를 SELECT할 때마다 실행된다","audit_log 삭제를 막는다","orders 테이블을 잠근다"],"a":0,"ex":"AFTER INSERT ON orders FOR EACH ROW 이므로 orders에 행이 삽입될 때마다 NEW 값을 audit_log에 남기는 감사 트리거다. SELECT는 트리거를 발동하지 않는다.","code":"CREATE TRIGGER trg_audit\nAFTER INSERT ON orders\nFOR EACH ROW\nINSERT INTO audit_log(order_id, created_at)\nVALUES (NEW.id, NOW());"},{"t":"choice","k":"FOR EACH ROW","q":"MySQL 트리거의 FOR EACH ROW 의미로 옳은 것은?","o":["문장 전체에 대해 한 번만 실행","영향받는 각 행마다 트리거 본문 실행","트랜잭션당 한 번 실행","테이블당 하루 한 번 실행"],"a":1,"ex":"FOR EACH ROW는 행 수준 트리거로, 영향을 받는 각 행마다 본문이 실행된다. 문장 수준(statement-level) 트리거와 대비된다."},{"t":"input","k":"발동 시점 키워드","q":"트리거 본문 실행 시점을 실제 쓰기 전/후로 지정하는 두 키워드 중 하나를 쓰시오.","a":["BEFORE","AFTER","before","after"],"ex":"트리거는 BEFORE 또는 AFTER 시점에 INSERT/UPDATE/DELETE 이벤트로 정의된다."}]}]},
{"title":"트랜잭션 격리 수준","guide":"🔒","lessons":[{"title":"네 가지 격리 수준","xp":29,"q":[{"t":"choice","k":"모두 허용","q":"세 가지 읽기 이상현상(Dirty/Non-repeatable/Phantom)을 모두 허용하는 가장 낮은 격리 수준은?","o":["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"],"a":0,"ex":"READ UNCOMMITTED는 커밋되지 않은 데이터까지 읽어 Dirty·Non-repeatable·Phantom Read를 모두 허용한다. 가장 낮은 격리이자 최고 동시성이다."},{"t":"choice","k":"모두 차단","q":"세 가지 읽기 이상현상을 모두 방지하는 가장 높은 격리 수준은?","o":["READ COMMITTED","REPEATABLE READ","SERIALIZABLE","READ UNCOMMITTED"],"a":2,"ex":"SERIALIZABLE은 트랜잭션들을 직렬 실행한 것과 동등하게 만들어 Dirty·Non-repeatable·Phantom Read를 전부 막는다. 대신 동시성이 가장 낮다."},{"t":"choice","k":"RC가 막는 것","q":"READ COMMITTED가 방지하는 이상현상은?","o":["Dirty Read만","Dirty와 Non-repeatable Read","Non-repeatable Read만","Phantom Read만"],"a":0,"ex":"READ COMMITTED는 커밋된 데이터만 읽으므로 Dirty Read만 방지한다. 같은 행을 다시 읽으면 값이 바뀔 수 있어(Non-repeatable) 이 현상과 Phantom은 허용된다."},{"t":"choice","k":"RR가 막는 것","q":"REPEATABLE READ가 표준적으로 방지/허용하는 조합으로 옳은 것은?","o":["Dirty·Non-repeatable 방지, Phantom 허용","셋 다 방지","Dirty만 방지","셋 다 허용"],"a":0,"ex":"표준 정의상 REPEATABLE READ는 Dirty와 Non-repeatable Read를 막지만 Phantom Read는 고전적으로 허용한다. (InnoDB는 갭 락으로 실질적으로 팬텀도 대부분 막는 예외적 구현이다.)"},{"t":"choice","k":"트레이드오프","q":"격리 수준을 높일수록 일반적으로 나타나는 경향은?","o":["동시성 증가, 일관성 감소","동시성 감소, 일관성 증가","동시성·일관성 모두 증가","동시성·일관성 모두 감소"],"a":1,"ex":"격리 수준이 높을수록 잠금/차단이 늘어 동시성은 떨어지지만 데이터 일관성은 강해진다. 전형적인 성능-정합성 트레이드오프다."}]},{"title":"읽기 이상현상 매핑","xp":28,"q":[{"t":"choice","k":"Dirty Read","q":"Dirty Read의 정의로 옳은 것은?","o":["다른 트랜잭션이 커밋하지 않은 변경을 읽는 것","같은 조건 재조회 시 행 수가 달라지는 것","같은 행을 두 번 읽을 때 값이 달라지는 것","커밋 후에도 값이 유지되는 것"],"a":0,"ex":"Dirty Read는 아직 커밋되지 않은(롤백될 수도 있는) 다른 트랜잭션의 변경을 읽는 것이다. 롤백되면 존재하지 않았던 값을 읽은 셈이 된다."},{"t":"choice","k":"Non-repeatable","q":"Non-repeatable Read를 가장 잘 설명한 것은?","o":["한 트랜잭션 내에서 같은 행을 다시 읽으면 값이 바뀌어 있음","커밋 안 된 값을 읽음","새 행이 추가로 나타남","락이 해제되지 않음"],"a":0,"ex":"Non-repeatable Read는 같은 행을 두 번 읽는 사이 다른 트랜잭션이 그 행을 수정·커밋해 값이 달라지는 현상이다. 대상은 이미 존재하던 행이다."},{"t":"choice","k":"Phantom","q":"Phantom Read와 Non-repeatable Read의 차이는?","o":["Phantom은 조건에 맞는 행 집합이 늘거나 줄어드는 것, Non-repeatable은 기존 행 값 변화","둘은 완전히 동일하다","Phantom은 커밋 전 데이터 읽기다","Non-repeatable은 새 행 등장이다"],"a":0,"ex":"Non-repeatable은 기존 행의 값이 바뀌는 것, Phantom은 같은 검색 조건에 부합하는 행의 집합 자체(개수)가 삽입/삭제로 달라지는 것이다."},{"t":"choice","k":"수준 선택","q":"Phantom Read는 허용하되 Non-repeatable Read는 막고 싶다면 표준상 어떤 수준을 선택해야 하나?","o":["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"],"a":2,"ex":"REPEATABLE READ가 Non-repeatable은 막고 Phantom은 (표준상) 허용하는 유일한 수준이다. 위 요구에 정확히 부합한다."},{"t":"input","k":"롤백 위험 읽기","q":"롤백될 수도 있는, 커밋되지 않은 데이터를 읽는 이상현상의 영어 명칭 두 단어를 쓰시오.","a":["Dirty Read","dirty read","dirtyread"],"ex":"커밋 전 데이터를 읽는 현상은 Dirty Read이며, READ UNCOMMITTED에서만 발생한다."}]},{"title":"잠금·데드락·InnoDB","xp":27,"q":[{"t":"choice","k":"S/X 락","q":"공유락(S)과 배타락(X)의 호환성으로 옳은 것은?","o":["S-S는 호환, S-X와 X-X는 비호환","모든 조합이 호환","S-S만 비호환","X-X만 호환"],"a":0,"ex":"공유락끼리는 동시에 가질 수 있어(S-S 호환) 여러 읽기가 병행되지만, 배타락은 다른 어떤 락과도 공존할 수 없다(S-X, X-X 비호환)."},{"t":"choice","k":"데드락","q":"데드락(deadlock)이 발생하는 상황은?","o":["두 트랜잭션이 서로가 보유한 락을 순환 대기할 때","한 트랜잭션이 커밋할 때","락을 전혀 사용하지 않을 때","읽기만 수행할 때"],"a":0,"ex":"데드락은 둘 이상의 트랜잭션이 서로 상대가 쥔 자원을 순환적으로 기다려 아무도 진행하지 못하는 상태다. DBMS는 보통 한쪽을 희생시켜 롤백해 해소한다."},{"t":"choice","k":"InnoDB 기본","q":"MySQL InnoDB 스토리지 엔진의 기본 트랜잭션 격리 수준은?","o":["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"],"a":2,"ex":"InnoDB의 기본 격리 수준은 REPEATABLE READ이며, 갭 락(next-key lock) 덕분에 이 수준에서 팬텀까지 상당 부분 방지하는 특징이 있다."},{"t":"choice","k":"명시적 락","q":"SELECT ... FOR UPDATE 구문의 효과는?","o":["조회한 행에 배타락(X)을 걸어 다른 트랜잭션의 수정을 차단","조회 결과를 읽기 전용으로 캐시","격리 수준을 READ UNCOMMITTED로 낮춤","즉시 커밋"],"a":0,"ex":"FOR UPDATE는 읽은 행에 배타락을 걸어 다른 트랜잭션이 그 행을 수정/삭제하지 못하게 한다. 갱신 예정 행을 선점할 때 사용한다."},{"t":"choice","k":"데드락 대응","q":"데드락을 줄이거나 대응하는 방법으로 적절하지 않은 것은?","o":["트랜잭션에서 자원을 항상 동일한 순서로 접근","트랜잭션을 짧게 유지","데드락 감지 시 재시도 로직 적용","모든 트랜잭션 격리 수준을 SERIALIZABLE로 강제"],"a":3,"ex":"자원 접근 순서 일관화, 짧은 트랜잭션, 재시도는 유효한 완화책이다. 무조건 SERIALIZABLE로 올리면 잠금이 늘어 오히려 데드락과 대기가 증가할 수 있다."}]}]},
{"title":"정규화와 설계","guide":"📐","lessons":[{"title":"함수 종속과 이상현상","xp":28,"q":[{"t":"choice","k":"함수 종속","q":"함수 종속 A → B의 의미로 옳은 것은?","o":["A 값이 정해지면 B 값이 유일하게 결정된다","A와 B가 서로 독립이다","B가 기본키다","A는 항상 외래키다"],"a":0,"ex":"A → B는 A의 값이 결정되면 B의 값이 하나로 결정된다는 함수 종속 관계다. 정규화 판단의 기본 개념이다."},{"t":"choice","k":"갱신 이상","q":"갱신 이상(update anomaly)이 뜻하는 것은?","o":["중복 저장된 값 중 일부만 수정되어 데이터가 불일치","행을 삭제하면 필요한 정보까지 사라짐","새 정보를 넣으려면 불필요한 값이 강제됨","조회 속도가 느려짐"],"a":0,"ex":"갱신 이상은 같은 사실이 여러 행에 중복 저장돼 있을 때 일부만 갱신되어 값이 모순되는 문제다. 삭제 이상·삽입 이상과 함께 비정규 설계의 대표 폐해다."},{"t":"choice","k":"삽입 이상","q":"삽입 이상(insertion anomaly)의 예로 옳은 것은?","o":["아직 수강생이 없는 새 과목을 등록하려는데 학생 정보가 없어 넣지 못함","학생을 지우니 과목 정보도 사라짐","이름을 바꾸는데 일부만 반영됨","인덱스가 커짐"],"a":0,"ex":"삽입 이상은 원치 않는 다른 데이터가 있어야만 특정 정보를 넣을 수 있는 문제다. 학생-과목이 한 테이블이면 학생 없이 과목만 등록하기 어렵다."},{"t":"choice","k":"삭제 이상","q":"삭제 이상(deletion anomaly)이란?","o":["한 데이터를 지우면 함께 저장돼 있던 다른 필요한 정보까지 사라지는 것","중복 값 일부만 수정되는 것","조회가 실패하는 것","락이 걸리는 것"],"a":0,"ex":"삭제 이상은 어떤 튜플을 삭제할 때 유지되어야 할 다른 정보까지 함께 소실되는 문제다. 예: 마지막 수강생 삭제 시 과목 정보까지 사라짐."},{"t":"choice","k":"종속 표기","q":"결정자 X가 종속자 Y를 유일하게 결정하는 함수 종속을 기호로 표기하면?","o":["X → Y","X ↔ Y","X = Y","X ⊂ Y"],"a":0,"ex":"함수 종속은 X → Y로 표기하며, X를 결정자(determinant), Y를 종속자라 한다."}]},{"title":"정규형 1NF~BCNF","xp":30,"q":[{"t":"choice","k":"1NF","q":"제1정규형(1NF)의 핵심 요건은?","o":["모든 속성이 원자값(더 이상 분해되지 않는 단일 값)을 가진다","부분 함수 종속이 없다","이행 함수 종속이 없다","모든 결정자가 후보키다"],"a":0,"ex":"1NF는 각 컬럼이 원자값을 갖고 반복 그룹·다치 속성이 없어야 한다. 부분/이행 종속 제거는 각각 2NF, 3NF의 요건이다."},{"t":"choice","k":"2NF","q":"제2정규형(2NF)에서 제거하는 대상은?","o":["기본키 일부에만 종속되는 부분 함수 종속","이행 함수 종속","다치 종속","조인 종속"],"a":0,"ex":"2NF는 1NF를 만족하면서 비주요 속성이 복합 기본키의 일부에만 종속되는 부분 함수 종속을 제거한다. 단일 컬럼 기본키면 부분 종속이 없어 자동 충족된다."},{"t":"choice","k":"3NF","q":"제3정규형(3NF)이 제거하는 종속은?","o":["이행 함수 종속(비주요 속성이 다른 비주요 속성을 통해 키에 종속)","부분 함수 종속","원자성 위반","외래키 참조"],"a":0,"ex":"3NF는 2NF를 만족하면서 이행 함수 종속(A→B, B→C이므로 A→C)을 제거한다. 비주요 속성은 오직 후보키에만 직접 종속해야 한다."},{"t":"choice","k":"BCNF","q":"BCNF(Boyce-Codd 정규형)가 3NF보다 엄격한 점은?","o":["모든 결정자가 후보키여야 한다","원자값만 허용한다","외래키를 금지한다","중복 인덱스를 제거한다"],"a":0,"ex":"BCNF는 모든 함수 종속의 결정자가 반드시 후보키일 것을 요구한다. 3NF는 결정자가 후보키가 아니어도 종속자가 주요 속성이면 허용해 BCNF보다 약하다."},{"t":"choice","k":"BCNF 판정","q":"관계 R(교수, 과목, 시간)에서 (과목,시간)→교수 이고 교수→과목 이며 후보키가 (과목,시간)과 (교수,시간)일 때, 교수→과목 때문에 위반되는 정규형은?","o":["1NF","2NF","3NF는 만족하나 BCNF는 위반","어떤 정규형도 위반 안 함"],"a":2,"ex":"교수→과목에서 결정자 '교수'는 후보키가 아니지만 종속자 '과목'이 주요 속성이라 3NF는 만족할 수 있다. 그러나 결정자가 후보키가 아니므로 BCNF는 위반한다."}]},{"title":"반정규화·키·파티셔닝","xp":27,"q":[{"t":"choice","k":"반정규화","q":"반정규화(denormalization)를 적용하는 주된 이유는?","o":["조인을 줄여 조회 성능을 높이기 위해 의도적으로 중복 허용","무결성을 강화하기 위해","저장 공간을 줄이기 위해","기본키를 제거하기 위해"],"a":0,"ex":"반정규화는 읽기 성능을 위해 계산값·중복 컬럼을 의도적으로 두는 기법이다. 대신 중복으로 인한 갱신 비용과 무결성 관리 부담이 커지는 트레이드오프가 있다."},{"t":"choice","k":"외래키","q":"외래키(FOREIGN KEY) 제약의 역할은?","o":["참조하는 테이블에 대응 값이 존재하도록 참조 무결성을 보장","행을 유일하게 식별","값의 원자성을 강제","자동으로 인덱스를 삭제"],"a":0,"ex":"외래키는 자식 테이블의 값이 부모 테이블의 키에 실제로 존재하도록 강제해 참조 무결성을 지킨다. 유일 식별은 기본키/유일키의 역할이다."},{"t":"choice","k":"기본키","q":"기본키(PRIMARY KEY) 설계 원칙으로 옳지 않은 것은?","o":["NULL을 허용하지 않는다","각 행을 유일하게 식별한다","자주 변경되는 값을 고르는 것이 이상적이다","최소한의 속성으로 구성한다"],"a":2,"ex":"기본키는 유일성·NOT NULL·불변성(자주 바뀌지 않음)·최소성이 바람직하다. 자주 변경되는 값을 키로 삼으면 참조 갱신 부담이 커져 부적절하다."},{"t":"choice","k":"파티셔닝","q":"테이블 파티셔닝(partitioning)의 목적으로 옳은 것은?","o":["큰 테이블을 기준(범위/해시 등)으로 물리적으로 나눠 관리·성능을 개선","기본키를 제거","정규형을 한 단계 올림","외래키를 자동 생성"],"a":0,"ex":"파티셔닝은 대용량 테이블을 범위·리스트·해시 등의 기준으로 분할해 특정 파티션만 스캔(pruning)하거나 관리 단위를 나눠 성능·운영성을 높인다. 논리 스키마는 하나로 유지된다."},{"t":"input","k":"성능용 중복 허용","q":"정규화된 스키마에서 조회 성능을 위해 의도적으로 중복을 도입하는 설계 기법의 영어 명칭은?","a":["denormalization","비정규화","반정규화"],"ex":"성능을 위해 중복·집계값을 의도적으로 추가하는 기법을 denormalization(반정규화)이라 한다. 정규화의 역방향 트레이드오프다."}]}]}
