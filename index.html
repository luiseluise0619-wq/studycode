{"title":"집합 연산자","guide":"🔗","lessons":[{"title":"UNION과 UNION ALL","xp":24,"q":[{"t":"choice","k":"차이","q":"UNION과 UNION ALL의 가장 큰 차이는?","o":["UNION은 중복 행을 제거하고, UNION ALL은 모든 행을 그대로 반환한다","UNION은 모든 행을 반환하고, UNION ALL은 중복을 제거한다","둘 다 중복을 제거하지만 정렬 방식만 다르다","UNION ALL은 컬럼 수가 달라도 동작한다"],"a":0,"ex":"UNION은 결과에서 중복을 제거(암묵적 DISTINCT)하고, UNION ALL은 중복을 포함한 모든 행을 반환한다."},{"t":"choice","k":"성능","q":"일반적으로 UNION ALL이 UNION보다 빠른 이유는?","o":["중복 제거를 위한 정렬/해싱 작업이 없기 때문","더 적은 컬럼을 반환하기 때문","항상 인덱스를 사용하기 때문","결과를 자동으로 캐시에 저장하기 때문"],"a":0,"ex":"UNION은 중복 제거를 위해 정렬 또는 해시 연산이 추가로 필요하다. 중복이 없음을 아는 경우 UNION ALL이 더 효율적이다."},{"t":"input","k":"UNION 행 수","q":"A.id={1,2,3}, B.id={3,4}일 때 위 쿼리의 결과 행 수는?","code":"SELECT id FROM A\nUNION\nSELECT id FROM B;","a":["4"],"ex":"UNION은 중복을 제거한다. 합집합 {1,2,3,4} = 4행. UNION ALL이면 5행이 된다."},{"t":"choice","k":"컬럼명","q":"UNION 결과의 컬럼명(헤더)은 어느 SELECT를 기준으로 정해지는가?","o":["첫 번째 SELECT","마지막 SELECT","컬럼명이 가장 긴 SELECT","알파벳순으로 정렬된 이름"],"a":0,"ex":"결과 컬럼명은 첫 번째 SELECT의 컬럼명(또는 별칭)을 따른다. 별칭도 첫 SELECT에 지정해야 반영된다."},{"t":"choice","k":"호환 규칙","q":"집합 연산자로 두 SELECT를 결합할 때 반드시 일치해야 하는 것은?","o":["각 SELECT의 컬럼 수와 대응 위치의 데이터 타입(호환 가능)","각 테이블의 이름","WHERE 절의 조건","두 테이블의 행 수"],"a":0,"ex":"집합 연산은 컬럼 수가 같고 같은 위치의 컬럼 타입이 호환되어야 한다. 컬럼명은 달라도 되며 위치(순서)로 대응된다."}]},{"title":"ORDER BY와 컬럼 규칙","xp":26,"q":[{"t":"choice","k":"ORDER BY 위치","q":"UNION으로 결합된 쿼리에서 ORDER BY는 어디에 써야 하는가?","o":["전체 쿼리의 맨 마지막에 한 번만","각 SELECT마다 하나씩","첫 번째 SELECT에만","ORDER BY는 사용할 수 없다"],"a":0,"ex":"ORDER BY는 개별 SELECT가 아니라 최종 결과 전체에 대해 맨 마지막에 한 번만 작성한다."},{"t":"choice","k":"정렬 기준","q":"UNION 결과를 ORDER BY로 정렬할 때 컬럼을 지정하는 안전한 방법은?","o":["첫 번째 SELECT의 컬럼명 또는 컬럼 위치 번호(ORDER BY 1)를 사용","두 번째 SELECT의 컬럼명만 사용","원본 테이블명을 접두어로 사용","반드시 별칭 없이 원래 이름만 사용"],"a":0,"ex":"결과 컬럼명은 첫 SELECT 기준이므로 ORDER BY도 그 이름 또는 컬럼 위치 번호를 사용한다."},{"t":"input","k":"연산자 채우기","q":"중복을 제거하지 않고 두 결과를 모두 합치려면 빈칸(____ ALL)에 들어갈 연산자는?","code":"SELECT name FROM emp\n____ ALL\nSELECT name FROM contractor;","a":["UNION"],"ex":"UNION ALL은 중복 제거 없이 두 결과의 모든 행을 결합한다."},{"t":"choice","k":"타입 불일치","q":"첫 SELECT는 (id INT, name VARCHAR), 두 번째는 (name VARCHAR, id INT) 순서로 조회하면?","o":["위치로 대응되므로 INT와 VARCHAR가 충돌해 오류 또는 의도치 않은 결합이 발생","컬럼명이 같으므로 자동으로 올바르게 매칭된다","항상 정상 동작한다","두 번째 SELECT가 무시된다"],"a":0,"ex":"집합 연산은 컬럼명이 아니라 위치(순서)로 대응한다. 순서가 다르면 타입이 맞지 않아 오류가 나거나 잘못된 결과가 된다."},{"t":"choice","k":"NULL 결합","q":"UNION은 중복 제거 시 NULL을 어떻게 취급하는가?","o":["두 NULL을 서로 같은 값으로 간주해 하나로 합친다","NULL끼리는 항상 다른 값으로 본다","NULL이 있으면 오류가 발생한다","NULL 행은 결과에서 무조건 제외된다"],"a":0,"ex":"일반 비교(=)에서 NULL=NULL은 unknown이지만, UNION/DISTINCT의 중복 판정에서는 NULL들을 동일하게 취급해 하나로 묶는다."}]},{"title":"INTERSECT와 EXCEPT/MINUS","xp":28,"q":[{"t":"choice","k":"INTERSECT","q":"INTERSECT 연산자의 결과는?","o":["두 SELECT 결과에 모두 존재하는 행(교집합)","두 결과를 합친 행(합집합)","첫 결과에만 있는 행","두 결과에 한 번씩만 나온 행"],"a":0,"ex":"INTERSECT는 양쪽 결과에 공통으로 존재하는 행만 반환(교집합)하며 기본적으로 중복을 제거한다."},{"t":"input","k":"INTERSECT 행 수","q":"A.id={1,2,3,4}, B.id={3,4,5,6}일 때 위 쿼리의 결과 행 수는?","code":"SELECT id FROM A\nINTERSECT\nSELECT id FROM B;","a":["2"],"ex":"양쪽 모두에 있는 값은 3,4 뿐이므로 2행이다."},{"t":"input","k":"EXCEPT 행 수","q":"같은 A, B에 대해 위 쿼리(A EXCEPT B)의 결과 행 수는?","code":"SELECT id FROM A\nEXCEPT\nSELECT id FROM B;","a":["2"],"ex":"EXCEPT는 A에는 있고 B에는 없는 행을 반환한다. {1,2} 이므로 2행이다."},{"t":"choice","k":"방향성","q":"A EXCEPT B와 B EXCEPT A의 관계로 옳은 것은?","o":["차집합은 방향에 따라 결과가 다르므로 일반적으로 서로 다르다","항상 같은 결과를 반환한다","항상 빈 결과를 반환한다","둘을 합치면 교집합이 된다"],"a":0,"ex":"EXCEPT(차집합)는 비대칭이다. 위 예에서 A EXCEPT B={1,2}, B EXCEPT A={5,6}로 서로 다르다."},{"t":"choice","k":"방언","q":"Oracle에서 EXCEPT와 동일한 차집합 연산자는? (MySQL은 8.0.31부터 INTERSECT/EXCEPT 지원)","o":["MINUS","SUBTRACT","DIFF","REMOVE"],"a":0,"ex":"Oracle은 표준 EXCEPT 대신 MINUS를 쓴다. MySQL은 8.0.31 미만 버전에서 INTERSECT/EXCEPT를 지원하지 않는다."}]}]},
{"title":"고급 그룹화","guide":"📊","lessons":[{"title":"ROLLUP","xp":26,"q":[{"t":"choice","k":"ROLLUP","q":"GROUP BY ROLLUP(region, product)가 생성하는 집계 수준은?","o":["(region, product), (region), () 의 상세·소계·총계","(region, product) 조합만","(region), (product), () 만","가능한 모든 조합"],"a":0,"ex":"ROLLUP은 계층적 소계를 만든다. ROLLUP(a,b)는 (a,b),(a),() 세 수준을 생성한다."},{"t":"input","k":"ROLLUP 그룹 수","q":"ROLLUP(a, b, c)는 몇 개의 그룹화 집합(집계 수준)을 생성하는가?","a":["4"],"ex":"ROLLUP(n개 컬럼)은 n+1개 수준을 만든다. (a,b,c),(a,b),(a),() 로 4개다."},{"t":"choice","k":"소계 NULL","q":"ROLLUP 결과에서 소계/총계 행의 그룹 컬럼 값은 어떻게 표시되는가?","o":["집계된(묶인) 컬럼 자리에 NULL이 표시된다","0으로 표시된다","'TOTAL' 문자열로 표시된다","빈 문자열로 표시된다"],"a":0,"ex":"ROLLUP이 만든 소계 행에서는 해당 컬럼이 NULL로 나타나며, 이는 '모든 값을 합친 소계'를 의미한다."},{"t":"choice","k":"MySQL 방언","q":"MySQL에서 ROLLUP을 사용하는 문법은?","o":["GROUP BY region, product WITH ROLLUP","GROUP BY ROLLUP(region, product)","GROUP BY region, product ADD ROLLUP","ROLLUP GROUP BY region, product"],"a":0,"ex":"MySQL은 표준 GROUP BY ROLLUP(...) 대신 GROUP BY ... WITH ROLLUP 구문을 쓴다. Postgres/Oracle/SQL Server는 함수형 ROLLUP(...)을 지원한다."},{"t":"input","k":"총계 행 수","q":"ROLLUP(region)에서 region이 3종류일 때, 상세·소계를 제외한 '총계(grand total)' 행은 몇 개 생기는가?","a":["1"],"ex":"ROLLUP은 항상 하나의 총계 행(모든 컬럼이 NULL)을 추가한다."}]},{"title":"CUBE와 GROUPING SETS","xp":28,"q":[{"t":"choice","k":"CUBE","q":"GROUP BY CUBE(a, b)가 생성하는 그룹화 집합은?","o":["(a,b), (a), (b), () 모든 조합","(a,b), (a), () 만","(a,b) 만","(a), (b) 만"],"a":0,"ex":"CUBE는 가능한 모든 차원 조합의 소계를 만든다. CUBE(a,b)는 2^2=4개 집합이다."},{"t":"input","k":"CUBE 집합 수","q":"CUBE(a, b, c)는 몇 개의 그룹화 집합을 생성하는가?","a":["8"],"ex":"CUBE(n)은 2^n개 집합을 만든다. 2^3 = 8개다."},{"t":"choice","k":"GROUPING SETS","q":"GROUPING SETS ((region),(product))의 의미로 옳은 것은?","o":["region별 집계와 product별 집계만 각각 계산한다","(region, product) 조합만 계산한다","총계만 계산한다","가능한 모든 조합을 계산한다"],"a":0,"ex":"GROUPING SETS는 원하는 그룹화 조합을 명시적으로 나열한다. 예시는 (region)과 (product) 두 집합만 계산하며 조합이나 총계는 포함하지 않는다."},{"t":"choice","k":"ROLLUP 표현","q":"GROUPING SETS로 ROLLUP(a,b)와 동일한 결과를 만들려면?","o":["GROUPING SETS ((a,b),(a),())","GROUPING SETS ((a,b),(b),())","GROUPING SETS ((a),(b))","GROUPING SETS ((a,b))"],"a":0,"ex":"ROLLUP(a,b)는 GROUPING SETS ((a,b),(a),())와 동등하다. CUBE(a,b)는 여기에 (b)를 더한 것이다."},{"t":"choice","k":"방언 지원","q":"CUBE와 GROUPING SETS 지원에 대한 설명으로 옳은 것은?","o":["Postgres/Oracle/SQL Server는 지원하지만 MySQL은 지원하지 않는다","모든 DBMS가 동일하게 지원한다","MySQL만 지원한다","표준 SQL에는 없는 기능이다"],"a":0,"ex":"CUBE/GROUPING SETS는 SQL 표준이며 Postgres, Oracle, SQL Server가 지원한다. MySQL은 WITH ROLLUP만 제공하고 CUBE/GROUPING SETS는 미지원이다."}]},{"title":"GROUPING 함수와 HAVING","xp":24,"q":[{"t":"choice","k":"GROUPING()","q":"GROUPING(col) 함수가 1을 반환하는 경우는?","o":["해당 행에서 col이 ROLLUP/CUBE로 집계되어 NULL(소계)일 때","col의 실제 값이 NULL일 때","col이 인덱스를 가질 때","col이 그룹의 첫 행일 때"],"a":0,"ex":"GROUPING(col)은 그 컬럼이 소계 때문에 NULL이면 1, 실제 데이터 값(원래 NULL 포함)이면 0을 반환한다."},{"t":"choice","k":"NULL 구분","q":"소계 행의 NULL과 데이터에 원래 있던 NULL을 구분하려면?","o":["GROUPING() 함수의 반환값(1=소계, 0=실제값)으로 판단한다","IS NULL 조건만으로 판단한다","COUNT(*)로 판단한다","구분할 방법이 없다"],"a":0,"ex":"IS NULL만으로는 둘을 구분할 수 없다. GROUPING()이 1이면 소계로 생긴 NULL, 0이면 원본 값이다."},{"t":"choice","k":"레이블링","q":"소계 행에 'ALL' 같은 레이블을 붙이는 일반적 방법은?","o":["CASE WHEN GROUPING(region)=1 THEN 'ALL' ELSE region END","COALESCE(region, region)","NVL(region, region)","GROUP BY region WITH LABEL"],"a":0,"ex":"GROUPING()으로 소계 여부를 판별해 CASE로 'ALL'/'Total' 같은 레이블을 부여한다."},{"t":"choice","k":"HAVING 조합","q":"ROLLUP 결과에서 소계 행만 남기고 상세 행을 제외하려면?","o":["HAVING GROUPING(product) = 1","WHERE product IS NULL","HAVING COUNT(*) = 1","GROUP BY product ONLY SUBTOTAL"],"a":0,"ex":"HAVING GROUPING(product)=1은 product가 집계된 소계 행만 남긴다. WHERE는 그룹화 전에 적용되어 소계 필터에 부적합하다."},{"t":"input","k":"소계 의미","q":"집계 그룹화 결과에서 소계를 나타내는 컬럼 값은 무엇으로 표시되는가? (영문 키워드)","a":["NULL"],"ex":"ROLLUP/CUBE의 소계·총계 행에서 묶인 컬럼은 NULL로 표시되며 '해당 컬럼의 모든 값'을 의미한다."}]}]},
{"title":"EXISTS와 정량 비교","guide":"🔍","lessons":[{"title":"EXISTS vs IN","xp":26,"q":[{"t":"choice","k":"EXISTS","q":"EXISTS 서브쿼리가 TRUE를 반환하는 조건은?","o":["서브쿼리가 최소 한 행이라도 반환할 때","서브쿼리가 정확히 한 행을 반환할 때","서브쿼리가 NULL을 반환할 때","서브쿼리의 모든 행이 조건을 만족할 때"],"a":0,"ex":"EXISTS는 서브쿼리 결과에 행이 하나라도 있으면 TRUE다. 실제 값이나 행 수는 무관해 흔히 SELECT 1을 쓴다."},{"t":"choice","k":"NOT IN NULL","q":"서브쿼리 결과에 NULL이 포함될 때 NOT IN의 문제점은?","o":["결과가 UNKNOWN이 되어 매칭되는 행이 없어질 수 있다","자동으로 NULL을 무시하고 정상 동작한다","오류가 발생해 쿼리가 중단된다","NULL을 0으로 바꿔 비교한다"],"a":0,"ex":"x NOT IN (..., NULL)은 NULL 비교가 UNKNOWN이 되어 참이 될 수 없다. 그래서 아무 행도 나오지 않는 함정이 있다. NOT EXISTS는 이 문제가 없다."},{"t":"choice","k":"안전한 대안","q":"NULL이 섞일 수 있는 서브쿼리에서 '~에 없는' 조건을 안전하게 쓰려면?","o":["NOT EXISTS를 사용한다","NOT IN을 사용한다","!= ALL을 사용한다","&lt;&gt; ANY를 사용한다"],"a":0,"ex":"NOT EXISTS는 NULL에 안전하다. 상관 조건이 매칭되는 행의 존재 여부만 보므로 NULL이 있어도 논리가 무너지지 않는다."},{"t":"choice","k":"성능","q":"EXISTS의 실행 특성으로 옳은 것은?","o":["조건을 만족하는 행을 하나 찾으면 즉시 평가를 멈춘다(short-circuit)","항상 서브쿼리의 모든 행을 끝까지 읽는다","서브쿼리 결과를 항상 정렬한다","서브쿼리 결과를 전부 메모리에 적재한 뒤 비교한다"],"a":0,"ex":"EXISTS는 첫 매칭 행을 찾는 즉시 TRUE로 단락 평가한다. 상관 서브쿼리와 함께 쓰면 효율적일 수 있다."},{"t":"choice","k":"SELECT 절","q":"EXISTS 서브쿼리 안에서 SELECT 절에 무엇을 쓰든 결과가 같은 이유는?","o":["EXISTS는 행의 존재 여부만 판단하고 선택된 값은 사용하지 않기 때문","SELECT 절이 자동으로 *로 바뀌기 때문","서브쿼리는 항상 첫 컬럼만 보기 때문","EXISTS가 SELECT 절을 COUNT로 바꾸기 때문"],"a":0,"ex":"EXISTS는 행이 존재하는지만 확인하므로 SELECT 1, SELECT *, SELECT col 어느 것이든 결과가 동일하다."}]},{"title":"NOT EXISTS와 상관 서브쿼리","xp":28,"q":[{"t":"choice","k":"상관","q":"상관(correlated) 서브쿼리의 특징은?","o":["외부 쿼리의 각 행 값을 참조하며 행마다 평가된다","외부 쿼리와 무관하게 한 번만 실행된다","반드시 GROUP BY를 포함한다","항상 스칼라 값 하나만 반환한다"],"a":0,"ex":"상관 서브쿼리는 외부 쿼리의 컬럼을 참조하므로 외부 각 행마다 다시 평가된다. EXISTS와 자주 결합된다."},{"t":"choice","k":"차집합","q":"'주문이 하나도 없는 고객'을 찾는 표준적 방법으로 옳은 것은?","code":"SELECT c.id FROM customer c\nWHERE NOT EXISTS (\n  SELECT 1 FROM orders o WHERE o.cust_id = c.id\n);","o":["위 NOT EXISTS 쿼리처럼 상관 조건으로 주문의 존재를 부정한다","INNER JOIN으로 연결하면 된다","UNION으로 두 테이블을 합친다","CROSS JOIN 후 필터링한다"],"a":0,"ex":"NOT EXISTS + 상관 조건(o.cust_id=c.id)은 매칭 주문이 없는 고객만 반환한다. NULL에도 안전한 안티조인 패턴이다."},{"t":"input","k":"안티조인","q":"NOT EXISTS로 구현하는, 한쪽에만 있고 다른 쪽에는 없는 행을 찾는 조인 패턴의 이름은? (영문)","a":["anti join","antijoin","anti-join"],"ex":"NOT EXISTS(또는 LEFT JOIN ... IS NULL)로 구현하는 패턴을 anti join(안티 조인)이라 한다."},{"t":"choice","k":"동등 변환","q":"WHERE x IN (SELECT y FROM t)와 논리적으로 동등한 EXISTS 형태는?","o":["WHERE EXISTS (SELECT 1 FROM t WHERE t.y = x)","WHERE EXISTS (SELECT 1 FROM t WHERE t.y &lt;&gt; x)","WHERE NOT EXISTS (SELECT 1 FROM t WHERE t.y = x)","WHERE EXISTS (SELECT x FROM t)"],"a":0,"ex":"IN은 상관 EXISTS로 바꿀 수 있다. x IN (SELECT y ...)는 EXISTS(... WHERE y = x)와 같다. 단 NOT 형태로 바꿀 때는 NULL 처리에 주의한다."},{"t":"choice","k":"이중 부정","q":"'모든 과목을 수강한 학생'을 구할 때 자주 쓰는 논리 구조는?","o":["NOT EXISTS(수강하지 않은 과목이 존재) — 이중 부정으로 전칭을 표현","EXISTS를 한 번만 사용","IN을 한 번만 사용","단순 COUNT = 1 비교"],"a":0,"ex":"관계대수의 나눗셈(division)은 '수강하지 않은 과목이 없다'는 이중 NOT EXISTS로 표현한다. 전칭(모든 ~)을 부정의 부정으로 바꾸는 고전 패턴이다."}]},{"title":"ANY / ALL과 스칼라 서브쿼리","xp":26,"q":[{"t":"choice","k":"= ANY","q":"x = ANY (SELECT ...)와 동등한 연산자는?","o":["x IN (SELECT ...)","x = ALL (SELECT ...)","x NOT IN (SELECT ...)","EXISTS (SELECT ...)"],"a":0,"ex":"= ANY는 서브쿼리 값들 중 하나라도 같으면 참이므로 IN과 동등하다. SOME은 ANY의 동의어다."},{"t":"choice","k":"gt ALL","q":"x &gt; ALL (SELECT v FROM t)가 참이 되는 조건은?","o":["x가 t의 모든 v보다 크다 = 최댓값보다 크다","x가 t의 어떤 v보다 크다 = 최솟값보다 크다","x가 평균보다 크다","x가 최댓값과 같다"],"a":0,"ex":"&gt; ALL은 모든 값보다 커야 하므로 최댓값보다 큰 것과 같다. 반대로 &gt; ANY는 최솟값보다 크면 참이다."},{"t":"input","k":"gt ANY 개수","q":"t.v={10,20,30}, s.x={5,15,35}일 때 x &gt; ANY(...) 조건을 만족하는 x는 몇 개?","code":"-- t.v: 10, 20, 30\nSELECT x FROM s\nWHERE x &gt; ANY (SELECT v FROM t);","a":["2"],"ex":"&gt; ANY는 최솟값 10보다 크면 참이다. 15와 35가 만족하므로 2개다(5는 제외)."},{"t":"input","k":"gt ALL 개수","q":"같은 데이터(t.v 최댓값=30, s.x={5,15,35})에서 x &gt; ALL (SELECT v FROM t)를 만족하는 x는 몇 개?","a":["1"],"ex":"&gt; ALL은 최댓값 30보다 커야 한다. 35만 만족하므로 1개다."},{"t":"choice","k":"스칼라","q":"스칼라 서브쿼리(scalar subquery)의 조건으로 옳은 것은?","o":["정확히 한 행, 한 컬럼(단일 값)을 반환해야 한다","여러 행을 반환해야 한다","항상 NULL을 반환한다","컬럼을 여러 개 반환할 수 있다"],"a":0,"ex":"스칼라 서브쿼리는 단일 값(1행 1열)을 반환하며 SELECT 목록이나 WHERE 비교 등 값이 필요한 자리에 쓴다. 2행 이상 반환하면 오류다."}]}]}

{"title":"그룹별 상위 N","guide":"🏆","lessons":[{"title":"순위 함수 3형제","xp":26,"q":[{"t":"choice","k":"동점 처리","q":"점수 90, 90, 80 순서로 정렬할 때 RANK()가 매기는 순위는?","o":["1, 2, 3","1, 1, 3","1, 1, 2","1, 2, 2"],"a":1,"ex":"RANK()는 동점에 같은 순위를 주고 다음 순위를 건너뜁니다. 90,90은 둘 다 1위, 80은 3위(2위 건너뜀)."},{"t":"choice","k":"DENSE_RANK","q":"같은 데이터(90, 90, 80)에 DENSE_RANK()를 쓰면?","o":["1, 1, 3","1, 2, 3","1, 1, 2","1, 2, 2"],"a":2,"ex":"DENSE_RANK()는 동점에 같은 순위를 주되 순위를 건너뛰지 않습니다. 90,90은 1위, 80은 2위."},{"t":"choice","k":"ROW_NUMBER","q":"동점이 있어도 각 행에 1부터 겹치지 않는 연속 번호를 매기는 함수는?","o":["RANK()","DENSE_RANK()","ROW_NUMBER()","NTILE()"],"a":2,"ex":"ROW_NUMBER()는 동점이어도 무조건 유일한 1,2,3...을 부여합니다. 정렬 기준이 같으면 순서는 비결정적일 수 있습니다."},{"t":"input","k":"값 채우기","q":"점수 100, 100, 95, 90에 DENSE_RANK()를 매기면 95의 순위 값은? (숫자만)","a":["2"],"ex":"100,100은 1위, 95는 건너뜀 없이 2위. RANK()였다면 3위가 됩니다."},{"t":"choice","k":"함수 선택","q":"매출 상위 3개를 뽑되 3위가 동점이면 동점 모두 포함하고 싶다. 알맞은 함수는?","o":["ROW_NUMBER()","RANK() 또는 DENSE_RANK()","COUNT()","NTILE(3)"],"a":1,"ex":"ROW_NUMBER는 동점 중 하나만 3위가 됩니다. 동점을 모두 포함하려면 RANK/DENSE_RANK로 순위&lt;=3 조건을 씁니다."}]},{"title":"PARTITION BY로 그룹별 순위","xp":27,"q":[{"t":"choice","k":"PARTITION 역할","q":"부서별로 급여 순위를 각각 1부터 다시 매기려면 무엇을 써야 하나?","o":["GROUP BY dept","PARTITION BY dept","ORDER BY dept","HAVING dept"],"a":1,"ex":"윈도우 함수에서 PARTITION BY dept는 부서마다 순위를 1부터 리셋합니다. GROUP BY와 달리 행이 사라지지 않습니다."},{"t":"input","k":"빈칸 채우기","q":"부서별 급여 내림차순 순위: ROW_NUMBER() OVER (____ dept ORDER BY salary DESC). 빈칸에 들어갈 키워드 2단어는?","a":["PARTITION BY","partition by"],"ex":"PARTITION BY dept로 부서별로 나누고 그 안에서 salary 내림차순으로 번호를 매깁니다."},{"t":"choice","k":"GROUP BY 차이","q":"GROUP BY와 비교했을 때 윈도우 함수(OVER)의 특징은?","o":["행 수가 그룹 수로 줄어든다","원본 행을 유지하며 집계/순위를 덧붙인다","정렬이 불가능하다","집계 함수를 못 쓴다"],"a":1,"ex":"윈도우 함수는 각 원본 행을 그대로 유지하면서 그룹 계산 결과를 옆에 붙입니다. GROUP BY는 행을 뭉쳐 줄입니다."},{"t":"choice","k":"결과 예측","q":"부서 A: 300, 300, 250 급여에 ROW_NUMBER() OVER (PARTITION BY dept ORDER BY salary DESC)를 쓰면 250의 번호는?","o":["1","2","3","예측 불가"],"a":2,"ex":"300,300에 1,2가 (임의로) 배정되고 250은 3번. ROW_NUMBER는 동점이어도 연속 번호라 250은 항상 마지막인 3."},{"t":"choice","k":"정렬 필수","q":"순위 함수에서 반드시 필요한 절은?","o":["PARTITION BY","ORDER BY","FILTER","DISTINCT"],"a":1,"ex":"순위는 정렬 기준이 있어야 정해지므로 ORDER BY가 필수입니다. PARTITION BY는 선택(없으면 전체가 한 그룹)."}]},{"title":"상위 N 뽑기와 중복 제거","xp":28,"q":[{"t":"choice","k":"CTE 패턴","q":"그룹별 상위 N을 뽑는 표준 패턴은?","o":["WHERE절에서 바로 ROW_NUMBER()&lt;=N","CTE로 rn 계산 후 바깥에서 rn&lt;=N 필터","GROUP BY로 상위 N","ORDER BY LIMIT N만"],"a":1,"ex":"윈도우 함수는 WHERE에서 바로 못 씁니다. CTE/서브쿼리에서 rn을 계산한 뒤 바깥 쿼리에서 WHERE rn&lt;=N으로 거릅니다.","code":"WITH ranked AS (\n  SELECT *, ROW_NUMBER() OVER (\n    PARTITION BY dept ORDER BY salary DESC) AS rn\n  FROM emp)\nSELECT * FROM ranked WHERE rn &lt;= 3;"},{"t":"choice","k":"WHERE 불가","q":"SELECT ... WHERE ROW_NUMBER() OVER(...) &lt;= 3 이 오류인 이유는?","o":["윈도우 함수는 WHERE 평가 시점 이후에 계산되어 WHERE에서 참조 불가","ROW_NUMBER는 3보다 클 수 없어서","OVER는 SELECT에만 허용되어서","정렬이 없어서"],"a":0,"ex":"논리적 처리 순서상 WHERE가 윈도우 함수보다 먼저 실행됩니다. 그래서 서브쿼리/CTE로 감싸 계산을 끝낸 뒤 걸러야 합니다."},{"t":"choice","k":"dedup","q":"email 기준 중복 행에서 최신 1건만 남기려 한다. 알맞은 방법은?","o":["PARTITION BY email ORDER BY created_at DESC 후 rn=1만 선택","DISTINCT email","GROUP BY email","RANK로 rn&lt;=2"],"a":0,"ex":"email로 파티션하고 최신순 정렬해 ROW_NUMBER를 매긴 뒤 rn=1만 남기면 각 email의 최신 1건만 유지됩니다. 다른 컬럼도 온전히 보존됩니다."},{"t":"input","k":"dedup 조건","q":"위 dedup에서 각 그룹의 첫 행만 남기려면 바깥 쿼리 조건은 rn = ? (숫자만)","a":["1"],"ex":"ROW_NUMBER는 1부터 시작하므로 rn = 1이 각 파티션의 대표(최신) 행입니다."},{"t":"choice","k":"QUALIFY","q":"일부 DB(Snowflake, BigQuery 등)에서 CTE 없이 윈도우 함수 결과를 바로 필터하는 절은?","o":["HAVING","QUALIFY","WITHIN","OVER"],"a":1,"ex":"QUALIFY rn &lt;= 3 처럼 윈도우 함수 결과를 서브쿼리 없이 걸러줍니다. 표준 SQL은 아니지만 분석 DB에서 매우 유용합니다.","code":"SELECT *,\n  ROW_NUMBER() OVER (PARTITION BY dept\n    ORDER BY salary DESC) AS rn\nFROM emp\nQUALIFY rn &lt;= 3;"}]}]},
{"title":"피벗과 조건부 집계","guide":"📊","lessons":[{"title":"CASE로 행을 열로","xp":27,"q":[{"t":"choice","k":"피벗 원리","q":"행에 흩어진 값을 열로 바꾸는(피벗) 전형적 기법은?","o":["SUM(CASE WHEN 조건 THEN 값 ELSE 0 END) + GROUP BY","ORDER BY","DISTINCT","UNION ALL만"],"a":0,"ex":"각 열마다 조건을 건 CASE를 SUM하고 키로 GROUP BY하면 행이 열로 접혀 크로스탭이 만들어집니다."},{"t":"choice","k":"월별 컬럼","q":"월별 매출을 가로 열로 만들 때 1월 열 식으로 알맞은 것은?","o":["SUM(CASE WHEN month=1 THEN amount ELSE 0 END)","COUNT(month=1)","amount WHERE month=1","SUM(amount) GROUP BY month"],"a":0,"ex":"1월이면 amount, 아니면 0을 더하므로 SUM 결과가 1월 합계가 됩니다. 열마다 month 값만 바꿔 반복합니다.","code":"SELECT product,\n  SUM(CASE WHEN month=1 THEN amount ELSE 0 END) AS jan,\n  SUM(CASE WHEN month=2 THEN amount ELSE 0 END) AS feb\nFROM sales\nGROUP BY product;"},{"t":"input","k":"결과 계산","q":"행: (A,1월,100),(A,1월,50),(A,2월,80). SUM(CASE WHEN month=1 THEN amount ELSE 0 END)의 A 값은? (숫자만)","a":["150"],"ex":"1월 행 100+50=150, 2월 행은 ELSE 0이라 무시. jan 열은 150이 됩니다."},{"t":"choice","k":"GROUP BY 필요","q":"제품별 크로스탭을 만들 때 반드시 필요한 절은?","o":["ORDER BY product","GROUP BY product","PARTITION BY product","HAVING product"],"a":1,"ex":"제품마다 한 행으로 접으려면 GROUP BY product가 필요합니다. 그래야 각 제품의 월별 합이 한 행에 모입니다."},{"t":"choice","k":"크로스탭 개념","q":"크로스탭(cross tab)이란?","o":["한 축은 행, 다른 축은 열로 두 범주를 교차 요약한 표","여러 테이블 JOIN","인덱스 종류","중복 제거 방식"],"a":0,"ex":"예: 행=제품, 열=월, 값=매출합. 두 범주의 교차 집계표가 크로스탭이며 SUM+CASE 피벗으로 만듭니다."}]},{"title":"COUNT와 조건부 비율","xp":28,"q":[{"t":"choice","k":"COUNT 주의","q":"조건에 맞는 행만 세려고 COUNT(CASE WHEN status='paid' THEN 1 END)를 쓴다. ELSE를 생략하면?","o":["오류가 난다","조건 불일치는 NULL이 되어 COUNT에서 제외된다","0으로 세어진다","전체가 세어진다"],"a":1,"ex":"ELSE 없으면 불일치 행은 NULL. COUNT는 NULL을 세지 않으므로 정확히 paid 건수만 셉니다. ELSE 0을 쓰면 COUNT가 전부 세어 틀립니다."},{"t":"input","k":"건수 계산","q":"status가 paid, paid, void, paid 일 때 COUNT(CASE WHEN status='paid' THEN 1 END) 값은? (숫자만)","a":["3"],"ex":"paid 3건은 1, void는 NULL. COUNT가 NULL을 무시해 결과는 3입니다."},{"t":"choice","k":"비율 트릭","q":"0/1 플래그로 만든 컬럼에 AVG를 쓰면 얻는 값은?","o":["합계","1의 비율(참인 행의 비율)","최댓값","행 수"],"a":1,"ex":"1과 0의 평균 = 1의 개수/전체 = 참인 비율. AVG(CASE WHEN paid THEN 1 ELSE 0 END)는 결제율이 됩니다."},{"t":"input","k":"비율 계산","q":"값이 1,0,1,1,0 일 때 AVG(값)은? (소수로, 예: 0.6)","a":["0.6"],"ex":"합 3, 개수 5, 3/5=0.6. 즉 60%가 1(참)이라는 비율을 뜻합니다."},{"t":"choice","k":"정수 나눗셈","q":"결제율 = 결제건수 / 전체건수를 SUM(...)/COUNT(*)로 계산했더니 0이 나온다. 흔한 원인은?","o":["정수/정수 나눗셈으로 소수점이 버려짐","COUNT가 NULL이라서","GROUP BY 누락","CASE 오타"],"a":0,"ex":"정수끼리 나누면 소수부가 잘립니다. 1.0*를 곱하거나 CAST(... AS DECIMAL)로 바꿔 실수 나눗셈을 해야 합니다.","code":"SELECT 1.0 * SUM(CASE WHEN paid THEN 1 ELSE 0 END)\n       / COUNT(*) AS pay_rate\nFROM orders;"}]},{"title":"FILTER 절과 다중 집계","xp":26,"q":[{"t":"choice","k":"FILTER 문법","q":"Postgres에서 조건부 집계를 CASE 없이 쓰는 표준 문법은?","o":["COUNT(*) FILTER (WHERE status='paid')","COUNT(*) IF status='paid'","COUNT(WHERE status='paid')","FILTER COUNT(*)"],"a":0,"ex":"집계함수 FILTER (WHERE 조건)은 조건을 만족하는 행만 집계합니다. CASE보다 읽기 쉽습니다.","code":"SELECT\n  COUNT(*) AS total,\n  COUNT(*) FILTER (WHERE status='paid') AS paid,\n  AVG(amount) FILTER (WHERE status='paid') AS paid_avg\nFROM orders;"},{"t":"choice","k":"동등 변환","q":"COUNT(*) FILTER (WHERE x&gt;0) 과 결과가 같은 CASE 표현은?","o":["COUNT(CASE WHEN x&gt;0 THEN 1 END)","SUM(CASE WHEN x&gt;0 THEN 0 END)","COUNT(CASE WHEN x&gt;0 THEN 0 ELSE 1 END)","COUNT(*)"],"a":0,"ex":"FILTER는 조건에 맞는 행만 남겨 세므로 COUNT(CASE WHEN x&gt;0 THEN 1 END)과 동일합니다(불일치는 NULL로 제외)."},{"t":"choice","k":"다중 지표","q":"한 번의 쿼리로 전체합과 특정 조건 합을 동시에 내는 이점은?","o":["테이블을 한 번만 스캔해 효율적","인덱스가 필요 없어져서","NULL이 사라져서","정렬이 빨라져서"],"a":0,"ex":"여러 서브쿼리로 각각 스캔하지 않고, FILTER/CASE로 한 스캔에서 여러 조건 지표를 뽑아 성능과 가독성이 좋아집니다."},{"t":"input","k":"결과 계산","q":"amount가 10,20,30 이고 status가 paid,void,paid 일 때 SUM(amount) FILTER (WHERE status='paid') 값은? (숫자만)","a":["40"],"ex":"paid 행은 10과 30 → 10+30=40. void(20)는 FILTER에서 제외됩니다."},{"t":"choice","k":"DISTINCT 결합","q":"'유료 고객 수(중복 제거)'를 FILTER로 세는 식은?","o":["COUNT(DISTINCT user_id) FILTER (WHERE status='paid')","DISTINCT COUNT(user_id)","COUNT(user_id) DISTINCT paid","FILTER DISTINCT user_id"],"a":0,"ex":"COUNT(DISTINCT user_id) FILTER (WHERE status='paid')는 paid 행에서 서로 다른 user_id 수를 셉니다. 조건+중복제거를 함께 처리합니다."}]}]},
{"title":"시계열·비율 분석","guide":"📈","lessons":[{"title":"전월 대비와 성장률","xp":28,"q":[{"t":"choice","k":"이전 값","q":"월별 매출에서 '직전 월' 값을 같은 행에 가져오는 함수는?","o":["LEAD()","LAG()","FIRST_VALUE()","SUM()"],"a":1,"ex":"LAG(amount) OVER (ORDER BY month)는 한 행 앞(이전 월)의 값을 가져옵니다. LEAD는 다음 행을 봅니다."},{"t":"choice","k":"증감 계산","q":"전월 대비 증감액을 구하는 식은?","o":["amount - LAG(amount) OVER (ORDER BY month)","amount - LEAD(amount) OVER (ORDER BY month)","amount / SUM(amount)","LAG(amount) - amount"],"a":0,"ex":"이번 달 - 이전 달(LAG)이 증감액입니다. LAG를 빼는 순서가 반대면 부호가 뒤집힙니다.","code":"SELECT month, amount,\n  amount - LAG(amount) OVER (ORDER BY month)\n    AS mom_diff\nFROM monthly;"},{"t":"input","k":"성장률 계산","q":"이전 달 200, 이번 달 250일 때 성장률 (이번-이전)/이전 은 몇 %? (숫자만, 예: 25)","a":["25"],"ex":"(250-200)/200 = 50/200 = 0.25 = 25%. 성장률은 항상 '이전 값'으로 나눕니다."},{"t":"choice","k":"첫 행 NULL","q":"LAG로 전월 대비를 구하면 가장 첫 달의 값이 NULL인 이유는?","o":["이전 행이 없어서","정렬이 틀려서","0으로 나눠서","PARTITION이 없어서"],"a":0,"ex":"첫 행은 앞 행이 없어 LAG가 NULL을 반환합니다. LAG(amount,1,0)처럼 기본값을 주거나 COALESCE로 처리합니다."},{"t":"choice","k":"그룹별 시계열","q":"제품마다 전월 대비를 각각 구하려면 무엇을 추가하나?","o":["PARTITION BY product","GROUP BY month","DISTINCT product","HAVING product"],"a":0,"ex":"LAG(amount) OVER (PARTITION BY product ORDER BY month)로 제품별로 시계열을 분리해 각 제품의 이전 월을 봅니다."}]},{"title":"누적합과 이동평균","xp":29,"q":[{"t":"choice","k":"누적합","q":"날짜순 running total(누적합)을 구하는 식은?","o":["SUM(amount) OVER (ORDER BY dt)","SUM(amount)","SUM(amount) OVER ()","COUNT(amount) OVER (ORDER BY dt)"],"a":0,"ex":"ORDER BY가 있는 SUM OVER는 기본 프레임이 시작~현재 행이라 누적합이 됩니다.","code":"SELECT dt, amount,\n  SUM(amount) OVER (ORDER BY dt\n    ROWS UNBOUNDED PRECEDING) AS running\nFROM daily;"},{"t":"input","k":"누적 계산","q":"일별 값 10, 20, 30을 날짜순 누적합하면 3번째 행 값은? (숫자만)","a":["60"],"ex":"10, 10+20=30, 30+30=60. 누적합은 현재까지 모두 더한 값이라 마지막은 총합 60."},{"t":"choice","k":"이동평균 프레임","q":"최근 3일 이동평균(당일 포함)을 위한 프레임 절은?","o":["ROWS BETWEEN 2 PRECEDING AND CURRENT ROW","ROWS BETWEEN 3 PRECEDING AND CURRENT ROW","ROWS BETWEEN CURRENT ROW AND 2 FOLLOWING","RANGE UNBOUNDED PRECEDING"],"a":0,"ex":"당일 + 앞 2일 = 3일 창. 2 PRECEDING부터 CURRENT ROW까지가 3개 행이므로 3일 이동평균이 됩니다."},{"t":"input","k":"이동평균 계산","q":"값 10,20,30,40에서 '2 PRECEDING AND CURRENT ROW' 3일 이동평균의 4번째 값은? (숫자만)","a":["30"],"ex":"4번째 창은 20,30,40 → (20+30+40)/3 = 90/3 = 30."},{"t":"choice","k":"프레임 이해","q":"SUM(x) OVER (ORDER BY dt)에서 프레임을 명시 안 하면 기본값은?","o":["RANGE UNBOUNDED PRECEDING ~ CURRENT ROW","전체 행","현재 행만","다음 행까지"],"a":0,"ex":"ORDER BY만 있으면 기본 프레임은 시작부터 현재 행까지(RANGE)라서 누적 계산이 됩니다. RANGE는 같은 정렬값(동점)을 함께 포함하니 주의."}]},{"title":"구성비와 구간화","xp":27,"q":[{"t":"choice","k":"구성비","q":"각 행의 전체 대비 비율(구성비)을 구하는 식은?","o":["amount / SUM(amount) OVER ()","amount / SUM(amount)","amount / COUNT(*)","SUM(amount) OVER (ORDER BY dt)"],"a":0,"ex":"SUM(amount) OVER () (빈 OVER)는 전체 총합을 모든 행에 붙입니다. 각 amount를 총합으로 나누면 구성비가 됩니다.","code":"SELECT category, amount,\n  1.0 * amount / SUM(amount) OVER () AS pct\nFROM sales;"},{"t":"input","k":"구성비 계산","q":"값 20, 30, 50에서 30인 행의 구성비는? (소수, 예: 0.3)","a":["0.3"],"ex":"총합 20+30+50=100. 30/100=0.3, 즉 30%. OVER ()가 전체 합 100을 제공합니다."},{"t":"choice","k":"OVER 빈괄호","q":"구성비에서 SUM(amount) OVER () 처럼 OVER를 빈 괄호로 두면?","o":["전체 행을 한 그룹으로 집계","행마다 다른 값","오류","정렬 기준까지 누적"],"a":0,"ex":"빈 OVER ()는 파티션/정렬 없이 전체를 하나의 창으로 봐서 전 구간 총합을 모든 행에 동일하게 부여합니다."},{"t":"choice","k":"구간화","q":"나이를 '10대/20대/30대+' 버킷으로 나누는 표준 방법은?","o":["CASE WHEN age&lt;20 THEN '10대' WHEN age&lt;30 THEN '20대' ELSE '30대+' END","GROUP BY age","ROUND(age)","NTILE(age)"],"a":0,"ex":"CASE의 조건이 위에서부터 평가되므로 경계를 오름차순으로 두면 겹침 없이 버킷팅됩니다. 이후 GROUP BY 버킷으로 집계합니다.","code":"SELECT\n  CASE WHEN age&lt;20 THEN '10대'\n       WHEN age&lt;30 THEN '20대'\n       ELSE '30대+' END AS band,\n  COUNT(*)\nFROM users GROUP BY band;"},{"t":"choice","k":"NTILE 활용","q":"값을 크기순으로 4등분(사분위)해 그룹 번호를 매기는 함수는?","o":["NTILE(4)","RANK()","ROW_NUMBER()","LAG(4)"],"a":0,"ex":"NTILE(4) OVER (ORDER BY x)는 정렬된 행을 최대한 균등하게 4묶음으로 나눠 1~4 그룹 번호를 부여합니다. 분위수 구간화에 유용."}]}]}

{"title":"SQL 보안","guide":"🔒","lessons":[{"title":"SQL Injection 원리","xp":28,"q":[{"t":"choice","k":"주입원리","q":"SQL injection이 발생하는 근본 원인으로 가장 정확한 것은?","o":["사용자 입력을 코드(SQL)의 일부로 해석하기 때문","데이터베이스 서버 CPU가 느려서","인덱스가 없어서","트랜잭션 격리 수준이 낮아서"],"a":0,"ex":"사용자가 넣은 데이터가 문자열 연결로 쿼리문 자체에 섞여 코드로 실행되는 것이 주입의 본질이다."},{"t":"choice","k":"주석우회","q":"아이디 입력란에 admin' -- 를 넣었을 때 (-- 는 주석) 아래 쿼리가 위험한 이유는?","code":"SELECT * FROM users\nWHERE id = '입력' AND pw = '입력';","o":["뒤의 AND pw 조건이 주석 처리되어 비밀번호 검사가 무력화된다","쿼리가 문법 오류로 실패한다","비밀번호가 평문으로 노출된다","인덱스를 타지 못한다"],"a":0,"ex":"-- 이후가 주석이 되어 AND pw='...' 조건이 사라지므로 비밀번호 없이 로그인이 된다."},{"t":"input","k":"항상참","q":"WHERE 절을 항상 참으로 만들어 모든 행을 반환시키는 고전적인 주입 문자열을 쓰세요 (OR 사용).","a":["' OR '1'='1","OR '1'='1","' OR 1=1","' or '1'='1"],"ex":"'1'='1' 은 언제나 참이므로 WHERE 조건 전체가 참이 되어 테이블 전체가 노출된다."},{"t":"choice","k":"취약패턴","q":"다음 중 SQL injection에 가장 취약한 코드 패턴은?","o":["입력값을 문자열 연결로 쿼리문에 직접 이어붙인다","프레이스홀더(?)에 입력을 바인딩한다","ORM의 파라미터 바인딩을 쓴다","저장 프로시저에 파라미터로 전달한다"],"a":0,"ex":"문자열 연결(concatenation)로 쿼리를 조립하는 것이 대표적 취약 패턴이다."},{"t":"choice","k":"UNION공격","q":"UNION 기반 injection이 주로 노리는 것은?","o":["다른 테이블의 데이터를 결과에 덧붙여 탈취","트랜잭션 롤백 유발","인덱스 재구성","커넥션 풀 고갈"],"a":0,"ex":"UNION SELECT로 원래 결과에 공격자가 원하는 다른 테이블 데이터를 붙여 유출한다."}]},{"title":"방어: 파라미터화와 최소 권한","xp":30,"q":[{"t":"choice","k":"근본방어","q":"SQL injection의 가장 근본적이고 확실한 방어책은?","o":["파라미터화 쿼리(prepared statement) 사용","입력에서 작은따옴표만 제거","WAF에만 의존","쿼리를 대문자로 작성"],"a":0,"ex":"파라미터화는 데이터와 코드를 분리해 입력이 SQL 코드로 해석되지 않게 한다. 블랙리스트 필터링은 우회가 가능하다."},{"t":"choice","k":"동작원리","q":"prepared statement가 안전한 이유로 맞는 것은?","o":["쿼리 구조를 먼저 파싱·컴파일하고 값은 나중에 데이터로만 바인딩한다","입력을 자동으로 대문자화한다","실행 계획을 매번 새로 만든다","입력을 해시로 바꾼다"],"a":0,"ex":"쿼리 틀(구조)이 먼저 고정되고 바인딩된 값은 코드가 아닌 순수 데이터로 취급되어 주입이 불가능하다."},{"t":"input","k":"플레이스홀더","q":"많은 드라이버에서 파라미터 자리표시자로 쓰는 물음표 기호 하나는? (기호)","a":["?","물음표"],"ex":"WHERE id = ? 처럼 ? 자리에 값을 바인딩한다. Postgres는 $1, 명명형은 :name 도 쓴다."},{"t":"choice","k":"최소권한","q":"최소 권한 원칙(least privilege)에 맞는 설정은?","o":["앱 계정에 필요한 테이블의 SELECT/INSERT만 부여하고 DROP은 주지 않음","앱 계정에 항상 슈퍼유저 권한 부여","모든 계정에 GRANT ALL","root로 애플리케이션 접속"],"a":0,"ex":"계정에 업무에 필요한 최소한의 권한만 주어 침해되어도 피해 범위를 제한한다."},{"t":"input","k":"권한부여","q":"특정 테이블에 대한 조회 권한을 사용자에게 주는 DCL 키워드는?","a":["GRANT","grant"],"ex":"GRANT SELECT ON orders TO app_user; 회수는 REVOKE로 한다."}]},{"title":"접근 제어와 민감정보 저장","xp":29,"q":[{"t":"choice","k":"권한회수","q":"이미 부여한 권한을 거두어들이는 명령은?","o":["REVOKE","DELETE","TRUNCATE","ROLLBACK"],"a":0,"ex":"REVOKE SELECT ON orders FROM app_user; 는 GRANT의 반대 동작이다."},{"t":"choice","k":"뷰활용","q":"급여 테이블에서 민감 컬럼(주민번호 등)을 숨기고 일부 컬럼만 노출하는 가장 적절한 방법은?","o":["필요한 컬럼만 담은 view를 만들고 그 뷰에만 SELECT 권한을 부여","테이블 전체 SELECT 권한 부여","애플리케이션에서만 컬럼을 숨김","인덱스로 컬럼 숨김"],"a":0,"ex":"뷰로 컬럼·행 단위 노출을 제한하고 원본 테이블 권한은 회수하면 컬럼 수준 접근 제어가 가능하다."},{"t":"choice","k":"비번저장","q":"사용자 비밀번호를 저장하는 올바른 방법은?","o":["bcrypt/Argon2 같은 느린 해시에 솔트를 더해 저장","평문으로 저장","MD5로 한 번만 해시","양방향 암호화로 복호화 가능하게 저장"],"a":0,"ex":"비밀번호는 복호화가 필요 없으므로 솔트를 포함한 단방향·느린 해시(bcrypt, scrypt, Argon2)로 저장한다. 평문/MD5는 위험하다."},{"t":"input","k":"솔트","q":"같은 비밀번호라도 해시값이 달라지게 하고 레인보우 테이블 공격을 막기 위해 각 비밀번호에 더하는 무작위 값은? (영단어)","a":["salt","솔트"],"ex":"사용자마다 다른 salt를 붙여 해시하면 같은 비밀번호도 서로 다른 해시가 되어 사전·레인보우 공격에 강해진다."},{"t":"choice","k":"오류처리","q":"보안 관점에서 DB 에러를 다룰 때 권장되는 것은?","o":["상세 SQL 오류 메시지를 사용자에게 그대로 노출하지 않음","전체 스택트레이스를 화면에 표시","실행된 쿼리문을 응답에 포함","테이블 구조를 에러로 반환"],"a":0,"ex":"상세 오류는 테이블·컬럼 구조를 노출해 에러 기반 injection의 단서를 주므로 일반화된 메시지만 보여준다."}]}]},
{"title":"JSON과 반정형 데이터","guide":"🗂️","lessons":[{"title":"JSON 타입과 값 추출","xp":28,"q":[{"t":"choice","k":"JSON타입","q":"관계형 DB의 JSON 컬럼 타입에 대한 설명으로 옳은 것은?","o":["구조가 유동적인 반정형 데이터를 한 컬럼에 저장할 수 있다","반드시 VARCHAR와 완전히 동일하게 동작한다","인덱스를 전혀 걸 수 없다","조인에 절대 사용할 수 없다"],"a":0,"ex":"MySQL의 JSON, Postgres의 json/jsonb 타입은 스키마가 고정되지 않은 데이터를 저장하고 함수·연산자로 내부 값에 접근한다."},{"t":"choice","k":"jsonb","q":"Postgres에서 json과 jsonb의 핵심 차이는?","o":["jsonb는 이진 형식으로 파싱·저장되어 검색/인덱싱에 유리하고 키 순서·공백을 보존하지 않는다","jsonb는 입력 텍스트를 그대로 저장한다","json이 인덱싱에 더 유리하다","둘은 완전히 동일하다"],"a":0,"ex":"jsonb는 정규화된 이진 표현이라 GIN 인덱스와 연산자에 유리하고, json은 입력 텍스트를 그대로 보존한다."},{"t":"choice","k":"추출연산자","q":"MySQL에서 JSON 컬럼 data의 name 값을 따옴표 없이 문자열로 꺼내는 표현으로 옳은 것은?","o":["data-&gt;&gt;'$.name'","data.name","data['name']","GET(data,'name')"],"a":0,"ex":"MySQL에서 -&gt; 는 JSON 값(따옴표 포함), -&gt;&gt; 는 언쿼트된 스칼라를 반환한다. -&gt;&gt;'$.name' 은 JSON_UNQUOTE(JSON_EXTRACT(...))와 같다."},{"t":"choice","k":"화살표차이","q":"Postgres에서 -&gt; 와 -&gt;&gt; 의 차이로 옳은 것은?","o":["-&gt; 는 jsonb 타입을 반환하고 -&gt;&gt; 는 text(문자열)를 반환한다","-&gt; 는 숫자만, -&gt;&gt; 는 문자열만 저장한다","둘 다 항상 text를 반환한다","-&gt;&gt; 는 배열 전용이다"],"a":0,"ex":"data-&gt;'addr' 는 jsonb, data-&gt;&gt;'addr' 는 text를 준다. 중첩 접근 후 마지막에 -&gt;&gt; 로 text를 뽑는 패턴이 흔하다."},{"t":"input","k":"추출함수","q":"MySQL에서 JSON 경로로 값을 추출하는 대표 함수 이름은? (예: ...(data,'$.path'))","a":["JSON_EXTRACT","json_extract"],"ex":"JSON_EXTRACT(data,'$.name') 은 data-&gt;'$.name' 과 같다. 언쿼트하려면 JSON_UNQUOTE 또는 -&gt;&gt; 를 쓴다."}]},{"title":"JSON 생성·유효성·인덱싱","xp":30,"q":[{"t":"input","k":"객체생성","q":"MySQL에서 키-값 쌍으로 JSON 객체를 만드는 함수 이름은?","a":["JSON_OBJECT","json_object"],"ex":"JSON_OBJECT('id',1,'name','kim') 은 {\"id\":1,\"name\":\"kim\"} 을 만든다. 배열은 JSON_ARRAY."},{"t":"choice","k":"배열생성","q":"JSON_ARRAY(1, 2, 'a') 의 결과로 옳은 것은?","o":["[1, 2, \"a\"]","{1, 2, \"a\"}","(1, 2, a)","\"1,2,a\""],"a":0,"ex":"JSON_ARRAY는 인자들을 순서대로 담은 JSON 배열을 생성한다."},{"t":"choice","k":"유효성","q":"애플리케이션이 JSON 컬럼에 깨진 텍스트를 넣지 못하게 하려면?","o":["JSON 타입이 입력 시 유효한 JSON인지 검증하고, 추가로 CHECK나 JSON_VALID로 검사","VARCHAR로 저장하면 자동 검증된다","트리거로는 검사할 수 없다","유효성 검사는 불가능하다"],"a":0,"ex":"JSON/jsonb 타입 자체가 파싱 검증을 하고, MySQL은 JSON_VALID()나 CHECK 제약으로 추가 규칙을 걸 수 있다."},{"t":"choice","k":"인덱싱","q":"JSON 내부 특정 키로 자주 조회할 때 성능을 위한 올바른 접근은?","o":["Postgres는 jsonb에 GIN 인덱스, 또는 표현식/생성 컬럼에 B-tree 인덱스를 건다","JSON은 절대 인덱싱 불가라 풀스캔만 가능","전체 컬럼을 문자열 LIKE로 검색","인덱스 대신 캐시만 사용"],"a":0,"ex":"Postgres는 jsonb GIN 인덱스(포함 연산 @&gt;)나 (data-&gt;&gt;'k')에 B-tree를, MySQL은 생성 컬럼에 인덱스를 건다."},{"t":"choice","k":"생성컬럼","q":"MySQL에서 JSON 값에 인덱스를 걸기 위한 전형적 방법은?","o":["JSON 경로를 추출하는 generated(virtual/stored) column을 만들고 거기에 인덱스를 건다","JSON 컬럼에 직접 PRIMARY KEY를 건다","JSON 컬럼 전체를 UNIQUE로 지정","인덱스를 걸 수 없다"],"a":0,"ex":"MySQL은 생성 컬럼(예: name_g AS (data-&gt;&gt;'$.name'))을 만들어 그 컬럼에 인덱스를 거는 방식을 쓴다."}]},{"title":"정규화 vs JSON: 트레이드오프","xp":27,"q":[{"t":"choice","k":"JSON적합","q":"JSON 컬럼을 쓰기에 가장 적합한 경우는?","o":["구조가 자주 바뀌거나 항목마다 속성이 달라 스키마를 미리 못 박는 반정형 데이터","항상 조인·집계·정렬의 핵심이 되는 필드","엄격한 참조 무결성이 필요한 핵심 관계","고정된 소수의 컬럼"],"a":0,"ex":"제품마다 다른 속성(전자제품 vs 의류)처럼 가변·희소 스키마 데이터에 JSON이 유리하다."},{"t":"choice","k":"정규화적합","q":"반대로 정규화된 컬럼/테이블이 더 나은 경우는?","o":["해당 값으로 자주 조인·필터·집계하고 무결성 제약이 중요할 때","값이 거의 조회되지 않을 때","구조가 매 행마다 다를 때","임시 로그 덤프일 때"],"a":0,"ex":"조인·인덱스·제약(FK, UNIQUE)이 필요한 1급 데이터는 정규화 컬럼이 유리하다. JSON은 이런 보장을 약화시킨다."},{"t":"choice","k":"단점","q":"핵심 데이터를 JSON에 몰아넣을 때의 대표적 단점은?","o":["타입 안정성·제약이 약해지고 내부 값 조회가 느리거나 인덱스 설계가 번거롭다","저장 공간을 항상 절반으로 줄인다","조인이 항상 빨라진다","트랜잭션이 불가능해진다"],"a":0,"ex":"JSON은 유연하지만 FK·타입 검증이 약하고 내부 값 접근·인덱싱에 추가 작업이 필요해, 남용하면 성능·무결성에서 손해다."},{"t":"input","k":"원자성","q":"각 컬럼이 원자값을 갖도록 요구하는(한 칸에 여러 값 나열 금지) 정규형은? (예: 1NF)","a":["1NF","제1정규형","1정규형","1"],"ex":"1NF는 각 컬럼이 원자값을 갖도록 요구한다. 배열/JSON 남용은 이 원칙과 충돌할 수 있어 트레이드오프를 고려한다."},{"t":"choice","k":"하이브리드","q":"실무에서 흔한 절충안은?","o":["자주 조회·조인하는 필드는 정규 컬럼으로 승격하고 나머지 가변 속성만 JSON에 둔다","모든 데이터를 항상 JSON 하나에 저장","JSON을 절대 쓰지 않는다","모든 컬럼을 JSON으로 변환"],"a":0,"ex":"핫한 필드는 컬럼(또는 생성 컬럼)으로 빼서 인덱싱하고 롱테일 속성만 JSON에 두는 하이브리드가 균형점이다."}]}]},
{"title":"성능 튜닝 심화","guide":"⚡","lessons":[{"title":"조인 알고리즘","xp":30,"q":[{"t":"choice","k":"NestedLoop","q":"Nested Loop Join의 특성으로 옳은 것은?","o":["바깥 테이블의 각 행마다 안쪽 테이블을 조회하며, 안쪽에 인덱스가 있고 결과가 작을 때 유리","항상 두 테이블을 정렬한 뒤 병합","언제나 해시 테이블을 메모리에 만든다","대량-대량 조인에 항상 최적"],"a":0,"ex":"outer 각 행에 대해 inner를 찾는 방식이다. inner 조인 키에 인덱스가 있고 outer가 작으면 효율적이지만, 양쪽이 크면 O(N*M)로 느려진다."},{"t":"choice","k":"HashJoin","q":"Hash Join이 유리한 상황은?","o":["인덱스 없는 큰 두 테이블을 등가(equi) 조인할 때 한쪽으로 해시 테이블을 만들어 매칭","부등호(범위) 조인에서 항상 최적","한 건만 조회할 때","정렬된 출력이 반드시 필요할 때"],"a":0,"ex":"작은 쪽으로 해시 테이블을 만들고 큰 쪽을 훑어 매칭한다. 등가 조인 전용이며 대량 데이터에 강하지만 해시용 메모리가 필요하다."},{"t":"choice","k":"MergeJoin","q":"Sort-Merge Join의 특성은?","o":["양쪽을 조인 키로 정렬한 뒤 병합하며, 이미 정렬돼 있거나 정렬된 출력이 필요할 때 유리","등가 조인만 가능하고 정렬은 필요 없다","해시 충돌을 처리한다","항상 인덱스가 없어야 한다"],"a":0,"ex":"두 입력을 정렬(또는 인덱스로 이미 정렬)해 지퍼처럼 병합한다. 정렬 비용은 크지만 정렬된 결과나 범위 조인에 유리하다."},{"t":"choice","k":"선택기준","q":"옵티마이저가 조인 알고리즘을 고르는 기준으로 가장 적절한 것은?","o":["테이블 크기·인덱스 유무·통계에 기반한 예상 비용","테이블 알파벳 순서","테이블 생성 시각","컬럼 개수만"],"a":0,"ex":"통계정보로 카디널리티를 추정해 비용이 최소인 알고리즘과 조인 순서를 선택한다."},{"t":"input","k":"등가전용","q":"Hash Join이 기본적으로 지원하는 조인 조건 종류를 가리키는 용어는? (= 조건, 영어)","a":["equi","equi-join","등가조인","등가"],"ex":"해시는 키의 동등 비교에 기반하므로 equi-join에만 쓰인다. 범위 조인은 보통 nested loop나 merge를 쓴다."}]},{"title":"실행계획과 인덱스","xp":31,"q":[{"t":"choice","k":"EXPLAIN","q":"EXPLAIN(실행계획)으로 확인하는 것으로 가장 알맞은 것은?","o":["옵티마이저가 선택한 접근 방식(인덱스/풀스캔), 조인 순서·방법, 예상 행 수","쿼리의 문법 오류 여부만","실제 반환된 데이터","서버의 남은 디스크 용량"],"a":0,"ex":"EXPLAIN은 계획(접근 경로, 조인 방식, 추정 행수·비용)을 보여준다. EXPLAIN ANALYZE는 실제 실행 통계까지 준다."},{"t":"choice","k":"위험신호","q":"실행계획에서 성능 문제로 의심할 신호는?","o":["큰 테이블의 Seq Scan/Full Table Scan과 예상 행수 대 실제 행수의 큰 괴리","인덱스를 쓰는 Index Scan","작은 테이블 스캔","LIMIT 1 조회"],"a":0,"ex":"대형 테이블 풀스캔과 추정·실제 행수 괴리(통계 부정확)는 튜닝 대상이다. 작은 테이블 풀스캔은 오히려 정상일 수 있다."},{"t":"choice","k":"함수적용","q":"WHERE 절 때문에 인덱스를 못 쓰는(비-SARGable) 대표 사례는?","o":["WHERE YEAR(created_at) = 2025 처럼 인덱스 컬럼에 함수를 적용","WHERE created_at &gt;= '2025-01-01'","WHERE id = 10","WHERE name = 'kim'"],"a":0,"ex":"컬럼을 함수로 감싸면 원본 값 기준 인덱스를 못 탄다. created_at &gt;= '2025-01-01' AND &lt; '2026-01-01' 로 바꾸면 SARGable해진다."},{"t":"choice","k":"형변환","q":"컬럼이 문자열인데 WHERE phone = 01012345678 (숫자)로 비교하면 생기는 문제는?","o":["암묵적 형변환이 컬럼 쪽에 일어나 인덱스를 못 타고 잘못된 매칭 위험","항상 더 빨라진다","자동으로 인덱스가 생성된다","정렬이 보장된다"],"a":0,"ex":"타입 불일치 시 컬럼 값이 변환되면 인덱스가 무효화된다. 리터럴을 컬럼 타입에 맞춰(따옴표) 비교해야 한다."},{"t":"input","k":"검색가능","q":"인덱스를 활용할 수 있는 형태의 WHERE 조건을 가리키는 용어는? (영어)","a":["SARGable","sargable","SARG","sarg"],"ex":"Search ARGument able의 줄임말. 컬럼을 가공하지 않고 '컬럼 op 값' 형태로 써야 인덱스 탐색이 가능하다."}]},{"title":"쿼리 최적화 패턴","xp":30,"q":[{"t":"choice","k":"N+1","q":"N+1 쿼리 문제란?","o":["목록 1건을 가져온 뒤 각 항목의 연관 데이터를 개별 쿼리로 N번 더 조회해 총 N+1번 실행되는 것","쿼리를 N번 캐시하는 것","N개 인덱스를 만드는 것","N개 트랜잭션을 여는 것"],"a":0,"ex":"부모 N건마다 자식을 따로 조회하면 쿼리가 폭증한다. 조인이나 IN(...) 일괄 조회, ORM의 eager loading으로 해결한다."},{"t":"choice","k":"N+1해결","q":"N+1 문제를 줄이는 방법으로 옳은 것은?","o":["JOIN 또는 WHERE child.parent_id IN (...) 로 한 번에 모아 조회","각 행마다 쿼리를 더 잘게 쪼갠다","인덱스를 모두 제거","트랜잭션 수를 늘린다"],"a":0,"ex":"부모 id들을 모아 IN 절 한 번 또는 조인으로 자식을 일괄 로딩(batch/eager)하면 왕복 횟수가 크게 준다."},{"t":"choice","k":"LIMIT정렬","q":"ORDER BY created_at DESC LIMIT 10 을 빠르게 만드는 핵심은?","o":["created_at에 정렬 방향에 맞는 인덱스가 있으면 상위 10건만 읽고 멈출 수 있다","LIMIT은 항상 전체 정렬 후 잘라내므로 인덱스가 무의미","인덱스가 없을수록 빠르다","DESC는 인덱스를 쓸 수 없다"],"a":0,"ex":"정렬 컬럼 인덱스를 타면 정렬된 순서로 앞 10건만 읽고 종료(top-N)한다. 인덱스가 없으면 전체 정렬 비용이 든다."},{"t":"choice","k":"키셋페이징","q":"OFFSET 100000 LIMIT 10 같은 깊은 페이지네이션의 문제와 대안은?","o":["OFFSET은 건너뛴 행까지 다 읽어 느리다 → WHERE id &lt; 마지막본id 방식의 키셋(seek) 페이지네이션 사용","OFFSET이 항상 가장 빠르다","LIMIT을 없애면 해결","정렬을 제거하면 해결"],"a":0,"ex":"OFFSET N은 앞의 N행을 스캔·폐기해 뒤로 갈수록 느려진다. 마지막으로 본 키를 기준으로 이어 읽는 키셋 페이지네이션이 일정한 성능을 낸다."},{"t":"input","k":"통계갱신","q":"옵티마이저가 좋은 계획을 세우도록 테이블의 통계정보를 수집·갱신하는 SQL 명령은?","a":["ANALYZE","analyze"],"ex":"ANALYZE로 카디널리티·분포 통계를 갱신하면 옵티마이저 추정이 정확해져 계획 품질이 오른다. Postgres는 autovacuum이 자동 수행한다."}]}]}

부모 타입 참조변수에 담는 것","부모 객체를 자식 타입으로 강제 변환하는 것","항상 명시적 캐스팅이 필요하다","서로 관계없는 타입 간 변환"],"a":0,"ex":"업캐스팅은 자식→부모 타입으로 자동(암시적)으로 이루어집니다. 다운캐스팅은 명시적 캐스팅이 필요합니다."},{"t":"input","k":"어노테이션","q":"부모 메서드를 올바르게 오버라이딩하는지 컴파일러가 검사하도록 붙이는 어노테이션은? (@ 포함)","a":["@Override","Override"],"ex":"@Override 어노테이션은 오버라이딩 실수를 컴파일 시점에 잡아줍니다."},{"t":"choice","k":"오버로딩호출","q":"다음 코드의 출력은?","code":"class Printer {\n    void print(int x) { System.out.println(\"int: \" + x); }\n    void print(double x) { System.out.println(\"double: \" + x); }\n}\npublic class Main {\n    public static void main(String[] args) {\n        new Printer().print(5);\n    }\n}","o":["int: 5","double: 5.0","컴파일 에러","double: 5"],"a":0,"ex":"5는 int 리터럴이므로 print(int)가 호출되어 \"int: 5\"가 출력됩니다."}]},{"title":"추상클래스와 인터페이스","xp":24,"q":[{"t":"choice","k":"추상클래스","q":"추상 클래스(abstract class)에 대한 설명으로 옳은 것은?","o":["직접 객체를 생성할 수 없다","모든 메서드가 추상 메서드여야 한다","필드를 가질 수 없다","new로 인스턴스화할 수 있다"],"a":0,"ex":"추상 클래스는 new로 직접 인스턴스화할 수 없고, 일반 메서드와 추상 메서드를 모두 가질 수 있습니다."},{"t":"choice","k":"인터페이스차이","q":"인터페이스(interface)와 추상 클래스의 차이로 옳은 것은?","o":["한 클래스가 여러 인터페이스를 구현할 수 있지만 클래스 상속은 하나만 가능하다","인터페이스는 인스턴스 변수를 자유롭게 가진다","추상 클래스는 다중 상속을 지원한다","인터페이스는 생성자를 가진다"],"a":0,"ex":"자바는 다중 상속을 지원하지 않아 extends는 하나만 가능하지만, implements로 여러 인터페이스를 구현할 수 있습니다."},{"t":"input","k":"구현키워드","q":"클래스가 인터페이스를 구현할 때 사용하는 키워드는?","a":["implements"],"ex":"인터페이스는 implements, 클래스 상속은 extends를 사용합니다."},{"t":"choice","k":"추상메서드","q":"추상 메서드에 대한 설명으로 옳은 것은?","o":["구현부(body) 없이 선언만 하고 자식이 반드시 구현해야 한다","반드시 private이어야 한다","반드시 본문을 가져야 한다","static으로만 선언된다"],"a":0,"ex":"추상 메서드는 본문이 없으며, 이를 상속·구현한 클래스가 반드시 오버라이딩해야 합니다."},{"t":"choice","k":"인터페이스타입","q":"interface Shape를 구현한 class Circle가 있을 때 올바른 코드는?","o":["Shape s = new Circle();","Circle c = new Shape();","Shape s = new Shape();","위 셋 모두 가능"],"a":0,"ex":"인터페이스 타입으로 구현 객체를 참조할 수 있습니다(업캐스팅). 인터페이스 자체는 new로 인스턴스화할 수 없습니다."}]}]},
{"title":"컬렉션과 제네릭","guide":"📦","lessons":[{"title":"List와 Map","xp":24,"q":[{"t":"choice","k":"리스트선언","q":"문자열을 담는 ArrayList를 올바르게 선언한 것은?","o":["List&lt;String&gt; list = new ArrayList&lt;&gt;();","List(String) list = new ArrayList();","ArrayList list = new List&lt;String&gt;();","List&lt;String&gt; list = new List&lt;&gt;();"],"a":0,"ex":"List&lt;String&gt; list = new ArrayList&lt;&gt;(); 형태로 선언합니다. List는 인터페이스라 직접 생성할 수 없습니다."},{"t":"input","k":"리스트접근","q":"다음 코드의 출력은?","code":"List&lt;String&gt; list = new ArrayList&lt;&gt;();\nlist.add(\"A\");\nlist.add(\"B\");\nlist.add(\"C\");\nSystem.out.println(list.get(1));","a":["B"],"ex":"인덱스는 0부터 시작하므로 get(1)은 두 번째 요소 \"B\"입니다."},{"t":"choice","k":"맵없는키","q":"HashMap에서 존재하지 않는 키로 get()을 호출하면?","o":["null을 반환한다","예외가 발생한다","0을 반환한다","빈 문자열을 반환한다"],"a":0,"ex":"HashMap.get()은 키가 없으면 null을 반환합니다. 기본값을 원하면 getOrDefault()를 사용합니다."},{"t":"input","k":"맵값","q":"다음 코드의 출력은?","code":"Map&lt;String, Integer&gt; map = new HashMap&lt;&gt;();\nmap.put(\"age\", 20);\nSystem.out.println(map.get(\"age\"));","a":["20"],"ex":"key \"age\"에 저장된 값 20이 출력됩니다."},{"t":"choice","k":"맵중복키","q":"다음 코드의 출력은?","code":"Map&lt;String, Integer&gt; map = new HashMap&lt;&gt;();\nmap.put(\"x\", 1);\nmap.put(\"x\", 2);\nSystem.out.println(map.size() + \" \" + map.get(\"x\"));","o":["1 2","2 2","1 1","2 1"],"a":0,"ex":"같은 키로 put하면 값이 덮어써집니다. 크기는 1, 값은 2입니다."}]},{"title":"Set과 제네릭","xp":24,"q":[{"t":"choice","k":"셋특징","q":"HashSet의 특징으로 옳은 것은?","o":["중복된 요소를 저장하지 않는다","입력 순서를 항상 보장한다","키-값 쌍을 저장한다","인덱스로 접근한다"],"a":0,"ex":"Set은 중복을 허용하지 않으며, HashSet은 순서를 보장하지 않습니다."},{"t":"input","k":"셋크기","q":"다음 코드의 출력은?","code":"Set&lt;Integer&gt; set = new HashSet&lt;&gt;();\nset.add(1);\nset.add(2);\nset.add(2);\nset.add(3);\nSystem.out.println(set.size());","a":["3"],"ex":"Set은 중복을 저장하지 않으므로 2가 한 번만 들어가 크기는 3입니다."},{"t":"choice","k":"제네릭목적","q":"제네릭(Generics)을 사용하는 주된 이유는?","o":["컴파일 시점에 타입 안정성을 보장하고 형변환을 줄인다","실행 속도를 무조건 빠르게 한다","메모리를 자동으로 압축한다","반드시 상속을 강제한다"],"a":0, {"title":"예외와 문자열","guide":"⚠️","lessons":[{"title":"예외 처리","xp":24,"q":[{"t":"choice","k":"예외종류","q":"checked 예외와 unchecked 예외의 차이로 옳은 것은?","o":["checked 예외는 컴파일 시점에 처리(try-catch 또는 throws)를 강제한다","unchecked 예외는 반드시 catch해야 한다","checked 예외는 RuntimeException을 상속한다","둘은 완전히 동일하다"],"a":0,"ex":"checked 예외(예: IOException)는 처리를 강제받습니다. unchecked(RuntimeException 계열)는 강제되지 않습니다."},{"t":"choice","k":"finally순서","q":"다음 코드의 출력은?","code":"static int test() {\n    try {\n        return 1;\n    } finally {\n        System.out.println(\"finally\");\n    }\n}\n// main에서 System.out.println(test()); 호출","o":["finally 그다음 1","1 그다음 finally","1만 출력","finally만 출력"],"a":0,"ex":"return 문이 실행되어도 finally 블록이 먼저 실행된 뒤 값이 반환됩니다. 따라서 finally, 1 순서입니다."},{"t":"choice","k":"throw차이","q":"throw와 throws의 차이로 옳은 것은?","o":["throw는 실제 예외를 던지고, throws는 메서드가 던질 수 있는 예외를 선언한다","throw는 메서드 선언부에 쓴다","throws는 예외 객체를 생성해 던진다","둘은 완전히 같다"],"a":0,"ex":"throw는 예외를 실제로 발생시키고, throws는 메서드 시그니처에서 던질 수 있는 예외를 선언합니다."},{"t":"input","k":"항상실행","q":"try-catch 구문에서 예외 발생 여부와 관계없이 항상 실행되는 블록의 키워드는?","a":["finally"],"ex":"finally 블록은 예외 발생 여부와 무관하게 항상 실행됩니다."},{"t":"input","k":"예외잡기","q":"다음 코드의 출력은?","code":"try {\n    int[] arr = new int[3];\n    System.out.println(arr[5]);\n} catch (ArrayIndexOutOfBoundsException e) {\n    System.out.println(\"잡힘\");\n}","a":["잡힘"],"ex":"arr[5]는 인덱스 범위를 벗어나 ArrayIndexOutOfBoundsException이 발생하고, catch 블록이 이를 잡아 \"잡힘\"을 출력합니다."}]},{"title":"커스텀 예외와 흐름","xp":26,"q":[{"t":"choice","k":"커스텀예외","q":"커스텀(사용자 정의) 예외를 만드는 일반적인 방법은?","o":["Exception 또는 RuntimeException을 상속하는 클래스를 만든다","interface를 구현한다","enum으로 정의한다","반드시 Object만 상속한다"],"a":0,"ex":"커스텀 예외는 보통 Exception(checked) 또는 RuntimeException(unchecked)을 상속해 만듭니다."},{"t":"choice","k":"흐름순서","q":"다음 코드의 출력 순서는?","code":"try {\n    System.out.println(\"A\");\n    throw new RuntimeException();\n} catch (RuntimeException e) {\n    System.out.println(\"B\");\n} finally {\n    System.out.println(\"C\");\n}","o":["A B C","A C","A B","B C A"]," {"title":"그룹화와 결합","guide":"🧩","lessons":[{"title":"groupby 집계","xp":28,"q":[{"t":"choice","k":"groupby 개념","q":"df.groupby('team')['score'].mean()이 계산하는 것은?","o":["team 값별로 나눈 뒤 각 그룹의 score 평균","전체 score의 평균 하나","team 열의 평균","score를 team으로 나눈 값"],"a":0,"ex":"groupby('team')로 같은 team끼리 묶고, 각 그룹의 score 평균을 team별로 반환합니다(split-apply-combine)."},{"t":"input","k":"그룹 합계","q":"아래 결과에서 team 'A'의 합계는?","code":"df = pd.DataFrame({'team': ['A', 'B', 'A', 'B'],\n                   'score': [10, 20, 30, 40]})\nprint(df.groupby('team')['score'].sum())","a":["40","40점"],"ex":"team 'A'의 score는 10과 30이므로 합계는 40입니다. (참고로 'B'는 20+40=60)"},{"t":"choice","k":"agg","q":"한 번의 groupby로 여러 집계(합계와 평균)를 동시에 구하는 방법은?","o":["df.groupby('team')['score'].agg(['sum', 'mean'])","df.groupby('team').sum().mean()","df.groupby('team', 'sum', 'mean')","df.agg('team')['score']"],"a":0,"ex":"agg(['sum', 'mean'])처럼 함수 리스트를 주면 그룹마다 여러 집계를 한 번에 계산해 여러 열로 반환합니다."},{"t":"choice","k":"그룹 개수","q":"각 그룹의 '행 개수'를 세는 데 적합한 것은?","o":["df.groupby('team').size()","df.groupby('team').mean()","df.groupby('team').max()","df.groupby('team').sort_values()"],"a":0,"ex":"size()는 그룹별 행 수를 반환합니다. count()도 쓸 수 있으나 결측치를 제외하고 셉니다."},{"t":"choice","k":"reset_index","q":"groupby 집계 결과에서 그룹 키를 다시 일반 열로 되돌리는 메서드는?","o":["reset_index()","set_index()","drop_index()","reindex()"],"a":0,"ex":"groupby 결과는 그룹 키가 index가 됩니다. reset_index()를 호출하면 그 키가 다시 일반 열이 됩니다."}]},{"title":"merge와 concat","xp":26,"q":[{"t":"choice","k":"inner join","q":"pd.merge(a, b, on='id', how='inner')의 결과는?","o":["두 DataFrame 모두에 존재하는 id만 남는다","a의 모든 행이 남는다","b의 모든 행이 남는다","id가 다른 행만 남는다"],"a":0,"ex":"inner join은 양쪽 키가 모두 매칭되는 행만 유지합니다. 교집합에 해당합니다."},{"t":"choice","k":"left join","q":"how='left'로 merge하면?","o":["왼쪽 DataFrame의 모든 행을 유지하고, 매칭 안 되면 NaN을 채운다","오른쪽 DataFrame의 모든 행을 유지한다","매칭되는 행만 남긴다","두 프레임의 모든 행을 합친다"],"a":0,"ex":"left join은 왼쪽 기준으로, 왼쪽 모든 행을 남기고 오른쪽에 짝이 없으면 그 열은 NaN이 됩니다."},{"t":"choice","k":"concat 방향","q":"pd.concat([df1, df2], axis=0)이 하는 일은?","o":["행 방향으로 위아래로 이어 붙인다","열 방향으로 좌우로 이어 붙인다","키 기준으로 조인한다","중복 행을 제거한다"],"a":0,"ex":"axis=0은 행 방향(세로) 결합입니다. axis=1은 열 방향(가로) 결합으로 index를 맞춰 붙입니다."},{"t":"input","k":"결합 행 수","q":"아래 concat 결과의 전체 행 개수는?","code":"df1 = pd.DataFrame({'a': [1, 2]})\ndf2 = pd.DataFrame({'a': [3, 4, 5]})\nprint(len(pd.concat([df1, df2])))","a":["5","5개"],"ex":"concat은 기본 axis=0이라 행을 이어 붙입니다. 2 + 3 = 5개 행이 됩니다."},{"t":"choice","k":"merge vs concat","q":"merge와 concat의 핵심 차이로 옳은 것은?","o":["merge는 키(공통 열) 값으로 매칭해 결합, concat은 축을 따라 단순히 이어 붙임","둘은 완전히 동일하다","concat만 키를 사용한다","merge는 항상 행을 늘리기만 한다"],"a":0,"ex":"merge는 SQL join처럼 키 매칭 기반 결합이고, concat은 지정한 축을 따라 데이터를 이어 붙이는 연결입니다."}]},{"title":"apply, 정렬, pivot","xp":24,"q":[{"t":"input","k":"apply 출력","q":"아래 apply 결과의 첫 번째 값은?","code":"s = pd.Series([1, 2, 3])\nprint(s.apply(lambda x: x * 2).iloc[0])","a":["2","2.0"],"ex":"apply는 각 원소에 함수를 적용합니다. 첫 값 1에 x*2가 적용되어 2가 됩니다."},{"t":"choice","k":"sort_values","q":"df를 'age' 열 기준으로 정렬하는 코드는?","o":["df.sort_values('age')","df.sort_index('age')","df.order_by('age')","df.sort('age', values=True)"],"a":0,"ex":"sort_values('열이름')은 해당 열 값 기준으로 행을 정렬합니다. sort_index()는 index 기준 정렬입니다."},{"t":"choice","k":"정렬 방향","q":"df.sort_values('score')의 기본 정렬 방향은?","o":["오름차순(작은 값부터)","내림차순(큰 값부터)","무작위","정렬하지 않음"],"a":0,"ex":"기본값은 ascending=True(오름차순)입니다. 내림차순은 ascending=False를 지정합니다."},{"t":"choice","k":"pivot_table","q":"pivot_table의 역할로 가장 정확한 것은?","o":["index/columns로 지정한 기준에 따라 값을 재배치하며 집계(예: 평균)한다","결측치를 자동으로 제거한다","두 DataFrame을 키로 조인한다","열의 데이터 타입을 바꾼다"],"a":0,"ex":"pivot_table은 index와 columns 기준으로 데이터를 펼쳐 재배치하고 aggfunc(기본 평균)로 집계하는 요약표를 만듭니다."},{"t":"choice","k":"apply axis","q":"DataFrame에서 각 '행' 전체를 대상으로 함수를 적용하려면?","o":["df.apply(func, axis=1)","df.apply(func, axis=0)","df.applymap(func)","df.map(func)"],"a":0,"ex":"df.apply(func, axis=1)은 행 단위로 함수를 적용합니다. axis=0(기본)은 열 단위입니다."}]}]}]},

ml:{name:"머신러닝",em:"🤖",color:"#e0533d",g:"linear-gradient(135deg,#e0533d,#5b6cff)",units:[{"title":"머신러닝이란","guide":"🤖","lessons":[{"title":"학습의 세 가지 유형","xp":25,"q":[{"t":"choice","k":"지도학습","q":"지도학습(supervised learning)을 가장 잘 설명한 것은?","o":["정답 레이블이 있는 데이터로 입력과 출력의 관계를 학습한다","레이블 없이 데이터의 숨은 구조를 찾는다","보상 신호를 통해 시행착오로 행동을 학습한다","사람이 모든 규칙을 직접 코드로 작성한다"],"a":0,"ex":"지도학습은 입력(특성)과 정답(레이블)이 쌍으로 주어진 데이터로 둘 사이의 대응 관계를 학습합니다."},{"t":"choice","k":"강화학습","q":"다음 중 강화학습(reinforcement learning)의 대표적 예시는?","o":["고양이/개 사진 분류","고객을 유사 그룹으로 군집화","보상을 최대화하도록 게임을 플레이하는 에이전트","과거 집값 데이터로 가격 예측"],"a":2,"ex":"강화학습은 환경과 상호작용하며 받은 보상(reward)을 최대화하는 방향으로 행동 정책을 학습합니다. 게임 플레이가 전형적 예시입니다."},{"t":"choice","k":"비지도학습","q":"레이블이 전혀 없는 고객 데이터를 비슷한 집단으로 묶는 작업은 어떤 유형인가?","o":["지도학습","비지도학습","강화학습","규칙기반 프로그래밍"],"a":1,"ex":"정답 레이블 없이 데이터 자체의 구조(유사성)를 찾아 군집화(clustering)하는 것은 비지도학습입니다."},{"t":"input","k":"레이블 없음","q":"정답 레이블 없이 데이터의 패턴이나 구조를 스스로 찾는 학습 유형의 이름은? (한국어)","a":["비지도학습","비지도 학습","unsupervised learning"],"ex":"비지도학습(unsupervised learning)은 레이블 없이 군집화, 차원 축소 등으로 데이터의 내재된 구조를 발견합니다."},{"t":"choice","k":"스팸분류","q":"'스팸/정상'이 표시된 이메일 데이터로 필터를 학습시키는 것은 어떤 유형인가?","o":["비지도학습","강화학습","지도학습","특성 선택"],"a":2,"ex":"스팸/정상이라는 정답 레이블이 있으므로 지도학습이며, 그중에서도 두 범주로 나누는 분류(classification) 문제입니다."}]},{"title":"분류와 회귀","xp":26,"q":[{"t":"choice","k":"회귀정의","q":"회귀(regression) 문제의 특징으로 옳은 것은?","o":["출력이 정해진 몇 개의 범주 중 하나이다","출력이 연속적인 수치 값이다","레이블이 존재하지 않는다","보상을 통해 학습한다"],"a":1,"ex":"회귀는 집값, 온도처럼 연속적인 수치를 예측합니다. 반면 분류는 이산적인 범주(class)를 예측합니다."},{"t":"choice","k":"분류예시","q":"다음 중 분류(classification) 문제는?","o":["내일의 기온(℃) 예측","주택 가격 예측","손글씨 이미지가 어떤 숫자인지 판별","제품 판매량 예측"],"a":2,"ex":"손글씨가 0~9 중 어떤 숫자인지 맞히는 것은 이산적인 범주를 고르는 분류 문제입니다. 나머지는 연속값을 예측하는 회귀입니다."},{"t":"choice","k":"집값예측","q":"과거 데이터로 미래의 아파트 가격(원)을 예측하는 문제는?","o":["분류","회귀","군집화","강화학습"],"a":1,"ex":"가격은 연속적인 수치이므로 회귀 문제입니다."},{"t":"input","k":"스팸/정상","q":"이메일을 '스팸' 또는 '정상' 두 범주 중 하나로 예측하는 지도학습 문제 유형은? (한국어)","a":["분류","classification"],"ex":"정해진 범주 중 하나를 고르므로 분류(classification)이며, 범주가 둘이므로 이진 분류입니다."},{"t":"choice","k":"연속출력","q":"예측하려는 출력값이 연속형 수치라면 일반적으로 어떤 문제로 다루는가?","o":["분류","회귀","군집화","차원 축소"],"a":1,"ex":"출력이 연속적인 실수 값이면 회귀 문제로 접근합니다."}]},{"title":"데이터의 구성 요소","xp":25,"q":[{"t":"choice","k":"특성","q":"머신러닝에서 특성(feature)이란?","o":["예측하려는 정답 값","모델의 성능 지표","입력을 설명하는 개별 속성(변수)","전체 데이터셋의 크기"],"a":2,"ex":"특성(feature)은 예측에 사용하는 입력 변수입니다. 예: 집의 면적, 방 개수. 특성들의 조합으로 하나의 샘플이 표현됩니다."},{"t":"choice","k":"레이블","q":"레이블(label)에 대한 설명으로 옳은 것은?","o":["모델이 예측해야 하는 정답(목표) 값","입력 데이터의 개수","모델의 학습률","특성의 스케일"],"a":0,"ex":"레이블(label)은 지도학습에서 각 샘플에 대응하는 정답 값입니다. 타깃(target)이라고도 부릅니다."},{"t":"choice","k":"샘플","q":"데이터셋에서 하나의 샘플(sample)이 의미하는 것은?","o":["하나의 특성 열","특성 값들로 이루어진 하나의 데이터 관측치(행)","전체 모델","하나의 하이퍼파라미터"],"a":1,"ex":"샘플(sample) 또는 인스턴스는 개별 관측치로, 보통 표의 한 행에 해당하며 여러 특성 값으로 구성됩니다."},{"t":"choice","k":"규칙vs학습","q":"규칙기반 프로그래밍과 머신러닝의 핵심 차이는?","o":["머신러닝은 데이터에서 패턴(규칙)을 스스로 학습한다","규칙기반은 데이터가 전혀 필요 없다","머신러닝은 항상 규칙기반보다 느리다","둘은 완전히 동일하다"],"a":0,"ex":"규칙기반은 사람이 if-then 규칙을 직접 작성하지만, 머신러닝은 데이터로부터 규칙(패턴)을 자동으로 학습합니다."},{"t":"input","k":"정답값","q":"지도학습에서 각 샘플에 대해 모델이 맞혀야 하는 정답 값을 부르는 용어는? (한국어)","a":["레이블","라벨","label","타깃","target"],"ex":"정답 값은 레이블(label) 또는 타깃(target)이라고 합니다."}]}]},
{"title":"학습과 일반화","guide":"📊","lessons":[{"title":"데이터 분할","xp":25,"q":[{"t":"choice","k":"훈련셋","q":"훈련 세트(training set)의 역할은?","o":["모델의 파라미터를 학습(fit)시키는 데 사용","최종 성능을 딱 한 번 보고하는 데 사용","하이퍼파라미터만 고르는 데 사용","사용하지 않고 보관만 함"],"a":0,"ex":"훈련 세트는 모델이 패턴을 학습(파라미터 조정)하는 데 사용됩니다."},{"t":"choice","k":"검증셋","q":"검증 세트(validation set)의 주된 용도는?","o":["모델 파라미터를 직접 학습","하이퍼파라미터 조정과 모델 선택","데이터 수집","특성 생성"],"a":1,"ex":"검증 세트는 훈련 중 하이퍼파라미터 튜닝과 모델 비교/선택에 사용하여 과적합을 감시합니다."},{"t":"choice","k":"테스트셋","q":"테스트 세트(test set)를 올바르게 사용하는 방법은?","o":["튜닝할 때마다 반복해서 사용한다","모델을 학습시키는 데 사용한다","모든 개발이 끝난 뒤 최종 일반화 성능 평가에만 사용한다","검증 세트 대신 매 에폭 사용한다"],"a":2,"ex":"테스트 세트는 개발이 끝난 후 최종 일반화 성능을 편향 없이 추정하기 위해 한 번만 사용합니다."},{"t":"input","k":"파라미터학습","q":"모델의 파라미터를 실제로 학습(fit)시키는 데 사용하는 데이터 세트의 이름은? (한국어)","a":["훈련 세트","훈련셋","트레이닝 세트","학습 세트","train"],"ex":"모델 파라미터는 훈련 세트(training set)로 학습합니다."},{"t":"choice","k":"테스트오용","q":"테스트 세트를 반복적으로 보며 하이퍼파라미터를 고르면 생기는 문제는?","o":["훈련 속도가 느려진다","테스트 세트에 간접적으로 과적합되어 일반화 성능을 과대평가한다","레이블이 사라진다","특성 수가 늘어난다"],"a":1,"ex":"테스트 세트로 튜닝하면 그 세트에 맞춰지게 되어, 더 이상 편향 없는 일반화 성능 추정이 불가능해집니다."}]},{"title":"과적합과 과소적합","xp":26,"q":[{"t":"choice","k":"과적합","q":"과적합(overfitting)의 전형적 증상은?","o":["훈련 성능과 테스트 성능이 모두 낮다","훈련 성능은 높지만 테스트(검증) 성능이 크게 낮다","훈련 성능이 테스트 성능보다 낮다","성능을 측정할 수 없다"],"a":1,"ex":"과적합은 훈련 데이터의 잡음까지 외워 훈련 성능은 높지만 새 데이터(테스트)에서는 성능이 떨어지는 상태입니다."},{"t":"choice","k":"과소적합","q":"과소적합(underfitting)에 대한 설명으로 옳은 것은?","o":["모델이 너무 단순해 훈련 데이터의 패턴조차 제대로 학습하지 못한다","훈련 성능만 지나치게 높다","항상 테스트 성능이 100%다","데이터가 너무 많을 때만 발생한다"],"a":0,"ex":"과소적합은 모델 용량이 부족하거나 지나치게 단순해 훈련·테스트 성능이 모두 낮은 상태입니다."},{"t":"choice","k":"편향분산","q":"편향-분산 트레이드오프(bias-variance trade-off)를 옳게 설명한 것은?","o":["편향과 분산은 항상 함께 커진다","모델을 복잡하게 하면 편향은 줄지만 분산은 커지는 경향이 있다","분산은 데이터 개수와 무관하다","편향을 없애면 분산도 항상 0이 된다"],"a":1,"ex":"복잡한 모델일수록 편향(과소적합 경향)은 줄지만 분산(과적합 경향)은 커집니다. 둘의 균형점을 찾는 것이 목표입니다."},{"t":"input","k":"외움현상","q":"훈련 데이터에는 매우 잘 맞지만 새로운 데이터에서는 성능이 크게 떨어지는 현상의 이름은? (한국어)","a":["과적합","오버피팅","overfitting"],"ex":"이 현상은 과적합(overfitting)이며, 모델이 훈련 데이터의 잡음까지 외운 결과입니다."},{"t":"choice","k":"일반화","q":"일반화(generalization) 능력이란?","o":["훈련 데이터를 그대로 암기하는 능력","학습에 쓰지 않은 새로운 데이터에서도 잘 작동하는 능력","훈련 속도를 높이는 능력","특성 수를 늘리는 능력"],"a":1,"ex":"일반화는 학습에 사용하지 않은 새로운 데이터에 대해서도 좋은 성능을 내는 능력으로, 머신러닝의 궁극적 목표입니다."}]},{"title":"교차검증과 데이터 누수","xp":25,"q":[{"t":"choice","k":"k-fold","q":"k-겹 교차검증(k-fold cross-validation)의 핵심 아이디어는?","o":["데이터를 k개로 나눠 번갈아 하나를 검증용으로 쓰며 k번 평가한다","데이터를 한 번만 train/test로 나눈다","레이블을 k번 섞는다","특성을 k개만 남긴다"],"a":0,"ex":"k-fold는 데이터를 k개 폴드로 나눠 각 폴드를 한 번씩 검증에 사용하고 나머지로 학습하여, k개의 평가 결과를 평균냅니다."},{"t":"choice","k":"교차검증장점","q":"교차검증을 사용하는 주된 이점은?","o":["학습 시간이 항상 짧아진다","한 번의 분할에 의존하지 않아 성능 추정이 더 안정적이다","테스트 세트가 필요 없어진다","레이블이 필요 없어진다"],"a":1,"ex":"교차검증은 여러 분할에 걸쳐 평가를 평균내므로, 우연한 한 번의 분할에 덜 민감하고 더 신뢰할 수 있는 성능 추정을 제공합니다."},{"t":"choice","k":"데이터누수","q":"데이터 누수(data leakage)란?","o":["훈련 데이터가 손상되어 사라지는 것","테스트/미래 시점의 정보가 학습 과정에 새어 들어가 성능이 부풀려지는 것","데이터 파일 용량이 커지는 것","레이블이 부족한 것"],"a":1,"ex":"데이터 누수는 실제 예측 시점에 알 수 없는 정보(예: 테스트 세트 통계)가 학습에 포함되어, 성능이 비현실적으로 좋게 나오는 문제입니다."},{"t":"choice","k":"누수예시","q":"다음 중 데이터 누수의 사례에 해당하는 것은?","o":["훈련 세트로만 스케일러를 fit한다","전체 데이터(테스트 포함)로 스케일링한 뒤 분할한다","교차검증을 사용한다","특성 이름을 한글로 바꾼다"],"a":1,"ex":"전체 데이터로 스케일링하면 테스트 세트의 통계(평균·분산 등)가 전처리에 반영되어 훈련에 새어 들어가는 누수가 발생합니다."},{"t":"input","k":"폴드수","q":"5-겹 교차검증(k=5)에서는 모델을 총 몇 번 학습·평가하는가? (숫자)","a":["5","다섯","5번"],"ex":"k=5이면 각 폴드를 한 번씩 검증에 사용하므로 총 5회 학습·평가하고 그 결과를 평균냅니다."}]}]},
{"title":"데이터 준비","guide":"🧹","lessons":[{"title":"특성 스케일링","xp":25,"q":[{"t":"choice","k":"스케일링이유","q":"특성 스케일링(feature scaling)이 필요한 대표적 이유는?","o":["특성 이름을 통일하기 위해","값의 범위가 큰 특성이 거리·경사하강 기반 알고리즘을 지배하는 것을 막기 위해","레이블을 늘리기 위해","데이터 개수를 줄이기 위해"],"a":1,"ex":"KNN, SVM, 경사하강 기반 모델 등은 특성의 크기에 민감합니다. 스케일을 맞추지 않으면 값이 큰 특성이 결과를 과도하게 지배합니다."},{"t":"choice","k":"표준화","q":"표준화(standardization)의 결과로 특성이 갖게 되는 성질은?","o":["평균 0, 표준편차 1","최솟값 0, 최댓값 1","모든 값이 정수","합이 1"],"a":0,"ex":"표준화는 각 값에서 평균을 빼고 표준편차로 나눠, 평균 0·표준편차 1의 분포로 변환합니다(z-점수)."},{"t":"choice","k":"정규화","q":"최소-최대 정규화(min-max normalization)는 값을 어떤 범위로 변환하는가?","o":["-1에서 1","보통 0에서 1","0에서 100 정수","평균 0, 분산 무관"],"a":1,"ex":"최소-최대 정규화는 (x-min)/(max-min)으로 계산하여 값을 일반적으로 0~1 범위로 변환합니다."},{"t":"choice","k":"fit시점","q":"스케일러(scaler)를 올바르게 적용하는 순서는?","o":["전체 데이터로 fit한 뒤 분할한다","훈련 세트로만 fit하고, 같은 기준으로 훈련·테스트를 변환(transform)한다","테스트 세트로 fit한다","매 샘플마다 새로 fit한다"],"a":1,"ex":"스케일러는 반드시 훈련 세트로만 fit해야 합니다. 그렇지 않고 테스트 정보를 쓰면 데이터 누수가 발생합니다."},{"t":"input","k":"평균0분산1","q":"각 특성을 평균 0, 표준편차 1로 변환하는 스케일링 방법의 이름은? (한국어)","a":["표준화","standardization","z-점수 정규화"],"ex":"평균 0·표준편차 1로 만드는 것은 표준화(standardization)이며 z-점수 변환이라고도 합니다."}]},{"title":"인코딩과 결측치","xp":26,"q":[{"t":"choice","k":"원핫","q":"원-핫 인코딩(one-hot encoding)이란?","o":["범주형 값을 하나의 정수로 바꾼다","각 범주를 해당 위치만 1이고 나머지는 0인 벡터로 표현한다","결측치를 평균으로 채운다","수치형을 0~1로 정규화한다"],"a":1,"ex":"원-핫 인코딩은 범주마다 별도의 열을 만들어, 해당 범주면 1 나머지는 0으로 표현해 순서가 없는 범주를 나타냅니다."},{"t":"choice","k":"인코딩이유","q":"범주형 특성을 인코딩해야 하는 이유는?","o":["대부분의 모델은 수치 입력만 다룰 수 있기 때문","글자 수를 줄이기 위해","레이블을 만들기 위해","항상 정확도가 100%가 되기 때문"],"a":0,"ex":"많은 알고리즘은 수치 연산을 하므로, '빨강/파랑' 같은 범주형 값을 수치 표현으로 변환해야 합니다."},{"t":"choice","k":"결측치","q":"결측치(missing value)를 처리하는 방법으로 적절하지 않은 것은?","o":["평균·중앙값·최빈값으로 대치(imputation)","해당 행 또는 열 삭제","모델 기반 예측으로 채우기","결측치를 무시하고 문자열 그대로 학습에 투입"],"a":3,"ex":"대부분의 수치 모델은 결측치를 직접 다루지 못하므로, 대치나 삭제 등으로 처리해야 합니다. 그대로 투입하는 것은 부적절합니다."},{"t":"choice","k":"원핫차원","q":"순서가 없는 범주형 특성이 5개의 서로 다른 값을 가질 때, 원-핫 인코딩하면 보통 몇 개의 열이 생기는가?","o":["1개","5개","25개","0개"],"a":1,"ex":"원-핫 인코딩은 범주 수만큼 열을 만들므로 5개 범주는 5개 열이 됩니다(다중공선성 방지를 위해 하나를 빼기도 함)."},{"t":"input","k":"0/1벡터","q":"'빨강, 파랑, 초록' 같은 순서 없는 범주를 각각 0과 1로 이루어진 벡터로 바꾸는 인코딩 방법의 이름은? (한국어)","a":["원-핫 인코딩","원핫 인코딩","원핫","one-hot encoding","원핫인코딩"],"ex":"순서 없는 범주는 크기 관계를 부여하지 않도록 원-핫 인코딩으로 표현합니다."}]},{"title":"불균형과 특성 선택","xp":25,"q":[{"t":"choice","k":"불균형문제","q":"클래스 불균형(class imbalance)이 문제가 되는 이유는?","o":["모델이 다수 클래스만 예측해도 정확도가 높게 나와 소수 클래스를 놓치기 쉽다","특성 수가 자동으로 늘어난다","훈련이 불가능해진다","레이블이 사라진다"],"a":0,"ex":"예를 들어 99%가 정상인 데이터에서 모두 '정상'이라 해도 정확도 99%가 나오지만, 정작 중요한 소수 클래스(사기 등)를 못 잡습니다."},{"t":"choice","k":"불균형대응","q":"클래스 불균형에 대응하는 방법이 아닌 것은?","o":["소수 클래스 오버샘플링","다수 클래스 언더샘플링","클래스 가중치 조정","모든 데이터를 무작위로 삭제"],"a":3,"ex":"오버샘플링, 언더샘플링, 클래스 가중치, 적절한 평가지표(F1 등)가 대응책입니다. 데이터를 무작위로 통째 삭제하는 것은 해법이 아닙니다."},{"t":"choice","k":"특성선택","q":"특성 선택(feature selection)의 목적으로 옳은 것은?","o":["무관하거나 중복된 특성을 제거해 과적합을 줄이고 해석성·효율을 높인다","항상 특성 수를 늘린다","레이블을 바꾼다","데이터 개수를 늘린다"],"a":0,"ex":"특성 선택은 유용한 특성만 남겨 노이즈와 차원을 줄이고, 과적합 위험을 낮추며 학습을 빠르고 해석하기 쉽게 만듭니다."},{"t":"choice","k":"정확도오해","q":"심하게 불균형한 데이터에서 정확도(accuracy)만 보면 안 되는 이유와, 함께 봐야 할 지표로 알맞은 것은?","o":["정확도는 항상 완벽하므로 다른 지표는 불필요","다수만 맞혀도 높게 나오므로 정밀도·재현율·F1을 함께 본다","불균형에서는 정확도가 항상 0이다","재현율은 불균형과 무관하다"],"a":1,"ex":"불균형에서는 정확도가 오해를 부르므로 정밀도(precision)·재현율(recall)·F1 점수 등 소수 클래스를 반영하는 지표를 함께 봐야 합니다."},{"t":"input","k":"소수복제","q":"소수 클래스의 샘플을 늘려 클래스 균형을 맞추는 기법을 무엇이라 하는가? (한국어)","a":["오버샘플링","오버 샘플링","oversampling","과대표집"],"ex":"소수 클래스를 복제하거나 합성(예: SMOTE)해 늘리는 것을 오버샘플링(oversampling)이라 합니다."}]}]}]},
mleval:{name:"ML 모델·평가",em:"🎯",color:"#8b5cf6",g:"linear-gradient(135deg,#8b5cf6,#5b6cff)",units:[{"title":"대표 알고리즘","guide":"🤖","lessons":[{"title":"선형·로지스틱 회귀","xp":26,"q":[{"t":"choice","k":"선형회귀 출력","q":"선형회귀(linear regression)가 예측하는 대상은 무엇인가?","o":["연속값(수치)","범주(클래스)","군집 번호","확률 0 또는 1만"],"a":0,"ex":"선형회귀는 집값·기온 같은 연속적인 수치를 예측한다. 범주 예측은 분류(classification)의 영역이다."},{"t":"choice","k":"시그모이드","q":"로지스틱회귀(logistic regression)에서 출력을 0~1 확률로 바꾸는 함수는?","o":["시그모이드(sigmoid)","ReLU","계단(step)","코사인"],"a":0,"ex":"시그모이드 함수가 실수 입력을 0과 1 사이 확률로 변환한다."},{"t":"choice","k":"로지스틱 용도","q":"로지스틱회귀의 대표적인 용도는?","o":["분류(classification)","연속값 회귀","차원 축소","군집화"],"a":0,"ex":"이름은 '회귀'지만 확률을 임계값으로 나눠 클래스를 정하는 분류 알고리즘이다."},{"t":"input","k":"분류 임계값","q":"로지스틱회귀에서 확률을 두 클래스로 나눌 때 가장 흔히 쓰는 기준값(임계값)은?","a":["0.5","0.50"],"ex":"기본 임계값 0.5보다 확률이 크면 양성으로 분류한다. 문제에 따라 조정할 수 있다."},{"t":"choice","k":"선형회귀 손실","q":"선형회귀가 최소화하려는 대표적인 손실 함수는?","o":["잔차 제곱합(MSE)","교차엔트로피","지니 불순도","마진"],"a":0,"ex":"선형회귀는 실제값과 예측값 차이의 제곱합(평균제곱오차, MSE)을 최소화한다."}]},{"title":"트리와 앙상블","xp":27,"q":[{"t":"choice","k":"트리 과적합","q":"결정트리(decision tree)가 지나치게 깊어질 때 생기는 대표 문제는?","o":["과적합(overfitting)","과소적합","기울기 소실","데이터 누수"],"a":0,"ex":"트리가 너무 깊으면 학습 데이터의 노이즈까지 외워 새 데이터 성능이 떨어지는 과적합이 발생한다."},{"t":"choice","k":"랜덤포레스트 구성","q":"랜덤포레스트(random forest)는 무엇의 앙상블인가?","o":["여러 결정트리","여러 선형회귀","여러 kNN","여러 SVM"],"a":0,"ex":"랜덤포레스트는 서로 다른 여러 결정트리의 예측을 모아 최종 결정을 내린다."},{"t":"choice","k":"앙상블 이점","q":"랜덤포레스트가 단일 트리보다 일반적으로 우수한 핵심 이유는?","o":["여러 트리를 결합해 분산을 줄여 일반화가 좋아짐","항상 학습이 더 빠름","항상 100% 정확","해석이 더 쉬움"],"a":0,"ex":"여러 트리의 결과를 평균/투표하면 개별 트리의 분산(과적합)이 줄어 일반화 성능이 오른다."},{"t":"choice","k":"트리 분할기준","q":"결정트리가 노드를 나눌 때 사용하는 대표 기준은?","o":["지니 불순도·엔트로피","시그모이드","유클리드 거리","마진"],"a":0,"ex":"결정트리는 지니 불순도나 엔트로피(정보 이득)로 가장 잘 나누는 특성을 고른다."},{"t":"input","k":"앙상블 용어","q":"여러 모델을 결합해 성능을 끌어올리는 기법을 부르는 말은?(한글 또는 영어)","a":["앙상블","ensemble"],"ex":"랜덤포레스트, 부스팅 등이 앙상블(ensemble) 기법에 속한다."}]},{"title":"거리·비지도·마진","xp":26,"q":[{"t":"choice","k":"kNN 기반","q":"kNN(k-최근접 이웃)이 예측에 사용하는 핵심 정보는?","o":["가까운 이웃까지의 거리","확률 분포","트리 분할","마진 최대화"],"a":0,"ex":"kNN은 새 데이터와 거리가 가까운 k개 이웃의 다수 클래스로 예측한다."},{"t":"choice","k":"작은 k 영향","q":"kNN에서 k가 너무 작을 때 나타나기 쉬운 현상은?","o":["노이즈에 민감해져 과적합 경향","항상 과소적합","거리 계산이 불필요","비지도 학습으로 바뀜"],"a":0,"ex":"k가 작으면 소수 이웃(노이즈 포함)에 좌우되어 결정경계가 들쭉날쭉해진다. k를 키우면 더 매끄러워진다."},{"t":"choice","k":"k-means 유형","q":"k-means는 어떤 종류의 학습인가?","o":["비지도 학습(군집화)","지도 분류","지도 회귀","강화학습"],"a":0,"ex":"k-means는 정답 레이블 없이 데이터를 k개 군집으로 묶는 비지도 군집화 알고리즘이다."},{"t":"choice","k":"SVM 마진","q":"SVM(서포트 벡터 머신)이 최대화하려는 것은?","o":["결정경계와 데이터 사이의 마진","트리 깊이","이웃 수 k","학습률"],"a":0,"ex":"SVM은 두 클래스 사이의 여백(마진)을 최대로 만드는 경계를 찾는다."},{"t":"input","k":"k-means 개수","q":"k-means에서 사용자가 미리 정해야 하는 군집 개수를 나타내는 문자는?","a":["k","K"],"ex":"k-means의 'k'가 바로 만들 군집의 개수이며, 실행 전에 지정해야 한다."}]}]},
{"title":"분류 평가지표","guide":"🎯","lessons":[{"title":"혼동행렬 기초","xp":27,"q":[{"t":"choice","k":"TP 정의","q":"실제 양성인 데이터를 양성으로 올바르게 맞춘 경우는?","o":["TP(참 양성)","FP(거짓 양성)","FN(거짓 음성)","TN(참 음성)"],"a":0,"ex":"True Positive: 실제도 양성, 예측도 양성인 정답이다."},{"t":"choice","k":"FP 정의","q":"실제 음성인데 양성으로 잘못 예측한 경우는?","o":["FP(거짓 양성)","FN(거짓 음성)","TP(참 양성)","TN(참 음성)"],"a":0,"ex":"False Positive: 음성을 양성으로 오판한 1종 오류이다."},{"t":"choice","k":"FN 정의","q":"실제 양성을 음성으로 놓친 경우는?","o":["FN(거짓 음성)","FP(거짓 양성)","TN(참 음성)","TP(참 양성)"],"a":0,"ex":"False Negative: 양성을 놓친 2종 오류로, 질병 진단 등에서 특히 위험하다."},{"t":"input","k":"정확도 계산","q":"TP=8, FP=2, FN=4, TN=86일 때 정확도(accuracy)를 소수로 구하면?","code":"TP=8  FP=2\nFN=4  TN=86","a":["0.94"],"ex":"accuracy=(TP+TN)/전체=(8+86)/100=94/100=0.94."},{"t":"choice","k":"행렬 구성","q":"다음 중 혼동행렬(confusion matrix)의 네 칸에 속하지 않는 것은?","o":["R2 결정계수","TP","FP","TN"],"a":0,"ex":"혼동행렬은 TP, FP, FN, TN으로 구성된다. R²(결정계수)은 회귀 평가지표이다."}]},{"title":"정밀도·재현율·F1","xp":28,"q":[{"t":"input","k":"정밀도 계산","q":"TP=40, FP=10, FN=20, TN=30일 때 정밀도(precision)를 소수로 구하면?","code":"TP=40  FP=10\nFN=20  TN=30","a":["0.8","0.80"],"ex":"precision=TP/(TP+FP)=40/(40+10)=40/50=0.8. 양성이라 예측한 것 중 실제 양성 비율이다."},{"t":"input","k":"재현율 계산","q":"같은 행렬(TP=40, FP=10, FN=20, TN=30)에서 재현율(recall)을 소수 셋째 자리까지 구하면?","code":"TP=40  FP=10\nFN=20  TN=30","a":["0.667","0.67","2/3"],"ex":"recall=TP/(TP+FN)=40/(40+20)=40/60≈0.667. 실제 양성 중 맞춘 비율이다."},{"t":"choice","k":"트레이드오프","q":"정밀도와 재현율 사이의 일반적인 관계는?","o":["보통 한쪽을 높이면 다른 쪽이 낮아지는 트레이드오프","항상 값이 같음","항상 합이 1","서로 완전히 무관"],"a":0,"ex":"임계값을 낮추면 재현율은 오르지만 정밀도가 떨어지는 식으로 흔히 상충한다."},{"t":"choice","k":"F1 정의","q":"F1 점수는 정밀도와 재현율의 무엇인가?","o":["조화평균(harmonic mean)","산술평균","기하평균","단순 가중합"],"a":0,"ex":"F1=2·P·R/(P+R)로, 두 지표의 조화평균이라 한쪽만 높아선 점수가 오르지 않는다."},{"t":"input","k":"F1 계산","q":"정밀도=0.8, 재현율=0.8일 때 F1 점수를 소수로 구하면?","a":["0.8","0.80"],"ex":"F1=2·0.8·0.8/(0.8+0.8)=1.28/1.6=0.8. 정밀도와 재현율이 같으면 F1도 그 값과 같다."}]},{"title":"정확도 함정·ROC-AUC","xp":27,"q":[{"t":"choice","k":"불균형 함정","q":"양성이 1%뿐인 불균형 데이터에서 모델이 전부 음성으로 예측하면?","o":["정확도는 높게 나오지만 양성 재현율은 0","정확도도 재현율도 0","완벽한 모델","정밀도 1.0이 보장됨"],"a":0,"ex":"정확도 99%처럼 보여도 양성을 하나도 못 맞추므로 재현율은 0이다. 불균형 데이터에서 정확도만 보면 안 되는 이유다."},{"t":"input","k":"불균형 정확도","q":"1000개 중 990개 음성, 10개 양성인데 모두 음성으로 예측하면 정확도는?(소수)","a":["0.99","99%"],"ex":"음성 990개를 맞히므로 accuracy=990/1000=0.99. 하지만 양성 탐지는 완전히 실패한다."},{"t":"choice","k":"ROC 축","q":"ROC 곡선의 가로·세로축이 나타내는 것은?","o":["TPR(재현율) 대 FPR(거짓 양성률)","정밀도 대 재현율","MSE 대 MAE","깊이 대 정확도"],"a":0,"ex":"ROC는 임계값을 바꿔가며 FPR(가로)과 TPR(세로)의 관계를 그린 곡선이다."},{"t":"choice","k":"AUC 0.5","q":"ROC-AUC 값이 0.5라는 것의 의미는?","o":["무작위 추측 수준의 성능","완벽한 분류","항상 정반대로 맞히는 최악","과적합이 전혀 없음"],"a":0,"ex":"AUC=0.5는 동전 던지기 수준, 1.0은 완벽, 0.5 미만은 무작위보다 못한 상태이다."},{"t":"choice","k":"재현율 중시","q":"암 진단처럼 양성을 놓치면 치명적인 상황에서 특히 중요한 지표는?","o":["재현율(recall)","정밀도만","정확도만","AUC 무시"],"a":0,"ex":"놓친 환자(FN)를 줄이는 것이 핵심이므로 재현율을 우선한다."}]}]},
{"title":"회귀 평가와 정규화","guide":"📉","lessons":[{"title":"회귀 오차지표","xp":27,"q":[{"t":"choice","k":"이상치 민감","q":"이상치(outlier)에 가장 민감하게 반응하는 오차지표는?","o":["MSE/RMSE(오차를 제곱함)","MAE","R²은 항상 음수","정밀도"],"a":0,"ex":"MSE는 오차를 제곱하므로 큰 오차(이상치)의 영향이 크게 반영된다. MAE는 상대적으로 덜 민감하다."},{"t":"choice","k":"RMSE 관계","q":"RMSE와 MSE의 관계로 옳은 것은?","o":["RMSE는 MSE의 제곱근","RMSE는 MSE의 제곱","RMSE=2·MSE","서로 무관"],"a":0,"ex":"RMSE=√MSE로, 오차를 원래 데이터와 같은 단위로 되돌려 해석을 쉽게 한다."},{"t":"choice","k":"MAE 정의","q":"MAE(평균절대오차)는 무엇의 평균인가?","o":["절대오차 |실제-예측| 의 평균","제곱오차의 평균","오차의 곱","상대오차의 곱"],"a":0,"ex":"MAE는 오차의 절댓값을 평균한 값으로, 제곱을 하지 않아 이상치 영향이 MSE보다 작다."},{"t":"input","k":"MSE 계산","q":"네 예측의 오차(잔차)가 모두 2일 때(2,2,2,2) MSE를 구하면?","a":["4"],"ex":"MSE=(2²+2²+2²+2²)/4=(4+4+4+4)/4=16/4=4. 참고로 RMSE=√4=2이다."},{"t":"choice","k":"R2 의미","q":"R²(결정계수)이 1에 가깝다는 것의 의미는?","o":["모델이 데이터의 분산을 거의 완벽히 설명함","전혀 설명하지 못함","항상 과적합","오차가 무한대"],"a":0,"ex":"R²=1이면 예측이 완벽, 0이면 평균으로 찍는 수준, 음수면 그보다도 못한 모델이다."}]},{"title":"정규화 L1·L2","xp":28,"q":[{"t":"choice","k":"정규화 목적","q":"정규화(regularization)의 주된 목적은?","o":["과적합을 줄여 일반화 성능을 높임","학습률을 강제로 키움","데이터 개수를 늘림","항상 정확도를 100%로 만듦"],"a":0,"ex":"정규화는 큰 가중치에 벌점을 줘 모델을 단순하게 만들고 과적합을 억제한다."},{"t":"choice","k":"L1 특징","q":"L1 정규화(Lasso)의 두드러진 특징은?","o":["일부 계수를 정확히 0으로 만들어 특성 선택 효과","모든 계수를 똑같이 맞춤","기울기를 제거","트리를 생성"],"a":0,"ex":"L1은 불필요한 특성의 계수를 0으로 만들어 자동 특성 선택(feature selection) 효과를 낸다."},{"t":"choice","k":"L2 특징","q":"L2 정규화(Ridge)의 특징으로 옳은 것은?","o":["계수 크기를 전반적으로 0에 가깝게 축소(완전 0은 드묾)","계수를 정확히 0으로만 만듦","분류에만 사용","거리 계산용"],"a":0,"ex":"L2는 계수 제곱에 벌점을 줘 값을 작게 만들지만 대개 완전히 0으로 만들지는 않는다."},{"t":"input","k":"특성선택 정규화","q":"특성 선택 효과가 있는 정규화는 L1과 L2 중 무엇인가?","a":["L1","Lasso","라쏘"],"ex":"L1(Lasso)이 계수를 0으로 만들어 특성을 걸러낸다. L2(Ridge)는 축소만 한다."},{"t":"choice","k":"정규화 강도","q":"정규화 강도를 크게 높이면 모델은 어떻게 되는가?","o":["단순해져 분산은 줄고 편향은 커짐","항상 과적합이 심해짐","학습이 아예 불가능","항상 정확도가 오름"],"a":0,"ex":"강한 정규화는 계수를 크게 억눌러 모델을 단순화한다. 지나치면 과소적합(편향↑)이 될 수 있다."}]},{"title":"하이퍼파라미터·경사하강법","xp":26,"q":[{"t":"choice","k":"하이퍼파라미터","q": dl:{name:"딥러닝",em:"🧠",color:"#d6336c",g:"linear-gradient(135deg,#d6336c,#5b6cff)",units:[{"title":"신경망 기초","guide":"🧠","lessons":[{"title":"뉴런과 퍼셉트론","xp":26,"q":[{"t":"choice","k":"뉴런 연산","q":"인공 뉴런(퍼셉트론)이 수행하는 기본 연산으로 옳은 것은?","o":["입력마다 가중치를 곱해 모두 더한 뒤(가중합) 편향을 더하고 활성화 함수를 적용한다","입력들 중 최댓값 하나만 골라 그대로 출력한다","입력을 정렬해 중앙값을 출력한다","입력 순서를 무작위로 섞어 출력한다"],"a":0,"ex":"뉴런은 (가중합 + 편향)을 계산한 뒤 활성화 함수를 통과시킵니다. z = w·x + b, 출력 = f(z) 형태입니다."},{"t":"choice","k":"편향 역할","q":"뉴런에서 편향(bias)의 역할은?","o":["활성화 임계값을 조절해 결정 경계를 이동시킨다","학습률을 자동으로 조절한다","출력을 항상 0과 1 사이로 만든다","가중치를 정규화한다"],"a":0,"ex":"편향은 가중합에 더해지는 상수로, 입력이 0이어도 뉴런이 활성화될 수 있게 결정 경계를 평행 이동시킵니다."},{"t":"input","k":"편향 이름","q":"가중합에 더해져 뉴런의 활성화 기준점을 옮기는 학습 파라미터의 한글 이름은?","a":["편향","바이어스","bias"],"ex":"편향(bias)입니다. 가중치와 함께 학습으로 조정되는 파라미터입니다."},{"t":"choice","k":"단층 한계","q":"단층 퍼셉트론의 근본적 한계로 잘 알려진 예는?","o":["XOR처럼 선형 분리가 불가능한 문제를 풀 수 없다","두 수의 덧셈을 계산할 수 없다","입력이 2개를 넘으면 동작하지 않는다","가중치가 항상 1로 고정된다"],"a":0,"ex":"단층 퍼셉트론은 직선(초평면) 하나로 나눌 수 있는 문제만 풉니다. XOR은 선형 분리가 불가능해 은닉층이 필요합니다."},{"t":"choice","k":"학습 대상","q":"학습(훈련) 과정에서 값이 갱신되는 뉴런의 파라미터는?","o":["가중치(weight)와 편향(bias)","학습률과 epoch 수","배치 크기와 드롭아웃 비율","입력 데이터의 개수"],"a":0,"ex":"가중치와 편향이 학습 대상 파라미터입니다. 학습률·배치 크기 등은 사람이 정하는 하이퍼파라미터입니다."}]},{"title":"활성화 함수","xp":27,"q":[{"t":"choice","k":"비선형 필요","q":"비선형 활성화 함수를 전혀 쓰지 않고 선형 층만 여러 개 쌓으면?","o":["전체가 하나의 선형 변환과 같아져 복잡한 패턴을 학습하지 못한다","학습 속도가 무한히 빨라진다","과적합이 완전히 사라진다","파라미터 수가 0이 된다"],"a":0,"ex":"선형 변환의 합성은 다시 선형 변환입니다. 비선형 활성화가 있어야 층을 쌓아 비선형 함수를 근사할 수 있습니다."},{"t":"choice","k":"ReLU 정의","q":"ReLU 활성화 함수의 정의로 옳은 것은?","o":["max(0, x): 음수 입력은 0, 양수 입력은 그대로 통과","입력을 0과 1 사이로 압축","모든 출력의 합을 1로 정규화","입력을 -1과 1 사이로 압축"],"a":0,"ex":"ReLU(x) = max(0, x)입니다. 계산이 간단하고 양수 구간에서 기울기가 1이라 기울기 소실을 완화합니다."},{"t":"choice","k":"softmax 용도","q":"다중 클래스 분류의 출력층에서 각 클래스 확률(합이 1)을 만들 때 쓰는 함수는?","o":["softmax","ReLU","tanh","항등함수(linear)"],"a":0,"ex":"softmax는 출력을 지수화 후 정규화해 합이 1인 확률 분포로 바꿉니다. 다중 클래스 분류 출력층의 표준입니다."},{"t":"choice","k":"sigmoid","q":"sigmoid 함수의 특징으로 옳은 것은?","o":["출력을 0과 1 사이로 압축해 이진 분류 확률로 해석할 수 있다","출력 범위가 음의 무한대에서 양의 무한대","입력이 음수면 그대로 통과시킨다","출력들의 합이 항상 1이다"],"a":0,"ex":"sigmoid는 0~1로 압축해 확률로 해석할 수 있어 이진 분류 출력에 쓰입니다. 다만 포화 영역에서 기울기 소실이 잘 생깁니다."},{"t":"input","k":"은닉층 활성화","q":"깊은 망의 은닉층에서 계산이 간단하고 기울기 소실을 완화해 널리 쓰는 활성화 함수의 영문 약자는?","a":["ReLU","relu","렐루"],"ex":"ReLU입니다. 양수 구간 기울기가 1이라 깊은 망에서도 신호가 잘 전달됩니다."}]},{"title":"층과 파라미터","xp":26,"q":[{"t":"choice","k":"완전연결층","q":"완전연결층(dense/fully-connected layer)의 정의는?","o":["이전 층의 모든 뉴런이 다음 층의 모든 뉴런과 연결된 층","인접한 몇 개 뉴런끼리만 연결된 층","가중치가 전혀 없는 층","출력이 항상 입력과 같은 층"],"a":0,"ex":"완전연결층은 이전 층 모든 유닛과 다음 층 모든 유닛이 연결됩니다. 그래서 파라미터가 (입력수 × 출력수 + 출력수)로 많습니다."},{"t":"choice","k":"은닉층","q":"은닉층(hidden layer)에 대한 설명으로 옳은 것은?","o":["입력층과 출력층 사이에서 특징을 추출하는 중간 층","사용자가 직접 값을 입력하는 층","최종 예측을 내보내는 층","학습 중에는 존재하지 않는 층"],"a":0,"ex":"은닉층은 입력과 출력 사이의 층으로, 원시 입력에서 점점 추상적인 특징을 만들어냅니다."},{"t":"input","k":"가중치 개수","q":"입력 3개, 출력 4개인 완전연결층의 가중치(weight) 개수는? (편향 제외, 숫자로)","a":["12"],"ex":"완전연결층 가중치 수 = 입력수 × 출력수 = 3 × 4 = 12개입니다. 편향까지 더하면 16개입니다."},{"t":"choice","k":"회귀 출력","q":"연속 값을 예측하는 회귀(regression) 신경망의 출력층 구성으로 적절한 것은?","o":["활성화 없이(선형/항등) 실수 값을 그대로 출력","softmax로 확률 분포를 출력","여러 클래스에 sigmoid로 0/1을 출력","항상 정수만 출력"],"a":0,"ex":"회귀는 제한 없는 실수를 예측하므로 출력층은 보통 선형(활성화 없음)입니다. softmax는 분류용입니다."},{"t":"choice","k":"파라미터 증가","q":"모델의 파라미터 수가 크게 늘어날 때 일반적인 경향은?","o":["표현력은 커지지만 과적합 위험과 계산 비용도 함께 증가한다","항상 정확도가 100%가 된다","학습이 필요 없어진다","입력 차원이 자동으로 줄어든다"],"a":0,"ex":"파라미터가 많으면 복잡한 함수를 표현할 수 있지만, 데이터가 부족하면 과적합되고 학습·추론 비용이 커집니다."}]}]},
{"title":"학습 원리","guide":"⚙️","lessons":[{"title":"순전파와 역전파","xp":27,"q":[{"t":"choice","k":"순전파","q":"순전파(forward propagation)란?","o":["입력을 층을 따라 통과시켜 출력(예측)을 계산하는 과정","손실을 입력 쪽으로 되돌려 기울기를 구하는 과정","가중치를 무작위로 초기화하는 과정","데이터를 배치로 나누는 과정"],"a":0,"ex":"순전파는 입력→은닉층→출력 순으로 계산해 예측을 만들고, 그 예측과 정답으로 손실을 구합니다."},{"t":"choice","k":"역전파 원리","q":"역전파(backpropagation)의 핵심 원리는?","o":["연쇄법칙(chain rule)으로 손실을 각 가중치에 대한 기울기로 분해해 뒤에서 앞으로 전달","가중치를 앞에서 뒤로 한 번씩 더한다","손실을 무시하고 무작위로 탐색한다","활성화 함수를 제거한다"],"a":0,"ex":"역전파는 합성함수 미분(연쇄법칙)으로 출력 손실을 각 파라미터의 기울기로 효율적으로 계산합니다."},{"t":"choice","k":"역전파 결과","q":"역전파를 통해 최종적으로 얻는 것은?","o":["각 파라미터에 대한 손실의 기울기(gradient)","최종 예측 확률","입력 데이터의 평균","배치 크기"],"a":0,"ex":"역전파는 각 가중치·편향이 손실을 얼마나 바꾸는지(기울기)를 계산합니다. 이 기울기로 경사하강법이 파라미터를 갱신합니다."},{"t":"input","k":"미분 규칙","q":"손실을 각 가중치로 미분할 때 사용하는, 합성함수 미분 규칙의 한글 이름은?","a":["연쇄법칙","체인룰","연쇄 법칙"],"ex":"연쇄법칙(chain rule)입니다. 층이 쌓인 합성함수의 기울기를 곱셈으로 이어 계산합니다."},{"t":"choice","k":"학습 순서","q":"한 번의 학습 스텝에서 일어나는 순서로 옳은 것은?","o":["순전파로 예측·손실 계산 → 역전파로 기울기 계산 → 가중치 갱신","역전파 먼저 → 순전파 → 손실 계산","가중치 갱신 → 순전파 → 손실 계산","손실 계산 없이 역전파만 반복"],"a":0,"ex":"예측과 손실을 구하고(순전파), 기울기를 구한 뒤(역전파), 옵티마이저가 파라미터를 갱신하는 순서로 반복합니다."}]},{"title":"손실함수와 경사하강법","xp":28,"q":[{"t":"choice","k":"회귀 손실","q":"연속 값을 예측하는 회귀 문제에서 흔히 쓰는 손실함수는?","o":["평균제곱오차(MSE)","크로스엔트로피","정확도(accuracy)","softmax"],"a":0,"ex":"회귀는 예측과 정답의 차이를 제곱해 평균낸 MSE를 주로 씁니다. 큰 오차에 더 큰 벌점을 줍니다."},{"t":"choice","k":"분류 손실","q":"분류 문제에서 예측 확률분포와 정답의 차이를 재는 손실은?","o":["크로스엔트로피(cross-entropy)","MSE","L2 노름","코사인 유사도"],"a":0,"ex":"크로스엔트로피는 정답 클래스에 높은 확률을 줄수록 손실이 작아져, 분류에서 표준으로 쓰입니다."},{"t":"choice","k":"갱신 방향","q":"경사하강법(gradient descent)에서 파라미터를 갱신하는 방향은?","o":["손실을 줄이는 방향, 즉 기울기의 반대 방향","기울기와 같은 방향","항상 무작위 방향","항상 0으로"],"a":0,"ex":"기울기는 손실이 가장 빠르게 증가하는 방향이므로, 그 반대 방향으로 학습률만큼 이동해 손실을 줄입니다."},{"t":"choice","k":"큰 학습률","q":"학습률(learning rate)이 너무 크면 생기는 문제는?","o":["갱신 폭이 커 손실이 진동하거나 발산할 수 있다","항상 더 빨리 안정적으로 수렴한다","기울기가 0이 된다","과적합이 사라진다"],"a":0,"ex":"학습률이 크면 최소점을 지나쳐 튕겨 나가며 손실이 오르내리거나 발산합니다. function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+"k":n}
function paintStats(){ $("s-streak").textContent=S.streak; $("s-xp").textContent=fmt(S.xp); $("s-hearts").textContent=S.hearts; }

function renderCats(){
  const bar=$("catbar"); if(!bar) return; bar.innerHTML="";
  CATS.forEach(cat=>{
    const b=document.createElement("button");
    b.className="catchip"; b.setAttribute("aria-selected", cat.id===curCat);
    b.textContent=cat.name;
    b.onclick=()=>{ curCat=cat.id; const first=cat.tracks.find(k=>COURSES[k]); if(first) curLang=first; renderCats(); renderLangs(); renderCourse(); };

  });

function renderLangs(){
  const bar=$("langbar"); bar.innerHTML="";
  const cat=CATS.find(c=>c.id===curCat)||CATS[0];
  cat.tracks.filter(key=>COURSES[key]).forEach(key=>{
    const c=COURSES[key];
    const b=document.createElement("button");
    b.className="langchip"; b.setAttribute("role","tab");
    b.setAttribute("aria-selected", key===curLang);
    if(key===curLang) b.style.background=c.color;
    b.innerHTML=`<span class="em">${c.em}</span>${c.name}`;

    bar.appendChild(b);

function renderCourse(){
  const c=COURSES[curLang]; const wrap=$("course"); wrap.innerHTML="";
  let globalIdx=0; let prevAllDone=true;
  c.units.forEach((u,ui)=>{
    const head=document.createElement("div");
    head.className="unit-head"; head.style.background=c.g;
    const _lv=unitLevel(ui,c.units.length);
    head.innerHTML=`<div><div class="k">유닛 ${ui+1} · Lv${_lv} ${LV_LABEL[_lv]}</div><h2>${u.title}</h2></div><div class="guide">${u.guide}</div>`;
    wrap.appendChild(head);
    const path=document.createElement("div"); path.className="path";
    u.lessons.forEach((les,li)=>{
      const id=`${curLang}-${ui}-${li}`;
      const done=!!S.done[id];
      const unlocked=S.freeMode||prevAllDone||done;
      const nodeWrap=document.createElement("div"); nodeWrap.className="node-wrap";
      const btn=document.createElement("button");
      const pos = globalIdx%8;
      let cls="node n"+pos;
      let inner="";
      if(done){ cls+=" done"; btn.style.background=c.g; inner=`<span class="crown">👑</span>✓`; }
      else if(unlocked){ cls+=" current"; btn.style.background=c.color; inner="★"; }
      else { cls+=" locked"; inner="🔒"; }
      btn.className=cls; btn.innerHTML=inner;
      btn.disabled=!unlocked && !done;
      btn.setAttribute("aria-label", les.title+(done?" 완료":unlocked?" 시작하기":" 잠김"));
      if(unlocked||done) btn.onclick=()=>startLesson(curLang,ui,li);
      const lbl=document.createElement("div"); lbl.className="node-label"; lbl.textContent=les.title;
      nodeWrap.appendChild(btn); nodeWrap.appendChild(lbl);
      path.appendChild(nodeWrap);
      if(!done) prevAllDone=false;
      globalIdx++;
    });
    wrap.appendChild(path);
  });
  paintStats(); paintReview(); renderDaily(); renderRoadmap();
}
